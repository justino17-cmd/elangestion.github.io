<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">

<title>OP MESSAGES — Messagerie d'entreprise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080d18;--bg1:#0d1426;--card:#101a30;--card2:#0c1424;--brd:rgba(255,255,255,.09);--brd2:rgba(255,255,255,.14);--t1:#fff;--t2:rgba(231,238,248,.74);--t3:rgba(231,238,248,.46);--op:#5b8fd6;--op-l:#8fb6e8;--green:#22b14c;--red:#f87171}
  body.theme-light{--bg:#eaeff7;--bg1:#ffffff;--card:#ffffff;--card2:#eef3fa;--brd:rgba(15,23,40,.1);--brd2:rgba(15,23,40,.17);--t1:#101726;--t2:#3a4660;--t3:#74819a;--op-l:#3f6fb5}
  body.theme-light::before{background:radial-gradient(ellipse 60% 45% at 12% 0%, rgba(91,143,214,.12), transparent 60%)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--t1);font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;height:100dvh;overflow:hidden}
  body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 60% 45% at 12% 0%, rgba(91,143,214,.14), transparent 60%);pointer-events:none}
  .wrap{position:relative;z-index:1;height:100dvh;display:flex;flex-direction:column}
  .center-page{height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
  .panel{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--brd);border-radius:22px;padding:26px;width:100%;max-width:420px}
  .logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:6px}
  .logo b{font-family:'Space Mono',monospace;letter-spacing:2px;font-size:18px}
  .sub{text-align:center;color:var(--t2);font-size:14px;margin:4px 0 20px}
  .tabs{display:flex;gap:8px;margin-bottom:18px}
  .tab{flex:1;text-align:center;padding:11px;border-radius:11px;border:1px solid var(--brd);background:var(--card2);cursor:pointer;font-weight:600;font-size:14px;color:var(--t2)}
  .tab.active{background:rgba(91,143,214,.16);border-color:rgba(91,143,214,.4);color:var(--op-l)}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
  .field input{width:100%;background:var(--card2);border:1px solid var(--brd2);border-radius:11px;padding:13px 14px;color:var(--t1);font-size:15px;font-family:inherit}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--op);color:#06121f;border:none;border-radius:12px;padding:13px 20px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;text-decoration:none}
  .btn:hover{filter:brightness(1.08)}.btn.green{background:var(--green);color:#04140a}.btn.ghost{background:transparent;border:1px solid var(--brd2);color:var(--t1)}.btn.block{width:100%}.btn.sm{padding:9px 14px;font-size:13px;border-radius:10px}
  .muted{color:var(--t3);font-size:13px}.center{text-align:center}.hide{display:none!important}
  .err{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);color:#fca5a5;border-radius:10px;padding:10px 13px;font-size:13.5px;margin-bottom:12px}
  .ok{background:rgba(34,177,76,.12);border:1px solid rgba(34,177,76,.3);color:#5fcf80;border-radius:10px;padding:10px 13px;font-size:13.5px;margin-bottom:12px}
  a.link{color:var(--op-l);cursor:pointer;text-decoration:underline;font-size:13.5px}
  /* APP SHELL */
  .appbar{display:flex;align-items:center;gap:12px;padding:calc(12px + env(safe-area-inset-top)) 16px 12px;background:rgba(13,20,38,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--brd)}
  .appbar img{width:36px;height:36px;border-radius:10px;flex-shrink:0}
  .appbar .tt{flex:1;min-width:0}.appbar .tt b{font-size:16px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.appbar .tt span{font-size:11.5px;color:var(--t3)}
  .appbar .ic{width:40px;height:40px;border-radius:11px;border:1px solid var(--brd2);background:transparent;color:var(--t2);font-size:17px;cursor:pointer;flex-shrink:0}
  .view{flex:1;overflow-y:auto;padding:14px 14px 90px}
  .view-h{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 14px}
  .view-h h2{font-family:'Space Mono',monospace;font-size:18px;letter-spacing:.5px}
  .row{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--brd);border-radius:15px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
  .row:hover{border-color:var(--brd2)}
  .row .ava{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0}
  .row .info{flex:1;min-width:0}.row .info .nm{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.row .info .ds{font-size:12.5px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .chev{color:var(--t3);font-size:20px}
  .fab{position:fixed;right:18px;bottom:calc(80px + env(safe-area-inset-bottom));z-index:15;width:56px;height:56px;border-radius:50%;background:var(--op);color:#06121f;border:none;font-size:26px;box-shadow:0 10px 26px rgba(91,143,214,.4);cursor:pointer}
  .nav{position:fixed;left:0;right:0;bottom:0;z-index:14;display:flex;background:rgba(10,15,28,.96);backdrop-filter:blur(14px);border-top:1px solid var(--brd);padding-bottom:env(safe-area-inset-bottom)}
  .nav button{flex:1;background:transparent;border:none;color:var(--t3);font-family:inherit;font-size:11px;padding:9px 0 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
  .nav button.on{color:var(--op-l)}
  .nav button .ni{font-size:21px;display:flex;align-items:center;justify-content:center;height:22px}
  .appbar .ic,.topbar .ic,.composer .ic,.composer .send,.fab{display:inline-flex;align-items:center;justify-content:center}
  button svg{pointer-events:none}
  /* CHAT */
  .chat{position:fixed;inset:0;z-index:30;background:var(--bg);display:none;flex-direction:column}
  .chat.open{display:flex}
  .topbar{display:flex;align-items:center;gap:10px;padding:calc(10px + env(safe-area-inset-top)) 14px 10px;background:rgba(13,20,38,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--brd)}
  .topbar .bk{background:transparent;border:none;color:var(--t1);font-size:22px;cursor:pointer;padding:0 4px}
  .topbar .ava{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .topbar .ti{flex:1;min-width:0}.topbar .ti b{font-size:15px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.topbar .ti span{font-size:11px;color:var(--t3)}
  .topbar .ic{width:38px;height:38px;border-radius:10px;border:1px solid var(--brd2);background:transparent;color:var(--t2);font-size:16px;cursor:pointer}
  .stream{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
  .day{align-self:center;font-size:11px;color:var(--t3);background:var(--card2);border:1px solid var(--brd);padding:3px 12px;border-radius:100px;margin:6px 0}
  .m{max-width:80%;padding:9px 13px;border-radius:15px;font-size:14.5px;line-height:1.45;word-wrap:break-word}
  .m.them{align-self:flex-start;background:var(--card);border:1px solid var(--brd);border-bottom-left-radius:5px}
  .m.me{align-self:flex-end;background:var(--op);color:#06121f;border-bottom-right-radius:5px}
  .m .who{font-size:11.5px;font-weight:700;color:var(--op-l);margin-bottom:2px}.m.me .who{color:#06121f;opacity:.7}
  .m img{max-width:100%;border-radius:10px;margin-top:6px;display:block;cursor:pointer}
  .m .filechip{display:flex;align-items:center;gap:8px;margin-top:6px;padding:9px 12px;background:rgba(255,255,255,.1);border:1px solid var(--brd2);border-radius:10px;color:inherit;font-size:13.5px;word-break:break-all;cursor:pointer}
  .m.me .filechip{background:rgba(0,0,0,.12)}
  .m .t{font-size:10px;opacity:.6;margin-top:3px;text-align:right}
  .composer{display:flex;align-items:center;gap:8px;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:rgba(13,20,38,.95);border-top:1px solid var(--brd)}
  .composer .ic{width:42px;height:42px;border-radius:12px;border:1px solid var(--brd2);background:transparent;color:var(--t2);font-size:22px;cursor:pointer;flex-shrink:0}
  .composer input{flex:1;background:var(--card2);border:1px solid var(--brd2);border-radius:22px;padding:12px 16px;color:var(--t1);font-size:15px;font-family:inherit}
  .composer .send{width:46px;height:46px;border-radius:50%;background:var(--op);color:#06121f;border:none;font-size:18px;cursor:pointer;flex-shrink:0}
  /* sheet */
  .sheet{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.55);display:none;align-items:flex-end}
  .sheet.open{display:flex}
  .sheet-c{background:var(--bg1);border:1px solid var(--brd);border-radius:22px 22px 0 0;width:100%;max-width:520px;margin:0 auto;padding:22px 18px calc(22px + env(safe-area-inset-bottom));max-height:84dvh;overflow:auto}
  .mrow{display:flex;align-items:center;gap:12px;padding:10px 4px;border-bottom:1px solid var(--brd)}
  .mrow .ma{width:38px;height:38px;border-radius:11px;background:var(--card);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--op-l)}
  .chk{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--brd);border-radius:11px;margin-bottom:8px;cursor:pointer}
  .chk.sel{border-color:var(--op);background:rgba(91,143,214,.1)}
  /* viewer + jitsi */
  .viewer,.jitsi{position:fixed;inset:0;z-index:60;background:#0a0e16;display:none;flex-direction:column}
  .viewer.open,.jitsi.open{display:flex}
  .vbar{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:calc(10px + env(safe-area-inset-top)) 14px 10px;border-bottom:1px solid var(--brd)}
  .viewer iframe{flex:1;border:none;width:100%;background:#fff}
  #jitsi-box{flex:1}
  #jitsi-box iframe{width:100%;height:100%;border:none}
  .ring{position:fixed;inset:0;z-index:80;background:rgba(8,13,24,.97);display:none;align-items:center;justify-content:center;padding:24px}
  .ring.open{display:flex}
  .ring-av{width:100px;height:100px;border-radius:32px;display:flex;align-items:center;justify-content:center;font-size:42px;margin:0 auto}
  .ring-btn{width:66px;height:66px;border-radius:50%;border:none;color:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
  .ring-btn.accept{background:#22c55e}
  .ring-btn.decline{background:#ef4444;transform:rotate(135deg)}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(82px + env(safe-area-inset-bottom));z-index:90;background:var(--card);border:1px solid var(--brd2);color:var(--t1);padding:12px 16px;border-radius:12px;font-size:14px;max-width:90%;box-shadow:0 14px 40px rgba(0,0,0,.5);opacity:0;transition:opacity .25s;pointer-events:none;text-align:center}
  .toast.show{opacity:1}
  .meet{display:flex;align-items:center;gap:13px;background:linear-gradient(180deg,rgba(34,177,76,.12),rgba(34,177,76,.04));border:1px solid rgba(34,177,76,.3);border-radius:15px;padding:14px;margin-bottom:10px;cursor:pointer}
  .meet .cd{font-family:'Space Mono',monospace;font-size:13px;color:#5fcf80;font-weight:700}
</style>
</head>
<body>
<div class="wrap" id="root"><div class="center-page"><div class="panel center"><p class="muted">Chargement…</p></div></div></div>

<div class="chat" id="chat"></div>
<input type="file" id="imgpick" accept="image/*" style="display:none">
<input type="file" id="filepick" style="display:none">
<input type="file" id="photopick" accept="image/*" style="display:none">
<div class="sheet" id="sheet"><div class="sheet-c" id="sheet-c"></div></div>
<div class="viewer" id="viewer"><div class="vbar"><span id="viewer-name" style="font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span><button class="btn ghost sm" onclick="closeViewer()">✕ Fermer</button></div><iframe id="viewer-frame" title="Document"></iframe></div>
<div class="jitsi" id="jitsi"><div class="vbar"><span id="jitsi-name" style="font-size:14px;font-weight:600">Réunion</span><button class="btn ghost sm" onclick="closeJitsi()">✕ Quitter</button></div><div id="jitsi-box"></div></div>
<div class="ring" id="ring"></div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  if ('serviceWorker' in navigator) { window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); }); }
  const FB_CONFIG={ apiKey:"AIzaSyAbah03sO4f4LyNhvmig0Pn00lz1sHSpT8", authDomain:"elan-gestion.firebaseapp.com", projectId:"elan-gestion", storageBucket:"elan-gestion.firebasestorage.app", messagingSenderId:"910528393731", appId:"1:910528393731:web:128d97b6a3269fb6d21436" };
  firebase.initializeApp(FB_CONFIG);
  const auth=firebase.auth(), fs=firebase.firestore();
  const $=id=>document.getElementById(id);
  const esc=s=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const ROOT=$('root');
  let ME=null,USER=null,COMP=null,IS_OWNER=false,_files={},_lastCreds=null,_unsub=null,_curView='disc',_msgCache={};
  let _members=[];
  let MODE='perso'; // espace ACTIF : 'perso' | 'company' (basculé par le bouton en haut)
  let HAS_COMPANY=false, _meetWatchUnsub=null; // le compte appartient-il à une entreprise ?
  // Références Firestore centralisées : le moteur de chat/appels marche pour les 2 modes
  function chanCol(){ return MODE==='perso' ? fs.collection('op_channels') : fs.collection('op_companies').doc(COMP.id).collection('channels'); }
  function callsCol(){ return MODE==='perso' ? fs.collection('op_calls') : fs.collection('op_companies').doc(COMP.id).collection('calls'); }
  function handleOf(v){ return (v||'').trim().toLowerCase().replace(/[^a-z0-9._-]/g,''); }
  // Liste des personnes joignables : membres de l'entreprise, ou mes contacts perso
  async function listMembers(){
    if(MODE!=='perso'){ const out=[]; try{ const qs=await fs.collection('op_companies').doc(COMP.id).collection('members').get(); qs.forEach(d=>out.push(d.data())); }catch(e){} return out; }
    const out=[]; try{ const qs=await fs.collection('op_users').doc(ME.uid).collection('contacts').get();
      const arr=[]; qs.forEach(d=>arr.push(d.data()));
      await Promise.all(arr.map(async c=>{ let la=0,photo=c.photo; try{ const u=await fs.collection('op_users').doc(c.uid).get(); if(u.exists){ la=u.data().lastActive||0; photo=u.data().photo||photo; } }catch(e){} out.push({uid:c.uid,name:c.name||'',phone:c.phone||'',handle:c.handle||'',photo,lastActive:la}); }));
    }catch(e){} return out;
  }
  let _hidden=(()=>{ try{ return new Set(JSON.parse(localStorage.getItem('opmsg_hidden')||'[]')); }catch(e){ return new Set(); } })();
  const FV=()=>firebase.firestore.FieldValue.serverTimestamp();
  function loginEmail(v){ v=(v||'').trim().toLowerCase(); if(!v) return ''; return v.includes('@')?v:v.replace(/[^a-z0-9._-]/g,'')+'@opmsg.local'; }
  function siretValid(s){ return /^\d{14}$/.test((s||'').replace(/\s/g,'')); }
  function code6(){ const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let r='';crypto.getRandomValues(new Uint8Array(6)).forEach(b=>r+=c[b%c.length]);return r; }
  function ini(n){ return (n||'?').trim().slice(0,1).toUpperCase(); }
  function hue(s){ let h=0; for(const c of (s||'x')) h=(h*31+c.charCodeAt(0))%360; return h; }
  function avatarStyle(s){ const h=hue(s); return `background:hsl(${h} 45% 22%);color:hsl(${h} 70% 72%)`; }
  function applyTheme(){ const p=localStorage.getItem('opmsg_theme')||'auto'; let dark; if(p==='auto'){ dark=!(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches); } else dark=(p!=='light'); document.body.classList.toggle('theme-light',!dark); try{ const mt=document.querySelector('meta[name=theme-color]'); if(mt) mt.setAttribute('content',dark?'#0a1020':'#eaeff7'); }catch(e){} }
  function setTheme(p){ localStorage.setItem('opmsg_theme',p); applyTheme(); if(_curView==='prof') viewProfile(); }
  try{ if(window.matchMedia){ window.matchMedia('(prefers-color-scheme: light)').addEventListener('change',()=>{ if((localStorage.getItem('opmsg_theme')||'auto')==='auto') applyTheme(); }); } }catch(e){}
  applyTheme();
  function isPro(){ return MODE==='company' && HAS_COMPANY && (IS_OWNER || (USER&&USER.role==='entreprise')); }
  function soundOn(){ return localStorage.getItem('opmsg_sound')!=='0'; }
  function toggleSound(){ localStorage.setItem('opmsg_sound', soundOn()?'0':'1'); if(_curView==='prof') viewProfile(); }
  const ICON={
    chat:'<path d="M21 12a8 8 0 0 1-11.6 7.1L3 21l1.9-6.4A8 8 0 1 1 21 12z"/>',
    users:'<path d="M16 19v-1a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v1"/><circle cx="9" cy="8" r="3.2"/><path d="M22 19v-1a4 4 0 0 0-3-3.8"/><path d="M15.5 4.3a3.2 3.2 0 0 1 0 6.2"/>',
    phone:'<path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.7a2 2 0 0 1-.5 2.1L8.1 9.6a16 16 0 0 0 6 6l1.1-1.1a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.7.7a2 2 0 0 1 1.7 2z"/>',
    user:'<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
    search:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>',
    plus:'<path d="M12 5v14M5 12h14"/>',
    mic:'<rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/>',
    send:'<path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/>',
    video:'<rect x="2" y="6" width="13" height="12" rx="2"/><path d="M22 8l-7 4 7 4V8z"/>',
    back:'<path d="M15 18l-6-6 6-6"/>',
    attach:'<path d="M21.4 11.05 12.2 20.3a5 5 0 0 1-7.1-7.1l9.2-9.2a3.3 3.3 0 0 1 4.7 4.7l-9.2 9.2a1.7 1.7 0 0 1-2.4-2.4l8.5-8.5"/>',
    image:'<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>',
    file:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/>',
    poll:'<path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="6" rx="1"/><rect x="12" y="7" width="3" height="10" rx="1"/><rect x="17" y="13" width="3" height="4" rx="1"/>'
  };
  function ic(n,sz){ return `<svg viewBox="0 0 24 24" width="${sz||22}" height="${sz||22}" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:block">${ICON[n]||''}</svg>`; }

  auth.onAuthStateChanged(async user=>{
    if(_unsub){_unsub();_unsub=null;}
    if(!user){ ME=null;USER=null;COMP=null; if(!_provisioning) renderAuth(); return; }
    ME=user;
    if(_provisioning) return; // doJoin/doCreate gèrent l'entrée dans l'app
    let us; try{ us=await fs.collection('op_users').doc(user.uid).get(); }catch(e){}
    USER=(us&&us.exists)?us.data():{uid:user.uid,email:user.email,name:(user.email||'Utilisateur').split('@')[0]};

  async function addContact(){
    const raw=($('ac-q').value||'').trim(); if(!raw){ $('acerr').innerHTML='<div class="err">Entrez un identifiant ou un numéro.</div>'; return; }
    const btn=$('ac-btn'); if(btn) btn.disabled=true;
    const isPhone=/^[0-9+ .]{6,}$/.test(raw);
    try{
      let snap;
      if(isPhone) snap=await fs.collection('op_users').where('phone','==',raw).limit(1).get();
      else snap=await fs.collection('op_users').where('handle','==',handleOf(raw)).limit(1).get();
      if(snap.empty){ $('acerr').innerHTML='<div class="err">Personne trouvée avec cet identifiant. Vérifiez l\'orthographe.</div>'; if(btn)btn.disabled=false; return; }
      const u=snap.docs[0].data();
      if(u.uid===ME.uid){ $('acerr').innerHTML='<div class="err">C\'est vous 🙂</div>'; if(btn)btn.disabled=false; return; }
      await fs.collection('op_users').doc(ME.uid).collection('contacts').doc(u.uid).set({uid:u.uid,name:u.name||u.handle||'Contact',handle:u.handle||'',phone:u.phone||''});
      _members=(await listMembers()).map(m=>({uid:m.uid,name:m.name}));
      closeSheet(); toast('Contact ajouté : '+(u.name||u.handle)); if(_curView==='cont') viewCont();
    }catch(e){ $('acerr').innerHTML='<div class="err">'+esc(e.message||'Erreur')+'</div>'; if(btn)btn.disabled=false; }
  }

  // ---- APPELS (style WhatsApp : direct + groupe d'appel) ----
  function tms(t){ return t&&t.toMillis?t.toMillis():0; }
  async function viewAppel(){
    const up=isPro()? _myMeetings.filter(m=>m.scheduledAt && m.scheduledAt>Date.now()-3600000).sort((a,b)=>a.scheduledAt-b.scheduledAt) : [];
    let meetHtml=''; if(up.length){ meetHtml=`<div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin:0 2px 8px">Réunions à venir</div>`+
      up.map(m=>`<div class="meet" onclick="joinRoom('${m.id}','${esc((m.name||'').replace(/'/g,''))}')"><div class="ava" style="width:44px;height:44px;background:rgba(34,177,76,.18);color:#5fcf80">${ic('video',20)}</div><div class="info" style="flex:1"><div class="nm">${esc(m.name||'')}</div><div class="ds">${esc(fmtWhen(m.scheduledAt))}</div></div><div class="cd" data-t="${m.scheduledAt}">${esc(fmtCountdown(m.scheduledAt-Date.now()))}</div></div>`).join('')+`<div style="height:14px"></div>`; }
    const view=$('view'); view.innerHTML=`<div class="view-h"><h2>Appels</h2></div>
      ${meetHtml}
      <button class="btn block" style="margin-bottom:16px" onclick="newCall()">${ic('phone',18)}Nouvel appel</button>
      <div id="call-list"><p class="muted center">Chargement…</p></div>`;
    if(_meetTicker)clearInterval(_meetTicker); if(up.length) _meetTicker=setInterval(tickCountdowns,30000);
    try{
      const col=callsCol();
      const [a,b]=await Promise.all([ col.where('from','==',ME.uid).get(), col.where('members','array-contains',ME.uid).get() ]);
      const map={}; a.forEach(d=>map[d.id]={id:d.id,...d.data()}); b.forEach(d=>map[d.id]={id:d.id,...d.data()});
      const list=Object.values(map).sort((x,y)=>tms(y.ts)-tms(x.ts)).slice(0,60);
      let html=''; list.forEach(c=>{ const out=c.from===ME.uid; const grp=(c.members||[]).length>1;
        const who = grp ? ('Groupe ('+((c.memberNames||[]).length)+')') : (out? ((c.memberNames&&c.memberNames[0])||'Contact') : c.fromName);
        const missed = c.status==='missed'||c.status==='declined'; const d=c.ts&&c.ts.toDate?c.ts.toDate():null;
        html+=`<div class="row" onclick="recall('${c.id}')"><div class="ava" style="${avatarStyle(who)}">${grp?ic('users',20):ini(who)}</div><div class="info"><div class="nm" style="${missed?'color:#f87171':''}">${esc(who)}</div><div class="ds">${out?'Sortant':'Entrant'}${missed?' · manqué':''} · ${c.type==='audio'?'audio':'vidéo'}${d?' · '+d.toLocaleDateString('fr-FR')+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}):''}</div></div>${ic('phone',18)}</div>`; });
      $('call-list').innerHTML=html||'<p class="muted center">Aucun appel. Touchez « Nouvel appel ».</p>';
    }catch(e){ $('call-list').innerHTML='<div class="err">'+esc(e.message)+'</div>'; }
  }
  async function newCall(){
    openSheet('<p class="muted center">Chargement…</p>'); let chks='';
    try{ const list=await listMembers();
      list.forEach(m=>{ if(m.uid===ME.uid) return; chks+=`<div class="chk" data-uid="${esc(m.uid)}" data-name="${esc((m.name||'').replace(/"/g,'&quot;'))}" onclick="this.classList.toggle('sel')"><div class="ava" style="width:34px;height:34px;border-radius:10px;font-size:15px;${avatarStyle(m.name)}">${ini(m.name)}</div><div style="flex:1">${esc(m.name||'')}</div></div>`; }); }catch(e){}
    openSheet(`<h3 style="font-family:'Space Mono',monospace;font-size:16px;margin-bottom:8px">Nouvel appel</h3>

      <div id="ncerr"></div><div id="nc-members">${chks||'<p class="muted">Aucun contact.</p>'}</div>
      <div style="display:flex;gap:8px;margin-top:14px"><button class="btn" style="flex:1" onclick="launchCall('audio')">${ic('phone',18)}Audio</button><button class="btn" style="flex:1" onclick="launchCall('video')">${ic('video',18)}Vidéo</button></div>`);

  function launchCall(type){ const sel=[...document.querySelectorAll('#nc-members .chk.sel')]; if(!sel.length){ $('ncerr').innerHTML='<div class="err">Choisissez au moins une personne.</div>'; return; }
    closeSheet(); startCall(sel.map(x=>x.dataset.uid), sel.map(x=>x.dataset.name), type); }
  async function recall(id){ try{ const d=await callsCol().doc(id).get(); const c=d.data(); const out=c.from===ME.uid;
    const ids = out ? c.members : [c.from, ...(c.members||[]).filter(u=>u!==ME.uid)];
    const names = out ? c.memberNames : [c.fromName, ...((c.memberNames||[]))];
    startCall(ids, names, c.type||'video'); }catch(e){ alert('Erreur : '+(e.message||e)); } }

  let _activeCall=null,_callDocUnsub=null,_japi=null;
  async function startCall(ids, names, type){
    if(!ids||!ids.length) return;
    const room='CALL'+ME.uid.slice(0,6)+Date.now();
    const ref=callsCol().doc();
    try{ await ref.set({from:ME.uid,fromName:USER.name||ME.email,members:ids,memberNames:names||[],type:type||'video',room,status:'ringing',ts:FV()}); }catch(e){ alert('Erreur : '+(e.message||e)); return; }
    _activeCall={ref,answered:false,oneToOne:ids.length===1};
    if(_callDocUnsub)_callDocUnsub();
    _callDocUnsub=ref.onSnapshot(d=>{ if(!d.exists||!_activeCall) return; const st=d.data().status;
      if(st==='answered'){ _activeCall.answered=true; }
      else if(st==='declined' && _activeCall.oneToOne){ const nm=(names&&names[0])||'Le contact'; if(_callDocUnsub){_callDocUnsub();_callDocUnsub=null;} _activeCall=null; closeJitsi(); setTimeout(()=>alert(nm+' a refusé l\'appel.'),250); } });
    openJitsi(room, 'Appel · '+((names||[]).join(', ')), type==='audio');
  }
  function loadJitsi(){ return new Promise((res,rej)=>{ if(window.JitsiMeetExternalAPI) return res(); const s=document.createElement('script'); s.src='https://meet.jit.si/external_api.js'; s.onload=res; s.onerror=()=>rej(new Error('jitsi')); document.head.appendChild(s); }); }
  async function openJitsi(roomName,title,audioOnly){
    $('jitsi-name').textContent=title||'Appel'; { const _jw=$('jitsi').classList.contains('open'); $('jitsi').classList.add('open'); if(!_jw) pushBack(); }
    try{ await loadJitsi(); }catch(e){ $('jitsi-box').innerHTML='<p class="muted center" style="margin:auto;padding:30px">Connexion impossible (Internet requis).</p>'; return; }
    const room=(roomName).replace(/[^a-zA-Z0-9]/g,''); $('jitsi-box').innerHTML='';
    _japi=new JitsiMeetExternalAPI('meet.jit.si',{roomName:room,parentNode:$('jitsi-box'),userInfo:{displayName:USER.name||'Invité'},
      configOverwrite:{prejoinPageEnabled:false,startWithVideoMuted:!!audioOnly,disableDeepLinking:true,disableThirdPartyRequests:true,defaultLanguage:'fr'},
      interfaceConfigOverwrite:{SHOW_JITSI_WATERMARK:false,SHOW_WATERMARK_FOR_GUESTS:false,SHOW_BRAND_WATERMARK:false,JITSI_WATERMARK_LINK:'',MOBILE_APP_PROMO:false,HIDE_DEEP_LINKING_LOGO:true,SHOW_POWERED_BY:false,APP_NAME:'OP MESSAGES',NATIVE_APP_NAME:'OP MESSAGES',PROVIDER_NAME:'OP MESSAGES',DEFAULT_BACKGROUND:'#0a0e16',DISABLE_JOIN_LEAVE_NOTIFICATIONS:true,TOOLBAR_BUTTONS:['microphone','camera','desktop','tileview','hangup','chat','raisehand','participants-pane','settings']}});
    _japi.addEventListener('readyToClose',closeJitsi);
  }
  function joinRoom(id,name){ openJitsi('OPMSG'+((COMP&&COMP.id)||'perso')+id, name||'Réunion', false); }
  function closeJitsi(){ try{ if(_japi){_japi.dispose();_japi=null;} }catch(e){} $('jitsi-box').innerHTML=''; $('jitsi').classList.remove('open');
    if(_activeCall){ const ref=_activeCall.ref, ans=_activeCall.answered; _activeCall=null; if(_callDocUnsub){_callDocUnsub();_callDocUnsub=null;}
      ref.get().then(d=>{ if(!d.exists) return; const st=d.data().status; if(st==='ringing') ref.update({status: ans?'ended':'missed'}); else if(st==='answered') ref.update({status:'ended'}); }).catch(()=>{}); } }

  // ---- Appel entrant (sonnerie tant que l'app est ouverte) ----
  let _ringRef=null,_ringRefUnsub=null,_ringT=null,_callListenUnsub=null;
  function startCallListener(){
    if(_callListenUnsub)_callListenUnsub();
    _callListenUnsub=callsCol().where('members','array-contains',ME.uid).onSnapshot(qs=>{
      qs.docChanges().forEach(ch=>{ if(ch.type==='removed') return; const c=ch.doc.data(); const t=c.ts&&c.ts.toMillis?c.ts.toMillis():Date.now();
        if(c.status==='ringing' && c.from!==ME.uid && t>_loginTs-4000 && !_ringRef && !(_activeCall&&_activeCall.ref.id===ch.doc.id)) showRing(ch.doc.ref,c); });
    }, err=>{});
  }
  function showRing(ref,c){ _ringRef=ref;
    $('ring').innerHTML=`<div style="text-align:center"><div class="ring-av" style="${avatarStyle(c.fromName)}">${ini(c.fromName)}</div><div style="font-size:20px;font-weight:700;margin-top:14px">${esc(c.fromName)}</div><div class="muted" style="margin-top:2px">Appel ${c.type==='audio'?'audio':'vidéo'} entrant…</div>
      <div style="display:flex;gap:46px;justify-content:center;margin-top:32px"><div><button class="ring-btn decline" onclick="declineCall()">${ic('phone',26)}</button><div class="muted" style="margin-top:6px;font-size:12px">Refuser</div></div><div><button class="ring-btn accept" onclick="acceptCall('${c.room}','${c.type}')">${ic('phone',26)}</button><div class="muted" style="margin-top:6px;font-size:12px">Répondre</div></div></div></div>`;
    { const _rw=$('ring').classList.contains('open'); $('ring').classList.add('open'); if(!_rw) pushBack(); } ringStart();
    _ringRefUnsub=ref.onSnapshot(d=>{ if(!d.exists||d.data().status!=='ringing') hideRing(); });
  }
  function acceptCall(room,type){ const r=_ringRef; if(r) r.update({status:'answered'}).catch(()=>{}); hideRing(); _activeCall={ref:r,answered:true,oneToOne:false}; if(_callDocUnsub)_callDocUnsub(); openJitsi(room,'Appel',type==='audio'); }
  function declineCall(){ if(_ringRef) _ringRef.update({status:'declined'}).catch(()=>{}); hideRing(); }
  function hideRing(){ ringStop(); $('ring').classList.remove('open'); _ringRef=null; if(_ringRefUnsub){_ringRefUnsub();_ringRefUnsub=null;} }
  function ringStart(){ ringStop(); beep(); _ringT=setInterval(()=>beep(),1100); }
  function ringStop(){ if(_ringT){clearInterval(_ringT);_ringT=null;} }

  // ---- Réunions planifiées : invitation, compte à rebours, alerte 5 min ----
  function toast(m){ const t=$('toast'); if(!t) return; t.textContent=m; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),4500); }
  function fmtWhen(ms){ try{ const d=new Date(ms); return d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})+' à '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }catch(e){ return ''; } }
  function fmtCountdown(ms){ if(ms<=0) return 'en cours'; const s=Math.floor(ms/1000), d=Math.floor(s/86400), h=Math.floor(s%86400/3600), mn=Math.floor(s%3600/60);
    if(d>0) return 'dans '+d+' j '+h+' h'; if(h>0) return 'dans '+h+' h '+mn+' min'; if(mn>0) return 'dans '+mn+' min'; return 'dans <1 min'; }
  function tickCountdowns(){ document.querySelectorAll('.cd[data-t]').forEach(el=>{ el.textContent=fmtCountdown((+el.dataset.t)-Date.now()); }); }
  let _myMeetings=[],_alerted={},_meetAlertTimer=null,_meetTicker=null;
  function startMeetingWatch(){
    if(_meetWatchUnsub){ _meetWatchUnsub(); }
    _meetWatchUnsub=fs.collection('op_companies').doc(COMP.id).collection('rooms').where('members','array-contains',ME.uid).onSnapshot(qs=>{
      _myMeetings=[]; qs.forEach(d=>{ const r=d.data(); if(r.scheduledAt) _myMeetings.push({id:d.id,...r}); });
      qs.docChanges().forEach(ch=>{ if(ch.type!=='added') return; const r=ch.doc.data(); const ct=r.createdAt&&r.createdAt.toMillis?r.createdAt.toMillis():0;
        if(r.scheduledAt && r.createdBy!==ME.uid && ct>_loginTs-4000) toast('Réunion planifiée : « '+(r.name||'')+' » — '+fmtWhen(r.scheduledAt)); });
      if(_curView==='appel') viewAppel();
    }, err=>{});
    if(_meetAlertTimer)clearInterval(_meetAlertTimer); _meetAlertTimer=setInterval(checkMeetingAlerts,30000);
  }
  function checkMeetingAlerts(){ const now=Date.now(); _myMeetings.forEach(m=>{ const t=m.scheduledAt; if(!t) return; const diff=t-now;
    if(diff>0 && diff<=5*60000 && !_alerted[m.id]){ _alerted[m.id]=1; beep(); toast('⏰ Réunion « '+(m.name||'')+' » dans 5 minutes'); } }); }

  // ---- RÉUNIONS (séparé des appels) : salles visio + partage d'écran ----

    openSheet(`<h3 style="font-family:'Space Mono',monospace;font-size:16px;margin-bottom:6px">Réunions</h3>
      <p class="muted" style="margin-bottom:12px">Salles de visioconférence avec partage d'écran.</p>

      let reacts=''; if(m.reactions){ const ps=Object.entries(m.reactions).filter(([e,a])=>a&&a.length).map(([e,a])=>`<span style="background:rgba(127,127,127,.2);border-radius:100px;padding:1px 7px;font-size:12px">${e} ${a.length}</span>`); if(ps.length) reacts=`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:5px">${ps.join('')}</div>`; }

      if(id===lastMineId){ const mt=d.getTime(); const rd=Object.keys(_reads).filter(u=>u!==ME.uid && (_reads[u]||0)>=mt-2000).length; const rtxt=rd? (isDM?'Vu':'Vu par '+rd) : 'Envoyé'; html+=`<div style="align-self:flex-end;font-size:10.5px;color:var(--t3);margin:-3px 4px 2px">${rtxt}</div>`; }

    let c={},mem=[]; try{ const cd=await chDoc(id).get(); c=cd.data(); mem=c.members||[]; }catch(e){}
    let chks=''; try{ const list=await listMembers();
      list.forEach(m=>{ if(m.uid===ME.uid||mem.includes(m.uid)) return; chks+=`<div class="chk" data-uid="${esc(m.uid)}" onclick="this.classList.toggle('sel')"><div class="ava" style="width:34px;height:34px;border-radius:10px;font-size:15px;${avatarStyle(m.name)}">${ini(m.name)}</div><div style="flex:1">${esc(m.name||'')}</div></div>`; }); }catch(e){}
    openSheet(`<h3 style="font-family:'Space Mono',monospace;font-size:16px;margin-bottom:12px">Ajouter des membres</h3><div id="atgerr"></div>${chks||'<p class="muted">Tous vos contacts sont déjà dans le groupe.</p>'}<button class="btn block" style="margin-top:10px" onclick="saveAddToGroup('${id}')">Ajouter</button>`);
  }
  async function saveAddToGroup(id){ const sel=[...document.querySelectorAll('.chk.sel')].map(x=>x.dataset.uid); if(!sel.length){ closeSheet(); return; }
    try{ await chDoc(id).update({members:firebase.firestore.FieldValue.arrayUnion(...sel)}); closeSheet(); }catch(e){ const el=$('atgerr'); if(el) el.innerHTML='<div class="err">'+esc(e.message)+'</div>'; } }
  async function leaveGroup(id){ if(!confirm('Quitter ce groupe ?')) return;
    try{ await chDoc(id).update({members:firebase.firestore.FieldValue.arrayRemove(ME.uid)}); closeSheet(); closeChat(); showView('disc'); }catch(e){ alert('Erreur : '+(e.message||e)); } }
  function openAttach(){ openSheet(`<h3 style="font-family:'Space Mono',monospace;font-size:16px;margin-bottom:14px">Joindre</h3>
    <button class="btn block" style="margin-bottom:10px" onclick="closeSheet();$('imgpick').click()">${ic('image',18)}Photo (galerie ou appareil)</button>
    <button class="btn ghost block" style="margin-bottom:10px" onclick="closeSheet();$('filepick').click()">${ic('file',18)}Fichier / PDF</button>
    <button class="btn ghost block" onclick="closeSheet();pollForm()">${ic('poll',18)}Créer un sondage</button>`); }
  $('imgpick').addEventListener('change',function(e){ const f=e.target.files[0]; if(!f||!_curCh) return; const r=new FileReader();
    r.onload=()=>{ const img=new Image(); img.onload=async()=>{ let w=img.width,h=img.height; const mx=1000; if(w>mx||h>mx){ if(w>h){h=h*mx/w;w=mx;}else{w=w*mx/h;h=mx;} }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h);
      try{ await chMsgs().add({uid:ME.uid,name:USER.name||ME.email,img:cv.toDataURL('image/jpeg',0.7),ts:FV()}); }catch(err){ alert('Erreur photo : '+(err.message||err)); }
    }; img.src=r.result; }; r.readAsDataURL(f); e.target.value=''; });
  $('filepick').addEventListener('change',function(e){ const f=e.target.files[0]; if(!f||!_curCh) return;
    if(f.size>800000){ alert('Fichier trop volumineux (max 800 Ko).'); e.target.value=''; return; }
    const r=new FileReader(); r.onload=async()=>{ try{ await chMsgs().add({uid:ME.uid,name:USER.name||ME.email,file:{name:f.name,type:f.type||'',data:r.result},ts:FV()}); }catch(err){ alert('Erreur fichier : '+(err.message||err)); } }; r.readAsDataURL(f); e.target.value=''; });
  function openFile(id){ const f=_files[id]; if(!f) return; const pdf=/pdf/i.test(f.type)||/\.pdf$/i.test(f.name||'');
    if(pdf){ $('viewer-name').textContent=f.name||'Document'; $('viewer-frame').src=f.data; const _vw=$('viewer').classList.contains('open'); $('viewer').classList.add('open'); if(!_vw) pushBack(); }
    else { const a=document.createElement('a'); a.href=f.data; a.download=f.name||'fichier'; document.body.appendChild(a); a.click(); a.remove(); } }
  function closeViewer(){ $('viewer').classList.remove('open'); $('viewer-frame').src='about:blank'; }

  // ========== MENU / MEMBRES ==========
  function openMenu(){ openSheet(`<h3 style="font-family:'Space Mono',monospace;font-size:16px;margin-bottom:6px">${esc(MODE==='perso'?(USER.name||'OP MESSAGES'):COMP.name)}</h3>
    <p class="muted" style="margin-bottom:14px">${MODE==='perso'?'Compte perso · @'+esc(USER.handle||''):(IS_OWNER?'Vous êtes administrateur.':'Membre')}</p>
    <button class="btn block" style="margin-bottom:10px" onclick="closeSheet();showView('prof')">Mon profil & réglages</button>
    ${IS_OWNER?'<button class="btn ghost block" style="margin-bottom:10px" onclick="showInvite()">📨 Code d\'invitation rapide</button>':''}
    <a class="btn ghost block" href="index.html" style="margin-bottom:10px;text-decoration:none">🏠 Retour à TeamOP</a>
    <button class="btn ghost block" onclick="logout()">Déconnexion</button>`); }
  function viewProfile(){ const photo=USER.photo, theme=localStorage.getItem('opmsg_theme')||'auto';
    $('view').innerHTML=`<div class="view-h"><h2>Profil</h2></div>
      <div style="max-width:460px;margin:0 auto">
      <div style="text-align:center;margin-bottom:14px">
        ${photo?`<img src="${photo}" style="width:90px;height:90px;border-radius:26px;object-fit:cover">`:`<div class="ava" style="width:90px;height:90px;border-radius:26px;font-size:34px;margin:0 auto;${avatarStyle(USER.name)}">${ini(USER.name)}</div>`}
        <div style="font-size:17px;font-weight:600;margin-top:10px">${esc(USER.name||'')}</div>
        <div class="muted">${MODE==='perso'?'@'+esc(USER.handle||''):esc(COMP.name)+(IS_OWNER?' · admin':'')}</div>
        <div style="margin-top:8px"><span style="font-size:11px;${MODE==='perso'?'background:rgba(148,163,184,.2);color:var(--t2)':(isPro()?'background:rgba(34,177,76,.18);color:#5fcf80':'background:rgba(91,143,214,.2);color:var(--op-l)')};padding:4px 11px;border-radius:100px;font-weight:600">${MODE==='perso'?'Compte perso · sans réunions':(isPro()?'Compte entreprise · accès complet':'Utilisateur · sans réunions')}</span></div>
        ${MODE==='perso'?`<p class="muted" style="font-size:12px;margin-top:8px">Partagez votre identifiant <b>@${esc(USER.handle||'')}</b> pour qu'on vous ajoute.</p>`:''}
        <button class="btn ghost sm" style="margin-top:12px" onclick="$('photopick').click()">Changer la photo</button>
      </div>
      ${isPro()?`<div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin:6px 2px 8px">Code à transmettre aux employés</div>
      <button class="btn ghost block" style="margin-bottom:6px" onclick="showInvite()">Voir / partager le code d'invitation</button>
      <p class="muted" style="font-size:12px;margin:0 2px 6px">Vos employés téléchargent l'app, choisissent « Rejoindre » et entrent ce code.</p>`:''}
      <div class="field"><label>Nom affiché</label><input id="pf-name" value="${esc(USER.name||'')}"></div>
      <div class="field"><label>Téléphone</label><input id="pf-phone" type="tel" value="${esc(USER.phone||'')}" placeholder="06 12 34 56 78"></div>
      <button class="btn block" onclick="saveName()">Enregistrer</button>
      <div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin:18px 2px 8px">Thème</div>
      <div style="display:flex;gap:8px">${['auto','light','dark'].map(t=>`<button class="btn ${theme===t?'':'ghost'} sm" style="flex:1" onclick="setTheme('${t}')">${t==='auto'?'Auto':t==='light'?'Jour':'Nuit'}</button>`).join('')}</div>
      <div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin:18px 2px 8px">Réglages</div>
      <button class="btn ghost block" style="margin-bottom:10px" onclick="toggleSound()">Son des messages : <b>${soundOn()?'Activé':'Coupé'}</b></button>
      <button class="btn ghost block" style="margin-bottom:10px" onclick="changePass()">Changer le mot de passe</button>
      <div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin:18px 2px 8px">Compte</div>
      <a class="btn ghost block" href="index.html" style="margin-bottom:10px;text-decoration:none">Retour à TeamOP</a>
      <button class="btn block" style="background:rgba(248,113,113,.15);color:#fca5a5" onclick="logout()">Déconnexion</button>
      </div>`; }
  async function saveName(){ const n=($('pf-name').value||'').trim(); if(!n) return; const phone=($('pf-phone')&&$('pf-phone').value||'').trim();
    try{ await fs.collection('op_users').doc(ME.uid).set({name:n,phone},{merge:true}); if(MODE!=='perso') await fs.collection('op_companies').doc(COMP.id).collection('members').doc(ME.uid).set({name:n,phone},{merge:true}); USER.name=n; USER.phone=phone; toast('Profil enregistré'); if(_curView==='prof') viewProfile(); }catch(e){ alert('Erreur : '+(e.message||e)); } }
  async function changePass(){ const np=prompt('Nouveau mot de passe (min. 6 caractères) :'); if(np==null) return; if((np||'').length<6){ alert('6 caractères minimum.'); return; }
    try{ await auth.currentUser.updatePassword(np); alert('✅ Mot de passe modifié.'); }
    catch(e){ if((e.code||'')==='auth/requires-recent-login') alert('Sécurité : déconnecte-toi, reconnecte-toi, puis réessaie.'); else alert('Erreur : '+(e.message||e)); } }
  $('photopick').addEventListener('change',function(e){ const f=e.target.files[0]; if(!f) return; const r=new FileReader();
    r.onload=()=>{ const img=new Image(); img.onload=async()=>{ let w=img.width,h=img.height; const mx=256; if(w>mx||h>mx){ if(w>h){h=h*mx/w;w=mx;}else{w=w*mx/h;h=mx;} }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h); const data=cv.toDataURL('image/jpeg',0.8);
      try{ await fs.collection('op_users').doc(ME.uid).set({photo:data},{merge:true}); if(MODE!=='perso') await fs.collection('op_companies').doc(COMP.id).collection('members').doc(ME.uid).set({photo:data},{merge:true}); USER.photo=data; if(_curView==='prof') viewProfile(); }catch(err){ alert('Erreur : '+(err.message||err)); }
    }; img.src=r.result; }; r.readAsDataURL(f); e.target.value=''; });
  async function showInvite(){ const d=await fs.collection('op_companies').doc(COMP.id).get(); const code=d.data().code;
    openSheet(`<h3 style="font-family:'Space Mono',monospace;font-size:16px;margin-bottom:8px">Code d'invitation</h3>
      <p class="muted" style="margin-bottom:12px">Donnez ce code à vos employés. Ils ouvrent l'app, choisissent « Rejoindre », entrent ce code et leur nom — aucun compte à créer pour eux.</p>
      <div style="background:var(--card2);border:1px solid var(--brd2);border-radius:12px;padding:16px;text-align:center;font-family:'Space Mono',monospace;font-size:28px;letter-spacing:4px;color:var(--op-l)">${esc(code)}</div>
      <button class="btn block" style="margin-top:14px" onclick="navigator.clipboard&&navigator.clipboard.writeText('${esc(code)}');this.textContent='✅ Copié'">📋 Copier</button>`); }
  function addMemberForm(){
    openSheet(`<h3 style="font-family:'Space Mono',monospace;font-size:16px;margin-bottom:8px">Ajouter un membre</h3>
      <p class="muted" style="margin-bottom:14px">Créez le compte d'un employé : prénom, nom, identifiant et mot de passe. Donnez-lui ces accès — il se connecte avec.</p>
      <div id="amerr"></div>
      <div class="field"><label>Prénom</label><input id="am-prenom" placeholder="Marie"></div>
      <div class="field"><label>Nom</label><input id="am-nom" placeholder="Dupont"></div>
      <div class="field"><label>Identifiant</label><input id="am-login" placeholder="ex : mdupont" autocapitalize="off"></div>
      <div class="field"><label>Téléphone (facultatif)</label><input id="am-phone" type="tel" placeholder="06 12 34 56 78"></div>
      <div class="field"><label>Mot de passe (min. 6)</label><input id="am-pass" placeholder="••••••"></div>
      <button class="btn block" id="am-btn" onclick="addMember()">Créer le compte</button>`);
  }
  async function addMember(){
    const errBox=m=>{ const el=$('amerr'); if(el) el.innerHTML='<div class="err">'+esc(m)+'</div>'; };
    const name=(($('am-prenom').value||'').trim()+' '+($('am-nom').value||'').trim()).trim();
    const ident=($('am-login').value||'').trim().toLowerCase().replace(/[^a-z0-9._@-]/g,'');
    const pass=($('am-pass').value||'');
    if(!name||ident.length<3){ errBox('Indiquez un prénom et un identifiant (≥3 caractères).'); return; }
    if(pass.length<6){ errBox('Mot de passe : 6 caractères minimum.'); return; }
    const email=loginEmail(ident); const btn=$('am-btn'); if(btn) btn.disabled=true; let sec=null;
    try{
      sec=firebase.initializeApp(FB_CONFIG,'sec'+Date.now());
      let cred; try{ cred=await sec.auth().createUserWithEmailAndPassword(email,pass); }
      catch(e){ if((e.code||'')==='auth/email-already-in-use') errBox('Cet identifiant existe déjà.'); else errBox(e.message||'Erreur'); if(btn)btn.disabled=false; await sec.delete(); return; }
      const sfs=sec.firestore();
      const phone=($('am-phone')&&$('am-phone').value||'').trim();
      await sfs.collection('op_users').doc(cred.user.uid).set({uid:cred.user.uid,email,name,phone,role:'classique',companyId:COMP.id,companyName:COMP.name});
      await sfs.collection('op_companies').doc(COMP.id).collection('members').doc(cred.user.uid).set({uid:cred.user.uid,name,phone,role:'classique',ts:FV()});
      await sec.auth().signOut(); await sec.delete(); sec=null; _lastCreds={ident,pass,company:COMP.name};
      openSheet(`<div class="ok">✅ Compte créé pour <b>${esc(name)}</b>.</div>
        <p class="muted" style="margin:10px 0">Accès à donner à l'employé :</p>
        <div style="background:var(--card2);border:1px solid var(--brd2);border-radius:12px;padding:14px;font-size:14px;line-height:1.7">Identifiant : <b>${esc(ident)}</b><br>Mot de passe : <b>${esc(pass)}</b></div>
        <div style="display:flex;gap:8px;margin-top:14px"><button class="btn" style="flex:1" onclick="shareCreds()">📤 Partager</button><button class="btn ghost" style="flex:1" onclick="copyCreds(this)">📋 Copier</button></div>
        <button class="btn ghost block" style="margin-top:10px" onclick="closeSheet();showView('cont')">← Retour aux contacts</button>`);
    }catch(e){ errBox(e.message||'Erreur'); if(btn)btn.disabled=false; try{ if(sec) await sec.delete(); }catch(_){} }
  }
  function credsText(){ if(!_lastCreds) return ''; return `Vos accès OP MESSAGES — ${_lastCreds.company}\nIdentifiant : ${_lastCreds.ident}\nMot de passe : ${_lastCreds.pass}\n\nConnexion : https://teamop.fr/messages.html`; }
  async function shareCreds(){ const t=credsText(); if(!t) return; if(navigator.share){ try{ await navigator.share({title:'Accès OP MESSAGES',text:t}); }catch(e){} } else copyCreds(); }
  function copyCreds(btn){ const t=credsText(); if(!t) return; if(navigator.clipboard){ navigator.clipboard.writeText(t).then(()=>{ if(btn){ const o=btn.textContent; btn.textContent='✅ Copié'; setTimeout(()=>btn.textContent=o,1600);} }); } else alert(t); }

  function openSheet(html){ const wasOpen=$('sheet').classList.contains('open'); $('sheet-c').innerHTML=html+'<p class="center" style="margin-top:14px"><a class="link" onclick="closeSheet()">Fermer</a></p>'; $('sheet').classList.add('open'); if(!wasOpen) pushBack(); }
  function closeSheet(){ $('sheet').classList.remove('open'); }
  $('sheet').addEventListener('click',e=>{ if(e.target.id==='sheet') closeSheet(); });

  // ===== Bouton « retour » du téléphone : ferme l'écran ouvert au lieu de quitter l'app =====
  function pushBack(){ try{ history.pushState({op:1},''); }catch(e){} }
  function anyOverlayOpen(){ return ['viewer','jitsi','ring','sheet','chat'].some(x=>{ const el=$(x); return el && el.classList.contains('open'); }); }
  function closeTopOverlay(){
    if($('viewer')&&$('viewer').classList.contains('open')){ closeViewer(); return true; }
    if($('jitsi')&&$('jitsi').classList.contains('open')){ closeJitsi(); return true; }
    if($('ring')&&$('ring').classList.contains('open')){ declineCall(); return true; }
    if($('sheet')&&$('sheet').classList.contains('open')){ closeSheet(); return true; }
    if($('chat')&&$('chat').classList.contains('open')){ closeChat(); return true; }
    return false;
  }
  window.addEventListener('popstate', function(){ if(anyOverlayOpen()){ closeTopOverlay(); pushBack(); } });
  try{ history.replaceState({op:0},''); }catch(e){}
</script>
</body>
</html>
