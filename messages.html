<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a1020">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OP MESSAGES">
<link rel="manifest" href="manifest-opmsg.webmanifest">
<link rel="apple-touch-icon" href="icons/opmsg-apple-touch.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/opmsg-favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/opmsg-192.png">
<title>OP MESSAGES — Messagerie d'entreprise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080d18;--bg1:#0d1426;--card:#101a30;--card2:#0c1424;--brd:rgba(255,255,255,.09);--brd2:rgba(255,255,255,.14);--t1:#fff;--t2:rgba(231,238,248,.74);--t3:rgba(231,238,248,.46);--op:#5b8fd6;--op-l:#8fb6e8;--red:#f87171}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--t1);font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;height:100dvh;overflow:hidden}
  body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 60% 45% at 12% 0%, rgba(91,143,214,.16), transparent 60%);pointer-events:none}
  .wrap{position:relative;z-index:1;height:100dvh;display:flex;flex-direction:column}
  .center-page{height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
  .panel{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--brd);border-radius:22px;padding:26px;width:100%;max-width:420px}
  .logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:6px}
  .logo .lico{width:46px;height:46px;border-radius:13px;background:var(--op);display:flex;align-items:center;justify-content:center;font-size:24px}
  .logo b{font-family:'Space Mono',monospace;letter-spacing:2px;font-size:18px}
  .sub{text-align:center;color:var(--t2);font-size:14px;margin:4px 0 20px}
  .tabs{display:flex;gap:8px;margin-bottom:18px}
  .tab{flex:1;text-align:center;padding:11px;border-radius:11px;border:1px solid var(--brd);background:var(--card2);cursor:pointer;font-weight:600;font-size:14px;color:var(--t2)}
  .tab.active{background:rgba(91,143,214,.16);border-color:rgba(91,143,214,.4);color:var(--op-l)}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
  .field input{width:100%;background:var(--card2);border:1px solid var(--brd2);border-radius:11px;padding:13px 14px;color:var(--t1);font-size:15px;font-family:inherit}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--op);color:#06121f;border:none;border-radius:12px;padding:13px 20px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;text-decoration:none}
  .btn:hover{filter:brightness(1.08)}.btn.ghost{background:transparent;border:1px solid var(--brd2);color:var(--t1)}.btn.block{width:100%}.btn.sm{padding:9px 13px;font-size:13px;border-radius:10px}
  .muted{color:var(--t3);font-size:13px}.center{text-align:center}.hide{display:none!important}
  .err{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);color:#fca5a5;border-radius:10px;padding:10px 13px;font-size:13.5px;margin-bottom:12px}
  .ok{background:rgba(34,177,76,.12);border:1px solid rgba(34,177,76,.3);color:#5fcf80;border-radius:10px;padding:10px 13px;font-size:13.5px;margin-bottom:12px}
  a.link{color:var(--op-l);cursor:pointer;text-decoration:underline;font-size:13.5px}
  /* CHAT */
  .topbar{display:flex;align-items:center;gap:12px;padding:calc(10px + env(safe-area-inset-top)) 16px 10px;background:rgba(13,20,38,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--brd)}
  .topbar .av{width:40px;height:40px;border-radius:12px;background:var(--op);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  .topbar .ti{flex:1;min-width:0}
  .topbar .ti b{font-size:15px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .topbar .ti span{font-size:11.5px;color:var(--t3)}
  .topbar .ic{width:38px;height:38px;border-radius:10px;border:1px solid var(--brd2);background:transparent;color:var(--t2);font-size:16px;cursor:pointer}
  .stream{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
  .day{align-self:center;font-size:11px;color:var(--t3);background:var(--card2);border:1px solid var(--brd);padding:3px 12px;border-radius:100px;margin:6px 0}
  .m{max-width:78%;padding:9px 13px;border-radius:15px;font-size:14.5px;line-height:1.45;position:relative;word-wrap:break-word}
  .m.them{align-self:flex-start;background:var(--card);border:1px solid var(--brd);border-bottom-left-radius:5px}
  .m.me{align-self:flex-end;background:var(--op);color:#06121f;border-bottom-right-radius:5px}
  .m .who{font-size:11.5px;font-weight:700;color:var(--op-l);margin-bottom:2px}
  .m.me .who{color:#06121f;opacity:.7}
  .m img{max-width:100%;border-radius:10px;margin-top:6px;display:block;cursor:pointer}
  .m .filechip{display:flex;align-items:center;gap:8px;margin-top:6px;padding:9px 12px;background:rgba(255,255,255,.1);border:1px solid var(--brd2);border-radius:10px;color:inherit;text-decoration:none;font-size:13.5px;word-break:break-all}
  .m.me .filechip{background:rgba(0,0,0,.12);border-color:rgba(0,0,0,.15)}
  .m .t{font-size:10px;opacity:.6;margin-top:3px;text-align:right}
  .composer{display:flex;align-items:center;gap:8px;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:rgba(13,20,38,.92);border-top:1px solid var(--brd)}
  .composer .ic{width:42px;height:42px;border-radius:12px;border:1px solid var(--brd2);background:transparent;color:var(--t2);font-size:20px;cursor:pointer;flex-shrink:0}
  .composer input{flex:1;background:var(--card2);border:1px solid var(--brd2);border-radius:22px;padding:12px 16px;color:var(--t1);font-size:15px;font-family:inherit}
  .composer .send{width:46px;height:46px;border-radius:50%;background:var(--op);color:#06121f;border:none;font-size:18px;cursor:pointer;flex-shrink:0}
  .sheet{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.55);display:none;align-items:flex-end}
  .sheet.open{display:flex}
  .sheet-c{background:var(--bg1);border:1px solid var(--brd);border-radius:22px 22px 0 0;width:100%;max-width:520px;margin:0 auto;padding:22px 18px calc(22px + env(safe-area-inset-bottom));max-height:80dvh;overflow:auto}
  .mrow{display:flex;align-items:center;gap:12px;padding:10px 4px;border-bottom:1px solid var(--brd)}
  .mrow .ma{width:38px;height:38px;border-radius:11px;background:var(--card);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--op-l)}
  .viewer{position:fixed;inset:0;z-index:60;background:#0a0e16;display:none;flex-direction:column}
  .viewer.open{display:flex}
  .viewer-bar{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:calc(10px + env(safe-area-inset-top)) 14px 10px;border-bottom:1px solid var(--brd)}
  .viewer iframe{flex:1;border:none;width:100%;background:#fff}
</style>
</head>
<body>
<div class="wrap" id="root">
  <div class="center-page"><div class="panel center"><p class="muted">Chargement…</p></div></div>
</div>

<input type="file" id="imgpick" accept="image/*" style="display:none">
<input type="file" id="filepick" style="display:none">
<div class="sheet" id="sheet"><div class="sheet-c" id="sheet-c"></div></div>
<div class="viewer" id="viewer">
  <div class="viewer-bar"><span id="viewer-name" style="font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span><button onclick="closeViewer()" style="background:transparent;border:1px solid var(--brd2);color:var(--t1);border-radius:9px;padding:7px 13px;font-size:13px;cursor:pointer">✕ Fermer</button></div>
  <iframe id="viewer-frame" title="Document"></iframe>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  if ('serviceWorker' in navigator) { window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); }); }
  const FB_CONFIG={ apiKey:"AIzaSyAbah03sO4f4LyNhvmig0Pn00lz1sHSpT8", authDomain:"elan-gestion.firebaseapp.com", projectId:"elan-gestion", storageBucket:"elan-gestion.firebasestorage.app", messagingSenderId:"910528393731", appId:"1:910528393731:web:128d97b6a3269fb6d21436" };
  firebase.initializeApp(FB_CONFIG);
  const auth=firebase.auth(), fs=firebase.firestore();
  const $=id=>document.getElementById(id);
  const esc=s=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const root=$('root');
  let ME=null, USER=null, COMP=null, _unsub=null, _files={};
  function openFile(id){ const f=_files[id]; if(!f) return; const pdf=/pdf/i.test(f.type)||/\.pdf$/i.test(f.name||'');
    if(pdf){ $('viewer-name').textContent=f.name||'Document'; $('viewer-frame').src=f.data; $('viewer').classList.add('open'); }
    else { const a=document.createElement('a'); a.href=f.data; a.download=f.name||'fichier'; document.body.appendChild(a); a.click(); a.remove(); } }
  function closeViewer(){ $('viewer').classList.remove('open'); $('viewer-frame').src='about:blank'; }

  function siretValid(s){ return /^\d{14}$/.test((s||'').replace(/\s/g,'')); }
  function code6(){ const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let r=''; const a=crypto.getRandomValues(new Uint8Array(6)); a.forEach(b=>r+=c[b%c.length]); return r; }

  auth.onAuthStateChanged(async user=>{
    if(_unsub){_unsub();_unsub=null;}
    if(!user){ ME=null; USER=null; COMP=null; renderAuth(); return; }
    ME=user;
    let us; try{ us=await fs.collection('op_users').doc(user.uid).get(); }catch(e){}
    USER = (us&&us.exists)?us.data():{uid:user.uid, email:user.email, name:(user.email||'Utilisateur').split('@')[0]};
    if(USER && USER.companyId){ COMP={id:USER.companyId, name:USER.companyName}; renderChat(); }
    else renderSetup();
  });

  // ---------- AUTH ----------
  function renderAuth(){
    root.innerHTML=`<div class="center-page"><div class="panel">
      <div class="logo"><img src="icons/opmsg-512.png" alt="OP MESSAGES" style="width:48px;height:48px;border-radius:13px"><b>OP MESSAGES</b></div>
      <p class="sub">La messagerie dédiée aux entreprises</p>
      <div class="tabs"><div class="tab active" id="t-l" onclick="aTab('l')">Se connecter</div><div class="tab" id="t-s" onclick="aTab('s')">Créer un compte</div></div>
      <div id="aerr"></div>
      <div id="sf" class="hide"><div class="field"><label>Votre nom</label><input id="a-name" placeholder="Prénom Nom"></div></div>
      <div class="field"><label>E-mail</label><input id="a-email" type="email" placeholder="vous@entreprise.fr"></div>
      <div class="field"><label>Mot de passe</label><input id="a-pass" type="password" placeholder="••••••••"></div>
      <button class="btn block" id="a-sub" onclick="aSubmit()">Se connecter</button>
      <p class="center" style="margin-top:14px"><a class="link" href="index.html">← Retour à TeamOP</a></p>
    </div></div>`;
  }
  let aMode='l';
  function aTab(m){ aMode=m; $('t-l').classList.toggle('active',m==='l'); $('t-s').classList.toggle('active',m==='s'); $('sf').classList.toggle('hide',m!=='s'); $('a-sub').textContent=m==='s'?'Créer mon compte':'Se connecter'; $('aerr').innerHTML=''; }
  async function aSubmit(){
    const email=($('a-email').value||'').trim(), pass=$('a-pass').value||'';
    if(!email||!pass){ $('aerr').innerHTML='<div class="err">E-mail et mot de passe requis.</div>'; return; }
    $('a-sub').disabled=true;
    try{
      if(aMode==='s'){ if(pass.length<6) throw {message:'Mot de passe : 6 caractères minimum.'};
        const cred=await auth.createUserWithEmailAndPassword(email,pass);
        await fs.collection('op_users').doc(cred.user.uid).set({uid:cred.user.uid,email,name:($('a-name').value||'').trim()||email.split('@')[0]});
      } else await auth.signInWithEmailAndPassword(email,pass);
    }catch(e){ $('aerr').innerHTML='<div class="err">'+esc(aMsg(e))+'</div>'; $('a-sub').disabled=false; }
  }
  function aMsg(e){ const c=(e&&e.code)||'';
    if(c==='auth/email-already-in-use')return 'Cet e-mail a déjà un compte. Connectez-vous.';
    if(c==='auth/invalid-email')return 'E-mail invalide.';
    if(c==='auth/wrong-password'||c==='auth/invalid-credential')return 'E-mail ou mot de passe incorrect.';
    if(c==='auth/user-not-found')return 'Aucun compte avec cet e-mail.';
    return (e&&e.message)||'Erreur.'; }

  // ---------- SETUP ENTREPRISE ----------
  function renderSetup(){
    root.innerHTML=`<div class="center-page"><div class="panel">
      <div class="logo"><div class="lico">🏢</div><b>OP MESSAGES</b></div>
      <p class="sub">Bonjour ${esc((USER&&USER.name)||'')} — rejoignez ou créez votre entreprise</p>
      <div class="tabs"><div class="tab active" id="s-c" onclick="sTab('c')">Créer mon entreprise</div><div class="tab" id="s-j" onclick="sTab('j')">Rejoindre (code)</div></div>
      <div id="serr"></div>
      <div id="screate">
        <div class="field"><label>Nom de l'entreprise</label><input id="c-name" placeholder="Ex : Dupont SARL"></div>
        <div class="field"><label>Numéro SIRET (14 chiffres)</label><input id="c-siret" inputmode="numeric" placeholder="123 456 789 00012"></div>
        <button class="btn block" onclick="createCompany()">Créer l'entreprise</button>
      </div>
      <div id="sjoin" class="hide">
        <div class="field"><label>Code d'invitation</label><input id="j-code" placeholder="Ex : 4FK7P2" style="text-transform:uppercase"></div>
        <button class="btn block" onclick="joinCompany()">Rejoindre</button>
      </div>
      <p class="center" style="margin-top:14px"><a class="link" onclick="auth.signOut()">Déconnexion</a></p>
    </div></div>`;
  }
  function sTab(m){ $('s-c').classList.toggle('active',m==='c'); $('s-j').classList.toggle('active',m==='j'); $('screate').classList.toggle('hide',m!=='c'); $('sjoin').classList.toggle('hide',m!=='j'); $('serr').innerHTML=''; }
  async function createCompany(){
    const name=($('c-name').value||'').trim(), siret=($('c-siret').value||'').replace(/\s/g,'');
    if(!name){ $('serr').innerHTML='<div class="err">Indiquez le nom de l\'entreprise.</div>'; return; }
    if(!siretValid(siret)){ $('serr').innerHTML='<div class="err">Le SIRET doit comporter 14 chiffres.</div>'; return; }
    try{
      const ref=fs.collection('op_companies').doc();
      const code=code6();
      await ref.set({name,siret,code,ownerUid:ME.uid,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
      await ref.collection('members').doc(ME.uid).set({uid:ME.uid,name:USER.name||ME.email,ts:firebase.firestore.FieldValue.serverTimestamp()});
      await fs.collection('op_users').doc(ME.uid).set({uid:ME.uid,email:ME.email,name:USER.name||ME.email,companyId:ref.id,companyName:name},{merge:true});
      COMP={id:ref.id,name}; USER.companyId=ref.id; USER.companyName=name; renderChat();
    }catch(e){ $('serr').innerHTML='<div class="err">'+esc(e.message||'Erreur')+'</div>'; }
  }
  async function joinCompany(){
    const code=($('j-code').value||'').trim().toUpperCase();
    if(code.length<4){ $('serr').innerHTML='<div class="err">Entrez le code reçu.</div>'; return; }
    try{
      const qs=await fs.collection('op_companies').where('code','==',code).limit(1).get();
      if(qs.empty){ $('serr').innerHTML='<div class="err">Aucune entreprise pour ce code.</div>'; return; }
      const doc=qs.docs[0]; const name=doc.data().name;
      await doc.ref.collection('members').doc(ME.uid).set({uid:ME.uid,name:USER.name||ME.email,ts:firebase.firestore.FieldValue.serverTimestamp()});
      await fs.collection('op_users').doc(ME.uid).set({uid:ME.uid,email:ME.email,name:USER.name||ME.email,companyId:doc.id,companyName:name},{merge:true});
      COMP={id:doc.id,name}; USER.companyId=doc.id; USER.companyName=name; renderChat();
    }catch(e){ $('serr').innerHTML='<div class="err">'+esc(e.message||'Erreur')+'</div>'; }
  }

  // ---------- CHAT ----------
  function renderChat(){
    root.innerHTML=`
      <div class="topbar">
        <img src="icons/opmsg-512.png" alt="" style="width:40px;height:40px;border-radius:12px;flex-shrink:0">
        <div class="av" style="display:none"></div>
        <div class="ti"><b>${esc(COMP.name)}</b><span>Discussion d'équipe</span></div>
        <button class="ic" onclick="openMembers()" title="Membres">👥</button>
        <button class="ic" onclick="openMenu()" title="Menu">⋯</button>
      </div>
      <div class="stream" id="stream"><p class="muted center" style="margin:auto">Chargement des messages…</p></div>
      <div class="composer">
        <button class="ic" onclick="$('imgpick').click()" title="Photo / galerie">🖼️</button>
        <button class="ic" onclick="$('filepick').click()" title="Fichier">📎</button>
        <input id="msg" placeholder="Message…" onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="send" onclick="sendMsg()">➤</button>
      </div>`;
    listen();
  }
  function fmtDay(d){ return d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'}); }
  function listen(){
    if(_unsub)_unsub();
    _unsub=fs.collection('op_companies').doc(COMP.id).collection('messages').orderBy('ts','asc').limitToLast(300).onSnapshot(qs=>{
      const s=$('stream'); if(!s) return; let html=''; let lastDay='';
      qs.forEach(doc=>{ const m=doc.data(); const d=m.ts&&m.ts.toDate?m.ts.toDate():new Date();
        const day=fmtDay(d); if(day!==lastDay){ html+=`<div class="day">${esc(day)}</div>`; lastDay=day; }
        const mine=m.uid===ME.uid; const time=d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
        let body=m.text?esc(m.text):'';
        if(m.img) body+=`<img src="${m.img}" onclick="window.open(this.src)">`;
        if(m.file){ _files[doc.id]=m.file; const pdf=/pdf/i.test(m.file.type)||/\.pdf$/i.test(m.file.name||'');
          body+=`<div class="filechip" onclick="openFile('${doc.id}')">${pdf?'📄':'📎'} ${esc(m.file.name)}${pdf?' <span style="opacity:.6">· voir</span>':' <span style="opacity:.6">· ouvrir</span>'}</div>`; }
        html+=`<div class="m ${mine?'me':'them'}">${mine?'':`<div class="who">${esc(m.name||'')}</div>`}${body}<div class="t">${time}</div></div>`;
      });
      s.innerHTML=html||'<p class="muted center" style="margin:auto">Aucun message. Dites bonjour 👋</p>';
      s.scrollTop=s.scrollHeight;
    }, err=>{ const s=$('stream'); if(s) s.innerHTML='<div class="err">'+esc(err.message)+'</div>'; });
  }
  async function sendMsg(){
    const inp=$('msg'); const text=(inp.value||'').trim(); if(!text) return; inp.value='';
    try{ await fs.collection('op_companies').doc(COMP.id).collection('messages').add({uid:ME.uid,name:USER.name||ME.email,text,ts:firebase.firestore.FieldValue.serverTimestamp()}); }
    catch(e){ alert('Erreur : '+(e.message||e)); }
  }
  $('imgpick').addEventListener('change',function(e){ const f=e.target.files[0]; if(!f) return; const r=new FileReader();
    r.onload=()=>{ const img=new Image(); img.onload=async()=>{ let w=img.width,h=img.height; const max=1000; if(w>max||h>max){ if(w>h){h=h*max/w;w=max;}else{w=w*max/h;h=max;} }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h);
      const data=cv.toDataURL('image/jpeg',0.7);
      try{ await fs.collection('op_companies').doc(COMP.id).collection('messages').add({uid:ME.uid,name:USER.name||ME.email,img:data,ts:firebase.firestore.FieldValue.serverTimestamp()}); }catch(err){ alert('Erreur photo : '+(err.message||err)); }
    }; img.src=r.result; }; r.readAsDataURL(f); e.target.value=''; });

  $('filepick').addEventListener('change',function(e){ const f=e.target.files[0]; if(!f) return;
    if(f.size>800000){ alert('Fichier trop volumineux (max 800 Ko pour l\'instant). Le partage de gros fichiers arrivera bientôt.'); e.target.value=''; return; }
    const r=new FileReader();
    r.onload=async()=>{ try{ await fs.collection('op_companies').doc(COMP.id).collection('messages').add({uid:ME.uid,name:USER.name||ME.email,file:{name:f.name,type:f.type||'',data:r.result},ts:firebase.firestore.FieldValue.serverTimestamp()}); }catch(err){ alert('Erreur fichier : '+(err.message||err)); } };
    r.readAsDataURL(f); e.target.value=''; });

  function openMenu(){ openSheet(`<h3 style="font-family:'Space Mono',monospace;font-size:16px;margin-bottom:14px">${esc(COMP.name)}</h3>
    <button class="btn block" style="margin-bottom:10px" onclick="showInvite()">📨 Inviter un collègue (code)</button>
    <a class="btn ghost block" href="index.html" style="margin-bottom:10px;text-decoration:none">🏠 Retour à TeamOP</a>
    <button class="btn ghost block" onclick="auth.signOut();closeSheet()">Déconnexion</button>`); }
  async function showInvite(){
    const doc=await fs.collection('op_companies').doc(COMP.id).get(); const code=doc.data().code;
    openSheet(`<h3 style="font-family:'Space Mono',monospace;font-size:16px;margin-bottom:8px">Inviter dans ${esc(COMP.name)}</h3>
      <p class="muted" style="margin-bottom:12px">Donnez ce code à vos collègues. Ils créent un compte sur OP MESSAGES puis « Rejoindre (code) ».</p>
      <div style="background:var(--card2);border:1px solid var(--brd2);border-radius:12px;padding:16px;text-align:center;font-family:'Space Mono',monospace;font-size:28px;letter-spacing:4px;color:var(--op-l)">${esc(code)}</div>
      <button class="btn block" style="margin-top:14px" onclick="navigator.clipboard&&navigator.clipboard.writeText('${esc(code)}');this.textContent='✅ Copié'">📋 Copier le code</button>`);
  }
  async function openMembers(){
    openSheet('<p class="muted">Chargement…</p>');
    const qs=await fs.collection('op_companies').doc(COMP.id).collection('members').get();
    let html=`<h3 style="font-family:'Space Mono',monospace;font-size:16px;margin-bottom:14px">Membres (${qs.size})</h3>`;
    qs.forEach(d=>{ const m=d.data(); html+=`<div class="mrow"><div class="ma">${esc((m.name||'?').slice(0,1).toUpperCase())}</div><div><div style="font-size:14.5px">${esc(m.name||'')}</div>${m.uid===ME.uid?'<div class="muted">vous</div>':''}</div></div>`; });
    html+=`<button class="btn block" style="margin-top:16px" onclick="showInvite()">📨 Inviter un collègue</button>`;
    openSheet(html);
  }
  function openSheet(html){ $('sheet-c').innerHTML=html+'<p class="center" style="margin-top:14px"><a class="link" onclick="closeSheet()">Fermer</a></p>'; $('sheet').classList.add('open'); }
  function closeSheet(){ $('sheet').classList.remove('open'); }
  $('sheet').addEventListener('click',e=>{ if(e.target.id==='sheet') closeSheet(); });
</script>
</body>
</html>
