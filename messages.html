<style>
  /* ══ THÈME OFFICIEL TEAM OP — OP MESSAGES (bleu) ══ */
  :root{--bg:#0a101f;--bg1:#101830;--card:#141c33;--card2:#1b2542;--brd:rgba(234,238,247,.10);--brd2:rgba(234,238,247,.16);--t1:#eaeef7;--t2:#b6c2d9;--t3:#8b9ab8;--op:#5e82ff;--op-l:#8fa5ff;--green:#37c68a;--red:#e26262}
  /* Mode clair = base officielle du thème OP MESSAGES (export design 22/07/2026) */
  body.theme-light{--bg:#f4f6fa;--bg1:#ffffff;--card:#ffffff;--card2:#eef1f5;--brd:rgba(15,23,42,.10);--brd2:rgba(15,23,42,.17);--t1:#0f172a;--t2:#45536b;--t3:#64748b;--op:#2563eb;--op-l:#2563eb;--green:#21b457;--red:#e0524d}
  body.theme-light::before{background:radial-gradient(ellipse 60% 45% at 12% 0%, rgba(37,99,235,.08), transparent 60%)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--t1);font-family:'Archivo',system-ui,sans-serif;-webkit-font-smoothing:antialiased;height:100dvh;overflow:hidden}
  body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 60% 45% at 12% 0%, rgba(94,130,255,.13), transparent 60%);pointer-events:none}
  .wrap{position:relative;z-index:1;height:100dvh;display:flex;flex-direction:column}
  .center-page{height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
  .panel{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--brd);border-radius:22px;padding:26px;width:100%;max-width:420px}
  .logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:6px}
  .logo b{font-family:'Space Mono',monospace;letter-spacing:2px;font-size:18px}
  .sub{text-align:center;color:var(--t2);font-size:14px;margin:4px 0 20px}
  .tabs{display:flex;gap:8px;margin-bottom:18px}
  .tab{flex:1;text-align:center;padding:11px;border-radius:11px;border:1px solid var(--brd);background:var(--card2);cursor:pointer;font-weight:600;font-size:14px;color:var(--t2)}
  .tab.active{background:rgba(94,130,255,.16);border-color:rgba(94,130,255,.4);color:var(--op-l)}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
  .field input{width:100%;background:var(--card2);border:1px solid var(--brd2);border-radius:11px;padding:13px 14px;color:var(--t1);font-size:15px;font-family:inherit}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--op);color:#fff;border:none;border-radius:12px;padding:13px 20px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;text-decoration:none}
  .btn:hover{filter:brightness(1.08)}.btn.green{background:var(--green);color:#04140a}.btn.ghost{background:transparent;border:1px solid var(--brd2);color:var(--t1)}.btn.block{width:100%}.btn.sm{padding:9px 14px;font-size:13px;border-radius:10px}
  .muted{color:var(--t3);font-size:13px}.center{text-align:center}.hide{display:none!important}
  .err{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);color:#fca5a5;border-radius:10px;padding:10px 13px;font-size:13.5px;margin-bottom:12px}
  .ok{background:rgba(34,177,76,.12);border:1px solid rgba(34,177,76,.3);color:#5fcf80;border-radius:10px;padding:10px 13px;font-size:13.5px;margin-bottom:12px}
  a.link{color:var(--op-l);cursor:pointer;text-decoration:underline;font-size:13.5px}
  /* APP SHELL */
  .appbar{display:flex;align-items:center;gap:10px;padding:calc(10px + env(safe-area-inset-top)) 14px 6px;background:transparent}
  .appbar img{width:34px;height:34px;border-radius:10px;flex-shrink:0}
  .appbar .tt{flex:1;min-width:0}.appbar .tt b{font-size:15px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.appbar .tt span{font-size:11px;color:var(--t3)}
  .appbar .ic{width:42px;height:42px;border-radius:50%;border:none;background:var(--card2);color:var(--t1);font-size:17px;cursor:pointer;flex-shrink:0}
  .appbar .ic.accent{background:var(--op);color:#fff;font-size:22px}
  .view{flex:1;overflow-y:auto;padding:8px 14px 88px}
  .view-h{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 12px}
  .view-h h2{font-size:30px;font-weight:800;letter-spacing:-.5px}
  .gsearch{display:flex;align-items:center;gap:9px;background:var(--card2);border:1px solid var(--brd);border-radius:14px;padding:11px 13px;margin:0 0 12px}
  .gsearch input{flex:1;background:transparent;border:none;outline:none;color:var(--t1);font-size:15px;font-family:inherit}
  .gsearch svg{color:var(--t3);flex-shrink:0}
  .row{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--brd);border-radius:15px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
  .row:hover{border-color:var(--brd2)}
  .row .ava{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0}
  .row .info{flex:1;min-width:0}.row .info .nm{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.row .info .ds{font-size:12.5px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .chev{color:var(--t3);font-size:20px}
  .fab{position:fixed;right:18px;bottom:calc(76px + env(safe-area-inset-bottom));z-index:15;width:54px;height:54px;border-radius:50%;background:var(--op);color:#06121f;border:none;font-size:25px;box-shadow:0 10px 26px rgba(94,130,255,.4);cursor:pointer}
  /* Barre du bas flottante en pilule (façon WhatsApp iOS) */
  .nav{position:fixed;left:16px;right:16px;bottom:calc(8px + env(safe-area-inset-bottom));z-index:14;display:flex;align-items:center;gap:2px;background:rgba(18,26,44,.88);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--brd);border-radius:24px;padding:4px 5px;box-shadow:0 10px 28px rgba(0,0,0,.4);max-width:440px;margin:0 auto}
  body.theme-light .nav{background:rgba(244,247,252,.9);box-shadow:0 10px 24px rgba(30,50,90,.18)}
  .nav button{flex:1;background:transparent;border:none;border-radius:18px;color:var(--t3);font-family:inherit;font-size:9.5px;font-weight:600;padding:4px 2px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;transition:color .2s;min-width:0;white-space:nowrap;position:relative;z-index:1}
  .nav button.on{color:var(--t1)}
  /* Bulle coulissante sous l'onglet actif (liquid glass iOS) */
  #nav-blob{position:absolute;top:4px;bottom:4px;left:0;width:70px;border-radius:18px;background:var(--card2);box-shadow:inset 0 0 0 1px var(--brd);z-index:0;pointer-events:none;transition:transform .38s cubic-bezier(.3,1.35,.45,1);will-change:transform;transform:translateX(5px)}
  .nav button .ni{display:flex;align-items:center;justify-content:center;height:19px;position:relative}
  .nav button .ni svg{width:17px;height:17px}
  .nav button .ni img{width:19px;height:19px;border-radius:50%;object-fit:cover}
  .nav .navdot{position:absolute;top:-3px;right:-7px;min-width:14px;height:14px;padding:0 3px;border-radius:8px;background:#22c55e;color:#04110a;font-size:8.5px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .appbar .ic,.topbar .ic,.composer .ic,.composer .send,.fab{display:inline-flex;align-items:center;justify-content:center}
  button svg{pointer-events:none}
  /* CHAT */
  .chat{position:fixed;inset:0;z-index:30;background:var(--bg);display:none;flex-direction:column}
  .chat.open{display:flex}
  .topbar{display:flex;align-items:center;gap:10px;padding:calc(10px + env(safe-area-inset-top)) 14px 10px;background:rgba(13,20,38,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--brd)}
  .topbar .bk{background:transparent;border:none;color:var(--t1);font-size:22px;cursor:pointer;padding:0 4px}
  .topbar .ava{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .topbar .ti{flex:1;min-width:0}.topbar .ti b{font-size:15px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.topbar .ti span{font-size:11px;color:var(--t3)}
  .topbar .ic{width:38px;height:38px;border-radius:10px;border:1px solid var(--brd2);background:transparent;color:var(--t2);font-size:16px;cursor:pointer}
  .stream{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
  .day{align-self:center;font-size:11px;color:var(--t3);background:var(--card2);border:1px solid var(--brd);padding:3px 12px;border-radius:100px;margin:6px 0}
  .m{max-width:80%;padding:9px 13px;border-radius:15px;font-size:14.5px;line-height:1.45;word-wrap:break-word}
  .m.them{align-self:flex-start;background:var(--card);border:1px solid var(--brd);border-bottom-left-radius:5px}
  .m.me{align-self:flex-end;background:var(--op);color:#06121f;border-bottom-right-radius:5px}
  .m .who{font-size:11.5px;font-weight:700;color:var(--op-l);margin-bottom:2px}.m.me .who{color:#06121f;opacity:.7}
  .m img{max-width:100%;border-radius:10px;margin-top:6px;display:block;cursor:pointer}
  .m .filechip{display:flex;align-items:center;gap:8px;margin-top:6px;padding:9px 12px;background:rgba(255,255,255,.1);border:1px solid var(--brd2);border-radius:10px;color:inherit;font-size:13.5px;word-break:break-all;cursor:pointer}
  .m.me .filechip{background:rgba(0,0,0,.12)}
  .m .t{font-size:10px;opacity:.6;margin-top:3px;text-align:right}
  .composer{display:flex;align-items:center;gap:8px;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:rgba(13,20,38,.95);border-top:1px solid var(--brd)}
  .composer .ic{width:42px;height:42px;border-radius:12px;border:1px solid var(--brd2);background:transparent;color:var(--t2);font-size:22px;cursor:pointer;flex-shrink:0}
  .composer input{flex:1;background:var(--card2);border:1px solid var(--brd2);border-radius:22px;padding:12px 16px;color:var(--t1);font-size:15px;font-family:inherit}
  .composer .send{width:46px;height:46px;border-radius:50%;background:var(--op);color:#06121f;border:none;font-size:18px;cursor:pointer;flex-shrink:0}
  /* sheet */
  .sheet{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.55);display:none;align-items:flex-end}
  .sheet.open{display:flex}
  .sheet-c{background:var(--bg1);border:1px solid var(--brd);border-radius:22px 22px 0 0;width:100%;max-width:520px;margin:0 auto;padding:22px 18px calc(22px + env(safe-area-inset-bottom));max-height:84dvh;overflow:auto}
  .mrow{display:flex;align-items:center;gap:12px;padding:10px 4px;border-bottom:1px solid var(--brd)}
  .mrow .ma{width:38px;height:38px;border-radius:11px;background:var(--card);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--op-l)}
  .chk{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--brd);border-radius:11px;margin-bottom:8px;cursor:pointer}
  .chk.sel{border-color:var(--op);background:rgba(94,130,255,.1)}
  /* viewer + jitsi */
  .viewer,.jitsi{position:fixed;inset:0;z-index:60;background:#0a0e16;display:none;flex-direction:column}
  .viewer.open,.jitsi.open{display:flex}
  .vbar{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:calc(10px + env(safe-area-inset-top)) 14px 10px;border-bottom:1px solid var(--brd)}
  .viewer iframe{flex:1;border:none;width:100%;background:#fff}
  #jitsi-box{flex:1}
  #jitsi-box iframe{width:100%;height:100%;border:none}
  .ring{position:fixed;inset:0;z-index:80;background:rgba(8,13,24,.97);display:none;align-items:center;justify-content:center;padding:24px}
  .ring.open{display:flex}
  .ring-av{width:100px;height:100px;border-radius:32px;display:flex;align-items:center;justify-content:center;font-size:42px;margin:0 auto}
  .ring-btn{width:66px;height:66px;border-radius:50%;border:none;color:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
  .ring-btn.accept{background:#22c55e}
  .ring-btn.decline{background:#ef4444;transform:rotate(135deg)}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(82px + env(safe-area-inset-bottom));z-index:90;background:var(--card);border:1px solid var(--brd2);color:var(--t1);padding:12px 16px;border-radius:12px;font-size:14px;max-width:90%;box-shadow:0 14px 40px rgba(0,0,0,.5);opacity:0;transition:opacity .25s;pointer-events:none;text-align:center}
  .toast.show{opacity:1}
  .meet{display:flex;align-items:center;gap:13px;background:linear-gradient(180deg,rgba(34,177,76,.12),rgba(34,177,76,.04));border:1px solid rgba(34,177,76,.3);border-radius:15px;padding:14px;margin-bottom:10px;cursor:pointer}
  .meet .cd{font-family:'Space Mono',monospace;font-size:13px;color:#5fcf80;font-weight:700}
</style>
</head>
<body>
<div class="wrap" id="root"><div class="center-page"><div class="panel center"><p class="muted">Chargement…</p></div></div></div>

<div class="chat" id="chat"></div>
<div class="chat" id="page"></div>
<input type="file" id="imgpick" accept="image/*" style="display:none">
<input type="file" id="campick" accept="image/*" capture="environment" style="display:none">
<input type="file" id="filepick" style="display:none">
<input type="file" id="photopick" accept="image/*" style="display:none">
<div class="sheet" id="sheet"><div class="sheet-c" id="sheet-c"></div></div>
<div class="viewer" id="viewer"><div class="vbar"><span id="viewer-name" style="font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span><button class="btn ghost sm" onclick="closeViewer()">✕ Fermer</button></div><iframe id="viewer-frame" title="Document"></iframe></div>
<div class="jitsi" id="jitsi"><div class="vbar"><span id="jitsi-name" style="font-size:14px;font-weight:600">Réunion</span><button class="btn ghost sm" onclick="closeJitsi()">✕ Quitter</button></div><div id="jitsi-box"></div></div>
<div class="ring" id="ring"></div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  if ('serviceWorker' in navigator) { window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); }); }
  const FB_CONFIG={ apiKey:"AIzaSyAbah03sO4f4LyNhvmig0Pn00lz1sHSpT8", authDomain:"elan-gestion.firebaseapp.com", projectId:"elan-gestion", storageBucket:"elan-gestion.firebasestorage.app", messagingSenderId:"910528393731", appId:"1:910528393731:web:128d97b6a3269fb6d21436" };
  firebase.initializeApp(FB_CONFIG);
  const auth=firebase.auth(), fs=firebase.firestore();
  const $=id=>document.getElementById(id);
  const esc=s=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const ROOT=$('root');
  let ME=null,USER=null,COMP=null,IS_OWNER=false,_files={},_lastCreds=null,_unsub=null,_curView='disc',_msgCache={};
  let _members=[];
  let MODE='perso'; // espace ACTIF : 'perso' | 'company' (basculé par le bouton en haut)
  let HAS_COMPANY=false, _meetWatchUnsub=null; // le compte appartient-il à une entreprise ?
  // Références Firestore centralisées : le moteur de chat/appels marche pour les 2 modes
  function chanCol(){ return MODE==='perso' ? fs.collection('op_channels') : fs.collection('op_companies').doc(COMP.id).collection('channels'); }
  function callsCol(){ return MODE==='perso' ? fs.collection('op_calls') : fs.collection('op_companies').doc(COMP.id).collection('calls'); }
  function handleOf(v){ return (v||'').trim().toLowerCase().replace(/[^a-z0-9._-]/g,''); }
  // Liste des personnes joignables : membres de l'entreprise, ou mes contacts perso
  async function listMembers(){
    if(MODE!=='perso'){ const out=[]; try{ const qs=await fs.collection('op_companies').doc(COMP.id).collection('members').get(); qs.forEach(d=>out.push(d.data())); }catch(e){} return out; }
    const out=[]; try{ const qs=await fs.collection('op_users').doc(ME.uid).collection('contacts').get();
      const arr=[]; qs.forEach(d=>arr.push(d.data()));
      await Promise.all(arr.map(async c=>{ let la=0,photo=c.photo; try{ const u=await fs.collection('op_users').doc(c.uid).get(); if(u.exists){ la=u.data().lastActive||0; photo=u.data().photo||photo; } }catch(e){} out.push({uid:c.uid,name:c.name||'',phone:c.phone||'',handle:c.handle||'',photo,lastActive:la}); }));
    }catch(e){} return out;
  }
  let _hidden=(()=>{ try{ return new Set(JSON.parse(localStorage.getItem('opmsg_hidden')||'[]')); }catch(e){ return new Set(); } })();
  // ---- Préférences locales (façon WhatsApp) : épinglés, muets, importants, dernière lecture ----
  function lsSet(k){ try{ return new Set(JSON.parse(localStorage.getItem(k)||'[]')); }catch(e){ return new Set(); } }
  function lsSave(k,s){ try{ localStorage.setItem(k,JSON.stringify([...s])); }catch(e){} }
  let _star=lsSet('opmsg_star'), _pin=lsSet('opmsg_pin'), _mute=lsSet('opmsg_mute');
  function ck(id){ return MODE+':'+id; } // clé espace+canal
  function isPinned(id){ return _pin.has(ck(id)); }
  function isMuted(id){ return _mute.has(ck(id)); }
  function togglePin(id){ const k=ck(id); if(_pin.has(k))_pin.delete(k); else _pin.add(k); lsSave('opmsg_pin',_pin); }
  function toggleMute(id){ const k=ck(id); if(_mute.has(k))_mute.delete(k); else _mute.add(k); lsSave('opmsg_mute',_mute); }
  function toggleStar(id){ if(_star.has(id))_star.delete(id); else _star.add(id); lsSave('opmsg_star',_star); }
  function readKey(id){ return 'opmsg_read_'+MODE+'_'+id; }
  function getReadTs(id){ return +(localStorage.getItem(readKey(id))||0); }
  function setReadTs(id){ try{ localStorage.setItem(readKey(id),''+Date.now()); }catch(e){} }
  // Compteur exact de non-lus (par canal)
  function rcKey(id){ return 'opmsg_rc_'+MODE+'_'+id; }
  function getReadCount(id){ return +(localStorage.getItem(rcKey(id))||0); }
  function setReadCount(id,n){ try{ localStorage.setItem(rcKey(id),''+n); }catch(e){} }
  // Bloquer / archiver
  let _block=lsSet('opmsg_block'), _arch=lsSet('opmsg_arch');
  function isBlocked(uid){ return _block.has(uid); }
  function toggleBlock(uid){ if(_block.has(uid))_block.delete(uid); else _block.add(uid); lsSave('opmsg_block',_block); }
  function isArch(id){ return _arch.has(ck(id)); }
  function toggleArch(id){ const k=ck(id); if(_arch.has(k))_arch.delete(k); else _arch.add(k); lsSave('opmsg_arch',_arch); }
  // Favoris / verrouillage / non-lu manuel / effacement / suppression locale (façon WhatsApp)
  let _fav=lsSet('opmsg_fav'), _lockset=lsSet('opmsg_lock'), _munread=lsSet('opmsg_munread');
  let _discFilter='all', _lpUntil=0;
  function isFav(id){ return _fav.has(ck(id)); }
  function toggleFav(id){ const k=ck(id); if(_fav.has(k))_fav.delete(k); else _fav.add(k); lsSave('opmsg_fav',_fav); }
  function isLocked(id){ return _lockset.has(ck(id)); }
  function lockPin(){ return localStorage.getItem('opmsg_lockpin')||''; }
  function clearKey(id){ return 'opmsg_clear_'+MODE+'_'+id; }
  function getClearedAt(id){ return +(localStorage.getItem(clearKey(id))||0); }
  function delKey(id){ return 'opmsg_del_'+MODE+'_'+id; }
  function getDelAt(id){ return +(localStorage.getItem(delKey(id))||0); }
  // Messages éphémères (par conversation) : 0 = off, sinon durée en ms

  async function doPerso(){

  async function doCreate(){
    const name=($('c-name').value||'').trim(), siret=($('c-siret').value||'').replace(/\s/g,'');
    const yourname=($('c-yourname').value||'').trim();
    const email=loginEmail($('c-email').value), pass=$('c-pass').value||'';
    if(!name) return aerr("Indiquez le nom de l'entreprise.");
    if(!siretValid(siret)) return aerr('Le SIRET doit comporter 14 chiffres.');
    if(!yourname) return aerr('Indiquez votre nom.');
    if(!email||pass.length<6) return aerr('E-mail valide et mot de passe (6 caractères min.) requis.');
    $('c-sub').disabled=true; _provisioning=true;

      await ref.set({name,siret,code,ownerUid:ME.uid,createdAt:FV()});

  async function doJoin(){
    const code=($('j-code').value||'').trim().toUpperCase();
    const name=($('j-name').value||'').trim();
    const ident=($('j-login').value||'').trim().toLowerCase().replace(/[^a-z0-9._-]/g,'');
    const pass=$('j-pass').value||'';
    if(code.length<4) return aerr('Entrez le code transmis par votre entreprise.');
    if(!name) return aerr('Indiquez votre nom.');
    if(ident.length<3) return aerr('Choisissez un identifiant (3 caractères min.).');
    if(pass.length<6) return aerr('Mot de passe : 6 caractères minimum.');
    $('j-sub').disabled=true;
    let qs; try{ qs=await fs.collection('op_companies').where('code','==',code).limit(1).get(); }
    catch(e){ aerr(e.message||'Erreur'); $('j-sub').disabled=false; return; }
    if(qs.empty){ aerr('Aucune entreprise pour ce code. Vérifiez auprès de votre employeur.'); $('j-sub').disabled=false; return; }
    const cdoc=qs.docs[0]; const cname=cdoc.data().name; const email=loginEmail(ident);
    _provisioning=true;
    try{
      const cred=await auth.createUserWithEmailAndPassword(email,pass); ME=cred.user;
      await cdoc.ref.collection('members').doc(ME.uid).set({uid:ME.uid,name,role:'classique',ts:FV()});
      await fs.collection('op_users').doc(ME.uid).set({uid:ME.uid,email,name,handle:ident,role:'classique',companyId:cdoc.id,companyName:cname,lastActive:Date.now()});
      USER={uid:ME.uid,email,name,handle:ident,role:'classique',companyId:cdoc.id,companyName:cname};
      COMP={id:cdoc.id,name:cname}; HAS_COMPANY=true; MODE='company'; _provisioning=false; enterApp();
    }catch(e){ _provisioning=false; if((e.code||'')==='auth/email-already-in-use') aerr('Cet identifiant est déjà pris. Choisissez-en un autre, ou allez sur « Connexion ».'); else aerr(aMsg(e)); $('j-sub').disabled=false; }
  }
  function aMsg(e){ const c=(e&&e.code)||'';
    if(c==='auth/email-already-in-use')return 'Ce compte existe déjà. Connectez-vous.';
    if(c==='auth/invalid-email')return 'E-mail / identifiant invalide.';
    if(c==='auth/wrong-password'||c==='auth/invalid-credential')return 'Identifiant ou mot de passe incorrect.';
    if(c==='auth/user-not-found')return 'Aucun compte trouvé.';
    return (e&&e.message)||'Erreur.'; }

      if(!dragging && Math.abs(dx)>10 && Math.abs(dx)>Math.abs(dy)){ dragging=true; if(lp){clearTimeout(lp);lp=null;} }
      if(!dragging && Math.abs(dy)>25 && lp){ clearTimeout(lp); lp=null; }
      if(dragging) setTx(Math.max(-148,Math.min(148,base+dx)),false); },{passive:true});
    const end=()=>{ if(lp){clearTimeout(lp);lp=null;}
      const tx=+(w.dataset.tx||0);
      if(!dragging){ if(tx){ setTx(0,true); _lpUntil=Date.now()+450; } return; }
      dragging=false; _lpUntil=Date.now()+450;
      if(tx>125){ setTx(0,true); swFullRead(w.dataset.cid); }          // glissement complet à droite = lu/non lu
      else if(tx>60) setTx(148,true);                                   // révèle Non lu / Épingler
      else if(tx<-125){ setTx(0,true); rowArch(w.dataset.cid); }        // glissement complet à gauche = archiver
      else if(tx<-60) setTx(-148,true);                                 // révèle Options / Archiver
      else setTx(0,true); };
    row.addEventListener('touchend',end,{passive:true});
    row.addEventListener('touchcancel',end,{passive:true});
    row.addEventListener('contextmenu',e=>{ e.preventDefault(); rowMenu(w.dataset.cid,row.dataset.nm); });
  }); }

    rowMarkRead(id,unread); }

  let _activeCall=null,_callDocUnsub=null,_japi=null;
  async function startCall(ids, names, type){
    if(!ids||!ids.length) return;
    const room='CALL'+ME.uid.slice(0,6)+Date.now();
    const ref=callsCol().doc();
    try{ await ref.set({from:ME.uid,fromName:USER.name||ME.email,members:ids,memberNames:names||[],type:type||'video',room,status:'ringing',ts:FV()}); }catch(e){ alert('Erreur : '+(e.message||e)); return; }
    _activeCall={ref,answered:false,oneToOne:ids.length===1};
    if(_callDocUnsub)_callDocUnsub();
    _callDocUnsub=ref.onSnapshot(d=>{ if(!d.exists||!_activeCall) return; const st=d.data().status;
      if(st==='answered'){ _activeCall.answered=true; }
      else if(st==='declined' && _activeCall.oneToOne){ const nm=(names&&names[0])||'Le contact'; if(_callDocUnsub){_callDocUnsub();_callDocUnsub=null;} _activeCall=null; closeJitsi(); setTimeout(()=>alert(nm+' a refusé l\'appel.'),250); } });
    openJitsi(room, 'Appel · '+((names||[]).join(', ')), type==='audio');
  }
  function loadJitsi(){ return new Promise((res,rej)=>{ if(window.JitsiMeetExternalAPI) return res(); const s=document.createElement('script'); s.src='https://meet.jit.si/external_api.js'; s.onload=res; s.onerror=()=>rej(new Error('jitsi')); document.head.appendChild(s); }); }

    _japi=new JitsiMeetExternalAPI('meet.jit.si',{roomName:room,parentNode:$('jitsi-box'),userInfo:{displayName:USER.name||'Invité'},
      configOverwrite:{prejoinPageEnabled:false,startWithVideoMuted:!!audioOnly,disableDeepLinking:true,disableThirdPartyRequests:true,defaultLanguage:'fr'},
      interfaceConfigOverwrite:{SHOW_JITSI_WATERMARK:false,SHOW_WATERMARK_FOR_GUESTS:false,SHOW_BRAND_WATERMARK:false,JITSI_WATERMARK_LINK:'',MOBILE_APP_PROMO:false,HIDE_DEEP_LINKING_LOGO:true,SHOW_POWERED_BY:false,APP_NAME:'OP MESSAGES',NATIVE_APP_NAME:'OP MESSAGES',PROVIDER_NAME:'OP MESSAGES',DEFAULT_BACKGROUND:'#0a0e16',DISABLE_JOIN_LEAVE_NOTIFICATIONS:true,TOOLBAR_BUTTONS:['microphone','camera','desktop','tileview','hangup','chat','raisehand','participants-pane','settings']}});

  function fmtCountdown(ms){ if(ms<=0) return 'en cours'; const s=Math.floor(ms/1000), d=Math.floor(s/86400), h=Math.floor(s%86400/3600), mn=Math.floor(s%3600/60);
    if(d>0) return 'dans '+d+' j '+h+' h'; if(h>0) return 'dans '+h+' h '+mn+' min'; if(mn>0) return 'dans '+mn+' min'; return 'dans <1 min'; }

  function bindSwipeReply(){ const s=$('stream'); if(!s) return; let sx=0,sy=0,el=null;
    s.addEventListener('touchstart',e=>{ const t=e.target.closest('.m'); el=t; sx=e.touches[0].clientX; sy=e.touches[0].clientY; },{passive:true});
    s.addEventListener('touchmove',e=>{ if(!el) return; const dx=e.touches[0].clientX-sx, dy=e.touches[0].clientY-sy; if(dx>0&&dx<120&&Math.abs(dy)<40){ el.style.transform='translateX('+Math.min(dx,70)+'px)'; el.style.transition='none'; } },{passive:true});
    s.addEventListener('touchend',e=>{ if(!el) return; const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy; const mid=el.getAttribute('data-mid'); el.style.transition='transform .18s'; el.style.transform='translateX(0)';
      if(dx>55&&Math.abs(dy)<45&&mid){ setReply(mid); } el=null; },{passive:true});
  }

  async function inviteSend(){
    const raw=($('inv-q').value||'').trim(); if(!raw) return invErr('Entrez un numéro ou un identifiant.');
    const btn=$('inv-btn'); if(btn) btn.disabled=true;
    const isPhone=/^[0-9+ .]{6,}$/.test(raw);
    try{
      const snap = isPhone ? await fs.collection('op_users').where('phone','==',raw).limit(1).get() : await fs.collection('op_users').where('handle','==',handleOf(raw)).limit(1).get();
      if(snap.empty){ invErr("Aucun utilisateur avec ceci. La personne doit d'abord créer un compte (onglet Perso)."); if(btn)btn.disabled=false; return; }
      const u=snap.docs[0].data();
      if(u.uid===ME.uid){ invErr('C\'est vous 🙂'); if(btn)btn.disabled=false; return; }
      const m=await fs.collection('op_companies').doc(COMP.id).collection('members').doc(u.uid).get();
      if(m.exists){ invErr((u.name||'Cette personne')+' fait déjà partie de l\'entreprise.'); if(btn)btn.disabled=false; return; }
      // ajout direct : on crée le membre + une notification chez la personne
      await fs.collection('op_companies').doc(COMP.id).collection('members').doc(u.uid).set({uid:u.uid,name:u.name||'',phone:u.phone||'',role:'classique',ts:FV()});
      await fs.collection('op_users').doc(u.uid).collection('invites').doc(COMP.id).set({companyId:COMP.id,companyName:COMP.name,fromUid:ME.uid,fromName:USER.name||'',ts:FV()});
      closeSheet(); toast((u.name||u.handle)+' a été ajouté à l\'entreprise.');
    }catch(e){ invErr(e.message||'Erreur'); if(btn)btn.disabled=false; }
  }
  // ---- Côté personne ajoutée : notification « Ajouté par… » + activation de l'espace Pro ----
  let _invites=[],_invitesUnsub=null;
  function startInviteWatch(){
    if(_invitesUnsub)_invitesUnsub();
    _invitesUnsub=fs.collection('op_users').doc(ME.uid).collection('invites').onSnapshot(qs=>{
      qs.docChanges().forEach(ch=>{ if(ch.type==='added') applyAddedToCompany({id:ch.doc.id,...ch.doc.data()}); });
    }, err=>{});
  }
  async function applyAddedToCompany(iv){
    const cid=iv.companyId, cname=iv.companyName||'';
    // enregistre le rattachement chez soi (persiste l'onglet Pro) puis supprime la notification
    try{ await fs.collection('op_users').doc(ME.uid).set({companyId:cid,companyName:cname},{merge:true}); }catch(e){}
    try{ await fs.collection('op_users').doc(ME.uid).collection('invites').doc(cid).delete(); }catch(e){}
    USER.companyId=cid; USER.companyName=cname;
    if(!HAS_COMPANY){ HAS_COMPANY=true; COMP={id:cid,name:cname}; try{ const d=await fs.collection('op_companies').doc(cid).get(); if(d.exists){ COMP.ownerUid=d.data().ownerUid; COMP.code=d.data().code; } }catch(e){} renderShell(); showView(_curView); }
    openSheet(`<h3 style="font-family:'Space Mono',monospace;font-size:16px;margin-bottom:8px">🎉 Nouvel espace pro</h3>
      <p style="margin-bottom:16px">Vous avez été <b>ajouté par ${esc(iv.fromName||'une entreprise')}</b> à l'entreprise <b>${esc(cname)}</b>.<br><span class="muted">L'onglet « ${esc(cname)} » est apparu en haut.</span></p>
      <button class="btn block" onclick="closeSheet();switchSpace('company')">Ouvrir l'espace pro</button>`);
  }
  function addMemberForm(){
    openSheet(`<h3 style="font-family:'Space Mono',monospace;font-size:16px;margin-bottom:8px">Ajouter un membre</h3>
      <p class="muted" style="margin-bottom:14px">Créez le compte d'un employé : prénom, nom, identifiant et mot de passe. Donnez-lui ces accès — il se connecte avec.</p>
      <div id="amerr"></div>
      <div class="field"><label>Prénom</label><input id="am-prenom" placeholder="Marie"></div>
      <div class="field"><label>Nom</label><input id="am-nom" placeholder="Dupont"></div>
      <div class="field"><label>Identifiant</label><input id="am-login" placeholder="ex : mdupont" autocapitalize="off"></div>
      <div class="field"><label>Téléphone (facultatif)</label><input id="am-phone" type="tel" placeholder="06 12 34 56 78"></div>
      <div class="field"><label>Mot de passe (min. 6)</label><input id="am-pass" placeholder="••••••"></div>
      <button class="btn block" id="am-btn" onclick="addMember()">Créer le compte</button>`);
  }
  async function addMember(){
    const errBox=m=>{ const el=$('amerr'); if(el) el.innerHTML='<div class="err">'+esc(m)+'</div>'; };
    const name=(($('am-prenom').value||'').trim()+' '+($('am-nom').value||'').trim()).trim();
    const ident=($('am-login').value||'').trim().toLowerCase().replace(/[^a-z0-9._@-]/g,'');
    const pass=($('am-pass').value||'');
    if(!name||ident.length<3){ errBox('Indiquez un prénom et un identifiant (≥3 caractères).'); return; }
    if(pass.length<6){ errBox('Mot de passe : 6 caractères minimum.'); return; }
    const email=loginEmail(ident); const btn=$('am-btn'); if(btn) btn.disabled=true; let sec=null;
    try{
      sec=firebase.initializeApp(FB_CONFIG,'sec'+Date.now());
      let cred; try{ cred=await sec.auth().createUserWithEmailAndPassword(email,pass); }
      catch(e){ if((e.code||'')==='auth/email-already-in-use') errBox('Cet identifiant existe déjà.'); else errBox(e.message||'Erreur'); if(btn)btn.disabled=false; await sec.delete(); return; }
      const sfs=sec.firestore();
      const phone=($('am-phone')&&$('am-phone').value||'').trim();
      await sfs.collection('op_users').doc(cred.user.uid).set({uid:cred.user.uid,email,name,phone,role:'classique',companyId:COMP.id,companyName:COMP.name});
      await sfs.collection('op_companies').doc(COMP.id).collection('members').doc(cred.user.uid).set({uid:cred.user.uid,name,phone,role:'classique',ts:FV()});
      await sec.auth().signOut(); await sec.delete(); sec=null; _lastCreds={ident,pass,company:COMP.name};
      openSheet(`<div class="ok">✅ Compte créé pour <b>${esc(name)}</b>.</div>
        <p class="muted" style="margin:10px 0">Accès à donner à l'employé :</p>
        <div style="background:var(--card2);border:1px solid var(--brd2);border-radius:12px;padding:14px;font-size:14px;line-height:1.7">Identifiant : <b>${esc(ident)}</b><br>Mot de passe : <b>${esc(pass)}</b></div>
        <div style="display:flex;gap:8px;margin-top:14px"><button class="btn" style="flex:1" onclick="shareCreds()">📤 Partager</button><button class="btn ghost" style="flex:1" onclick="copyCreds(this)">📋 Copier</button></div>
        <button class="btn ghost block" style="margin-top:10px" onclick="closeSheet();showView('cont')">← Retour aux contacts</button>`);
    }catch(e){ errBox(e.message||'Erreur'); if(btn)btn.disabled=false; try{ if(sec) await sec.delete(); }catch(_){} }
  }
  function credsText(){ if(!_lastCreds) return ''; return `Vos accès OP MESSAGES — ${_lastCreds.company}\nIdentifiant : ${_lastCreds.ident}\nMot de passe : ${_lastCreds.pass}\n\nConnexion : https://teamop.fr/messages.html`; }
  async function shareCreds(){ const t=credsText(); if(!t) return; if(navigator.share){ try{ await navigator.share({title:'Accès OP MESSAGES',text:t}); }catch(e){} } else copyCreds(); }
  function copyCreds(btn){ const t=credsText(); if(!t) return; if(navigator.clipboard){ navigator.clipboard.writeText(t).then(()=>{ if(btn){ const o=btn.textContent; btn.textContent='✅ Copié'; setTimeout(()=>btn.textContent=o,1600);} }); } else alert(t); }

  function openSheet(html){ const wasOpen=$('sheet').classList.contains('open'); $('sheet-c').innerHTML=html+'<p class="center" style="margin-top:14px"><a class="link" onclick="closeSheet()">Fermer</a></p>'; $('sheet').classList.add('open'); if(!wasOpen) pushBack(); }
  function closeSheet(){ $('sheet').classList.remove('open'); }
  $('sheet').addEventListener('click',e=>{ if(e.target.id==='sheet') closeSheet(); });

  // ===== Bouton « retour » du téléphone : ferme l'écran ouvert au lieu de quitter l'app =====
  function pushBack(){ try{ history.pushState({op:1},''); }catch(e){} }
  function anyOverlayOpen(){ return ['viewer','jitsi','ring','sheet','page','chat'].some(x=>{ const el=$(x); return el && el.classList.contains('open'); }); }
  function closeTopOverlay(){
    if($('viewer')&&$('viewer').classList.contains('open')){ closeViewer(); return true; }
    if($('jitsi')&&$('jitsi').classList.contains('open')){ closeJitsi(); return true; }
    if($('ring')&&$('ring').classList.contains('open')){ declineCall(); return true; }
    if($('sheet')&&$('sheet').classList.contains('open')){ closeSheet(); return true; }
    if($('page')&&$('page').classList.contains('open')){ closePage(); return true; }
    if($('chat')&&$('chat').classList.contains('open')){ closeChat(); return true; }
    return false;
  }
  window.addEventListener('popstate', function(){ if(anyOverlayOpen()){ closeTopOverlay(); pushBack(); } });
  try{ history.replaceState({op:0},''); }catch(e){}
</script>
</body>
</html>
