<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a1020">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OP MESSAGES">
<link rel="manifest" href="manifest-opmsg.webmanifest">
<link rel="apple-touch-icon" href="icons/opmsg-apple-touch.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/opmsg-favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/opmsg-192.png">
<title>OP MESSAGES — Messagerie d'entreprise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080d18;--bg1:#0d1426;--card:#101a30;--card2:#0c1424;--brd:rgba(255,255,255,.09);--brd2:rgba(255,255,255,.14);--t1:#fff;--t2:rgba(231,238,248,.74);--t3:rgba(231,238,248,.46);--op:#5b8fd6;--op-l:#8fb6e8;--green:#22b14c;--red:#f87171}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--t1);font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;height:100dvh;overflow:hidden}
  body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 60% 45% at 12% 0%, rgba(91,143,214,.14), transparent 60%);pointer-events:none}
  .wrap{position:relative;z-index:1;height:100dvh;display:flex;flex-direction:column}
  .center-page{height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
  .panel{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--brd);border-radius:22px;padding:26px;width:100%;max-width:420px}
  .logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:6px}
  .logo b{font-family:'Space Mono',monospace;letter-spacing:2px;font-size:18px}
  .sub{text-align:center;color:var(--t2);font-size:14px;margin:4px 0 20px}
  .tabs{display:flex;gap:8px;margin-bottom:18px}
  .tab{flex:1;text-align:center;padding:11px;border-radius:11px;border:1px solid var(--brd);background:var(--card2);cursor:pointer;font-weight:600;font-size:14px;color:var(--t2)}
  .tab.active{background:rgba(91,143,214,.16);border-color:rgba(91,143,214,.4);color:var(--op-l)}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
  .field input{width:100%;background:var(--card2);border:1px solid var(--brd2);border-radius:11px;padding:13px 14px;color:var(--t1);font-size:15px;font-family:inherit}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--op);color:#06121f;border:none;border-radius:12px;padding:13px 20px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;text-decoration:none}
  .btn:hover{filter:brightness(1.08)}.btn.green{background:var(--green);color:#04140a}.btn.ghost{background:transparent;border:1px solid var(--brd2);color:var(--t1)}.btn.block{width:100%}.btn.sm{padding:9px 14px;font-size:13px;border-radius:10px}
  .muted{color:var(--t3);font-size:13px}.center{text-align:center}.hide{display:none!important}
  .err{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);color:#fca5a5;border-radius:10px;padding:10px 13px;font-size:13.5px;margin-bottom:12px}
  .ok{background:rgba(34,177,76,.12);border:1px solid rgba(34,177,76,.3);color:#5fcf80;border-radius:10px;padding:10px 13px;font-size:13.5px;margin-bottom:12px}
  a.link{color:var(--op-l);cursor:pointer;text-decoration:underline;font-size:13.5px}
  /* APP SHELL */
  .appbar{display:flex;align-items:center;gap:12px;padding:calc(12px + env(safe-area-inset-top)) 16px 12px;background:rgba(13,20,38,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--brd)}
  .appbar img{width:36px;height:36px;border-radius:10px;flex-shrink:0}
  .appbar .tt{flex:1;min-width:0}.appbar .tt b{font-size:16px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.appbar .tt span{font-size:11.5px;color:var(--t3)}
  .appbar .ic{width:40px;height:40px;border-radius:11px;border:1px solid var(--brd2);background:transparent;color:var(--t2);font-size:17px;cursor:pointer;flex-shrink:0}
  .view{flex:1;overflow-y:auto;padding:14px 14px 90px}
  .view-h{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 14px}
  .view-h h2{font-family:'Space Mono',monospace;font-size:18px;letter-spacing:.5px}
  .row{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--brd);border-radius:15px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
  .row:hover{border-color:var(--brd2)}
  .row .ava{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0}
  .row .info{flex:1;min-width:0}.row .info .nm{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.row .info .ds{font-size:12.5px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .chev{color:var(--t3);font-size:20px}
  .fab{position:fixed;right:18px;bottom:calc(80px + env(safe-area-inset-bottom));z-index:15;width:56px;height:56px;border-radius:50%;background:var(--op);color:#06121f;border:none;font-size:26px;box-shadow:0 10px 26px rgba(91,143,214,.4);cursor:pointer}
  .nav{position:fixed;left:0;right:0;bottom:0;z-index:14;display:flex;background:rgba(10,15,28,.96);backdrop-filter:blur(14px);border-top:1px solid var(--brd);padding-bottom:env(safe-area-inset-bottom)}
  .nav button{flex:1;background:transparent;border:none;color:var(--t3);font-family:inherit;font-size:11px;padding:9px 0 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
  .nav button.on{color:var(--op-l)}
  .nav button .ni{font-size:21px}
  /* CHAT */
  .chat{position:fixed;inset:0;z-index:30;background:var(--bg);display:none;flex-direction:column}
  .chat.open{display:flex}
  .topbar{display:flex;align-items:center;gap:10px;padding:calc(10px + env(safe-area-inset-top)) 14px 10px;background:rgba(13,20,38,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--brd)}
  .topbar .bk{background:transparent;border:none;color:var(--t1);font-size:22px;cursor:pointer;padding:0 4px}
  .topbar .ava{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .topbar .ti{flex:1;min-width:0}.topbar .ti b{font-size:15px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.topbar .ti span{font-size:11px;color:var(--t3)}
  .topbar .ic{width:38px;height:38px;border-radius:10px;border:1px solid var(--brd2);background:transparent;color:var(--t2);font-size:16px;cursor:pointer}
  .stream{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
  .day{align-self:center;font-size:11px;color:var(--t3);background:var(--card2);border:1px solid var(--brd);padding:3px 12px;border-radius:100px;margin:6px 0}
  .m{max-width:80%;padding:9px 13px;border-radius:15px;font-size:14.5px;line-height:1.45;word-wrap:break-word}
  .m.them{align-self:flex-start;background:var(--card);border:1px solid var(--brd);border-bottom-left-radius:5px}
  .m.me{align-self:flex-end;background:var(--op);color:#06121f;border-bottom-right-radius:5px}
  .m .who{font-size:11.5px;font-weight:700;color:var(--op-l);margin-bottom:2px}.m.me .who{color:#06121f;opacity:.7}
  .m img{max-width:100%;border-radius:10px;margin-top:6px;display:block;cursor:pointer}
  .m .filechip{display:flex;align-items:center;gap:8px;margin-top:6px;padding:9px 12px;background:rgba(255,255,255,.1);border:1px solid var(--brd2);border-radius:10px;color:inherit;font-size:13.5px;word-break:break-all;cursor:pointer}
  .m.me .filechip{background:rgba(0,0,0,.12)}
  .m .t{font-size:10px;opacity:.6;margin-top:3px;text-align:right}
  .composer{display:flex;align-items:center;gap:8px;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:rgba(13,20,38,.95);border-top:1px solid var(--brd)}
  .composer .ic{width:42px;height:42px;border-radius:12px;border:1px solid var(--brd2);background:transparent;color:var(--t2);font-size:22px;cursor:pointer;flex-shrink:0}
  .composer input{flex:1;background:var(--card2);border:1px solid var(--brd2);border-radius:22px;padding:12px 16px;color:var(--t1);font-size:15px;font-family:inherit}
  .composer .send{width:46px;height:46px;border-radius:50%;background:var(--op);color:#06121f;border:none;font-size:18px;cursor:pointer;flex-shrink:0}
  /* sheet */
  .sheet{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.55);display:none;align-items:flex-end}
  .sheet.open{display:flex}
  .sheet-c{background:var(--bg1);border:1px solid var(--brd);border-radius:22px 22px 0 0;width:100%;max-width:520px;margin:0 auto;padding:22px 18px calc(22px + env(safe-area-inset-bottom));max-height:84dvh;overflow:auto}
  .mrow{display:flex;align-items:center;gap:12px;padding:10px 4px;border-bottom:1px solid var(--brd)}
  .mrow .ma{width:38px;height:38px;border-radius:11px;background:var(--card);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--op-l)}
  .chk{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--brd);border-radius:11px;margin-bottom:8px;cursor:pointer}
  .chk.sel{border-color:var(--op);background:rgba(91,143,214,.1)}
  /* viewer + jitsi */
  .viewer,.jitsi{position:fixed;inset:0;z-index:60;background:#0a0e16;display:none;flex-direction:column}
  .viewer.open,.jitsi.open{display:flex}
  .vbar{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:calc(10px + env(safe-area-inset-top)) 14px 10px;border-bottom:1px solid var(--brd)}
  .viewer iframe{flex:1;border:none;width:100%;background:#fff}
  #jitsi-box{flex:1}
  #jitsi-box iframe{width:100%;height:100%;border:none}
</style>
</head>
<body>
<div class="wrap" id="root"><div class="center-page"><div class="panel center"><p class="muted">Chargement…</p></div></div></div>

<div class="chat" id="chat"></div>
<input type="file" id="imgpick" accept="image/*" style="display:none">
<input type="file" id="filepick" style="display:none">
<div class="sheet" id="sheet"><div class="sheet-c" id="sheet-c"></div></div>
<div class="viewer" id="viewer"><div class="vbar"><span id="viewer-name" style="font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span><button class="btn ghost sm" onclick="closeViewer()">✕ Fermer</button></div><iframe id="viewer-frame" title="Document"></iframe></div>
<div class="jitsi" id="jitsi"><div class="vbar"><span id="jitsi-name" style="font-size:14px;font-weight:600">Réunion</span><button class="btn ghost sm" onclick="closeJitsi()">✕ Quitter</button></div><div id="jitsi-box"></div></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  if ('serviceWorker' in navigator) { window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); }); }
  const FB_CONFIG={ apiKey:"AIzaSyAbah03sO4f4LyNhvmig0Pn00lz1sHSpT8", authDomain:"elan-gestion.firebaseapp.com", projectId:"elan-gestion", storageBucket:"elan-gestion.firebasestorage.app", messagingSenderId:"910528393731", appId:"1:910528393731:web:128d97b6a3269fb6d21436" };
  firebase.initializeApp(FB_CONFIG);
  const auth=firebase.auth(), fs=firebase.firestore();
  const $=id=>document.getElementById(id);
  const esc=s=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const ROOT=$('root');
  let ME=null,USER=null,COMP=null,IS_OWNER=false,_files={},_lastCreds=null,_unsub=null,_curView='disc';
  const FV=()=>firebase.firestore.FieldValue.serverTimestamp();
  function loginEmail(v){ v=(v||'').trim().toLowerCase(); if(!v) return ''; return v.includes('@')?v:v.replace(/[^a-z0-9._-]/g,'')+'@opmsg.local'; }
  function siretValid(s){ return /^\d{14}$/.test((s||'').replace(/\s/g,'')); }
  function code6(){ const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let r='';crypto.getRandomValues(new Uint8Array(6)).forEach(b=>r+=c[b%c.length]);return r; }
  function ini(n){ return (n||'?').trim().slice(0,1).toUpperCase(); }
  function hue(s){ let h=0; for(const c of (s||'x')) h=(h*31+c.charCodeAt(0))%360; return h; }
  function avatarStyle(s){ const h=hue(s); return `background:hsl(${h} 45% 22%);color:hsl(${h} 70% 72%)`; }

  auth.onAuthStateChanged(async user=>{
    if(_unsub){_unsub();_unsub=null;}
    if(!user){ ME=null;USER=null;COMP=null; renderAuth(); return; }
    ME=user;
    let us; try{ us=await fs.collection('op_users').doc(user.uid).get(); }catch(e){}
    USER=(us&&us.exists)?us.data():{uid:user.uid,email:user.email,name:(user.email||'Utilisateur').split('@')[0]};
    if(USER&&USER.companyId){ COMP={id:USER.companyId,name:USER.companyName}; enterApp(); return; }
    renderSetup();
  });
  function logout(){ auth.signOut(); }

  // ========== AUTH ==========
  function renderAuth(){
    ROOT.innerHTML=`<div class="center-page"><div class="panel">
      <div class="logo"><img src="icons/opmsg-512.png" style="width:48px;height:48px;border-radius:13px"><b>OP MESSAGES</b></div>
      <p class="sub">La messagerie dédiée aux entreprises</p>
      <div class="tabs"><div class="tab active" id="t-l" onclick="aTab('l')">Se connecter</div><div class="tab" id="t-s" onclick="aTab('s')">Créer un compte</div></div>
      <div id="aerr"></div>
      <div id="sf" class="hide"><div class="field"><label>Votre nom</label><input id="a-name" placeholder="Prénom Nom"></div></div>
      <div class="field"><label>E-mail ou identifiant</label><input id="a-email" placeholder="vous@entreprise.fr ou jdupont" autocapitalize="off"></div>
      <div class="field"><label>Mot de passe</label><input id="a-pass" type="password" placeholder="••••••••"></div>
      <button class="btn block" id="a-sub" onclick="aSubmit()">Se connecter</button>
      <p class="center" style="margin-top:14px"><a class="link" href="index.html">← Retour à TeamOP</a></p>
    </div></div>`;
  }
  let aMode='l';
  function aTab(m){ aMode=m; $('t-l').classList.toggle('active',m==='l'); $('t-s').classList.toggle('active',m==='s'); $('sf').classList.toggle('hide',m!=='s'); $('a-sub').textContent=m==='s'?'Créer mon compte':'Se connecter'; $('aerr').innerHTML=''; }
  async function aSubmit(){
    const email=loginEmail($('a-email').value), pass=$('a-pass').value||'';
    if(!email||!pass){ $('aerr').innerHTML='<div class="err">Identifiant (ou e-mail) et mot de passe requis.</div>'; return; }
    $('a-sub').disabled=true;
    try{
      if(aMode==='s'){ if(pass.length<6) throw {message:'Mot de passe : 6 caractères minimum.'};
        const cred=await auth.createUserWithEmailAndPassword(email,pass);
        await fs.collection('op_users').doc(cred.user.uid).set({uid:cred.user.uid,email,name:($('a-name').value||'').trim()||email.split('@')[0]});
      } else await auth.signInWithEmailAndPassword(email,pass);
    }catch(e){ $('aerr').innerHTML='<div class="err">'+esc(aMsg(e))+'</div>'; $('a-sub').disabled=false; }
  }
  function aMsg(e){ const c=(e&&e.code)||'';
    if(c==='auth/email-already-in-use')return 'Ce compte existe déjà. Connectez-vous.';
    if(c==='auth/invalid-email')return 'E-mail / identifiant invalide.';
    if(c==='auth/wrong-password'||c==='auth/invalid-credential')return 'Identifiant ou mot de passe incorrect.';
    if(c==='auth/user-not-found')return 'Aucun compte trouvé.';
    return (e&&e.message)||'Erreur.'; }

  // ========== SETUP ENTREPRISE ==========
  function renderSetup(){
    ROOT.innerHTML=`<div class="center-page"><div class="panel">
      <div class="logo"><span style="font-size:34px">🏢</span></div>
      <p class="sub">Bonjour ${esc((USER&&USER.name)||'')} — rejoignez ou créez votre entreprise</p>
      <div class="tabs"><div class="tab active" id="s-c" onclick="sTab('c')">Créer mon entreprise</div><div class="tab" id="s-j" onclick="sTab('j')">Rejoindre (code)</div></div>
      <div id="serr"></div>
      <div id="screate">
        <div class="field"><label>Nom de l'entreprise</label><input id="c-name" placeholder="Ex : Dupont SARL"></div>
        <div class="field"><label>Numéro SIRET (14 chiffres)</label><input id="c-siret" inputmode="numeric" placeholder="123 456 789 00012"></div>
        <button class="btn block" onclick="createCompany()">Créer l'entreprise</button>
      </div>
      <div id="sjoin" class="hide">
        <div class="field"><label>Code d'invitation</label><input id="j-code" placeholder="Ex : 4FK7P2" style="text-transform:uppercase"></div>
        <button class="btn block" onclick="joinCompany()">Rejoindre</button>
      </div>
      <p class="center" style="margin-top:14px"><a class="link" onclick="logout()">Déconnexion</a></p>
    </div></div>`;
  }
  function sTab(m){ $('s-c').classList.toggle('active',m==='c'); $('s-j').classList.toggle('active',m==='j'); $('screate').classList.toggle('hide',m!=='c'); $('sjoin').classList.toggle('hide',m!=='j'); $('serr').innerHTML=''; }
  async function createCompany(){
    const name=($('c-name').value||'').trim(), siret=($('c-siret').value||'').replace(/\s/g,'');
    if(!name){ $('serr').innerHTML='<div class="err">Indiquez le nom de l\'entreprise.</div>'; return; }
    if(!siretValid(siret)){ $('serr').innerHTML='<div class="err">Le SIRET doit comporter 14 chiffres.</div>'; return; }
    try{
      const ref=fs.collection('op_companies').doc(); const code=code6();
      await ref.set({name,siret,code,ownerUid:ME.uid,createdAt:FV()});
      await ref.collection('members').doc(ME.uid).set({uid:ME.uid,name:USER.name||ME.email,ts:FV()});
      await fs.collection('op_users').doc(ME.uid).set({uid:ME.uid,email:ME.email,name:USER.name||ME.email,companyId:ref.id,companyName:name},{merge:true});
      COMP={id:ref.id,name}; USER.companyId=ref.id; USER.companyName=name; enterApp();
    }catch(e){ $('serr').innerHTML='<div class="err">'+esc(e.message||'Erreur')+'</div>'; }
  }
  async function joinCompany(){
    const code=($('j-code').value||'').trim().toUpperCase();
    if(code.length<4){ $('serr').innerHTML='<div class="err">Entrez le code reçu.</div>'; return; }
    try{
      const qs=await fs.collection('op_companies').where('code','==',code).limit(1).get();
      if(qs.empty){ $('serr').innerHTML='<div class="err">Aucune entreprise pour ce code.</div>'; return; }
      const doc=qs.docs[0]; const name=doc.data().name;
      await doc.ref.collection('members').doc(ME.uid).set({uid:ME.uid,name:USER.name||ME.email,ts:FV()});
      await fs.collection('op_users').doc(ME.uid).set({uid:ME.uid,email:ME.email,name:USER.name||ME.email,companyId:doc.id,companyName:name},{merge:true});
      COMP={id:doc.id,name}; USER.companyId=doc.id; USER.companyName=name; enterApp();
    }catch(e){ $('serr').innerHTML='<div class="err">'+esc(e.message||'Erreur')+'</div>'; }
  }

  // ========== APP SHELL ==========
  async function enterApp(){
    try{ const d=await fs.collection('op_companies').doc(COMP.id).get(); if(d.exists){ COMP.ownerUid=d.data().ownerUid; IS_OWNER=d.data().ownerUid===ME.uid; COMP.code=d.data().code; } }catch(e){}
    // s'assure qu'un canal "Général" existe
    try{ const g=await fs.collection('op_companies').doc(COMP.id).collection('channels').doc('general').get(); if(!g.exists) await fs.collection('op_companies').doc(COMP.id).collection('channels').doc('general').set({name:'Général',type:'general',createdAt:FV()}); }catch(e){}
    renderShell(); showView('disc');
  }
  function renderShell(){
    ROOT.innerHTML=`
      <div class="appbar">
        <img src="icons/opmsg-512.png" alt="">
        <div class="tt"><b id="ab-title">${esc(COMP.name)}</b><span id="ab-sub">${IS_OWNER?'Administrateur':'Membre'}</span></div>
        <button class="ic" onclick="openMenu()">⋯</button>
      </div>
      <div class="view" id="view"></div>
      <div class="nav">
        <button id="nv-disc" class="on" onclick="showView('disc')"><span class="ni">💬</span>Discussions</button>
        <button id="nv-cont" onclick="showView('cont')"><span class="ni">👥</span>Contacts</button>
        <button id="nv-room" onclick="showView('room')"><span class="ni">🎥</span>Réunions</button>
      </div>`;
  }
  function showView(v){ _curView=v;
    ['disc','cont','room'].forEach(x=>{ const b=$('nv-'+x); if(b) b.classList.toggle('on',x===v); });
    if(v==='disc') viewDisc(); else if(v==='cont') viewCont(); else viewRoom();
  }

  // ---- DISCUSSIONS (canaux/groupes) ----
  async function viewDisc(){
    const view=$('view'); view.innerHTML=`<div class="view-h"><h2>Discussions</h2></div><div id="disc-list"><p class="muted center">Chargement…</p></div><button class="fab" onclick="newGroup()" title="Nouveau groupe">＋</button>`;
    try{
      const qs=await fs.collection('op_companies').doc(COMP.id).collection('channels').orderBy('createdAt','asc').get();
      let html=''; qs.forEach(d=>{ const c=d.data(); const g=c.type==='general';
        html+=`<div class="row" onclick="openChannel('${d.id}','${esc((c.name||'').replace(/'/g,''))}')"><div class="ava" style="${g?'background:rgba(91,143,214,.2);color:var(--op-l)':avatarStyle(c.name)}">${g?'💬':'#'}</div><div class="info"><div class="nm">${esc(c.name||'')}</div><div class="ds">${g?'Toute l\'entreprise':'Groupe'}</div></div><div class="chev">›</div></div>`; });
      $('disc-list').innerHTML=html||'<p class="muted center">Aucune discussion.</p>';
    }catch(e){ $('disc-list').innerHTML='<div class="err">'+esc(e.message)+'</div>'; }
  }
  function newGroup(){ openSheet(`<h3 style="font-family:'Space Mono',monospace;font-size:16px;margin-bottom:12px">Nouveau groupe</h3>
    <div id="ngerr"></div>
    <div class="field"><label>Nom du groupe</label><input id="ng-name" placeholder="Ex : Équipe terrain"></div>
    <button class="btn block" onclick="createGroup()">Créer le groupe</button>`); }
  async function createGroup(){
    const name=($('ng-name').value||'').trim(); if(!name){ $('ngerr').innerHTML='<div class="err">Donnez un nom.</div>'; return; }
    try{ const r=await fs.collection('op_companies').doc(COMP.id).collection('channels').add({name,type:'group',createdBy:ME.uid,createdAt:FV()}); closeSheet(); openChannel(r.id,name); }
    catch(e){ $('ngerr').innerHTML='<div class="err">'+esc(e.message||'Erreur')+'</div>'; }
  }

  // ---- CONTACTS (membres) ----
  async function viewCont(){
    const view=$('view'); view.innerHTML=`<div class="view-h"><h2>Contacts</h2></div><div id="cont-list"><p class="muted center">Chargement…</p></div>${IS_OWNER?'<button class="fab" onclick="addMemberForm()" title="Ajouter un membre">＋</button>':''}`;
    try{
      const qs=await fs.collection('op_companies').doc(COMP.id).collection('members').get();
      let html=''; qs.forEach(d=>{ const m=d.data(); html+=`<div class="row" style="cursor:default"><div class="ava" style="${avatarStyle(m.name)}">${ini(m.name)}</div><div class="info"><div class="nm">${esc(m.name||'')}</div><div class="ds">${m.uid===ME.uid?'Vous':'Membre'}${m.uid===COMP_owner()?' · admin':''}</div></div></div>`; });
      $('cont-list').innerHTML=html||'<p class="muted center">Aucun contact.</p>';
    }catch(e){ $('cont-list').innerHTML='<div class="err">'+esc(e.message)+'</div>'; }
  }
  function COMP_owner(){ return COMP.ownerUid; }

  // ---- RÉUNIONS (salles vidéo Jitsi) ----
  async function viewRoom(){
    const view=$('view'); view.innerHTML=`<div class="view-h"><h2>Réunions</h2></div><p class="muted" style="margin:0 2px 14px">Salles de visioconférence (caméra, micro, partage d'écran).</p><div id="room-list"><p class="muted center">Chargement…</p></div><button class="fab" onclick="newRoom()" title="Nouvelle salle">＋</button>`;
    try{
      const qs=await fs.collection('op_companies').doc(COMP.id).collection('rooms').orderBy('createdAt','desc').get();
      let html=''; qs.forEach(d=>{ const r=d.data(); html+=`<div class="row" onclick="joinRoom('${d.id}','${esc((r.name||'').replace(/'/g,''))}')"><div class="ava" style="background:rgba(34,177,76,.18);color:#5fcf80">🎥</div><div class="info"><div class="nm">${esc(r.name||'')}</div><div class="ds">Rejoindre la réunion</div></div><div class="chev">›</div></div>`; });
      $('room-list').innerHTML=html||'<p class="muted center">Aucune salle. Touchez ＋ pour en créer une.</p>';
    }catch(e){ $('room-list').innerHTML='<div class="err">'+esc(e.message)+'</div>'; }
  }
  function newRoom(){ openSheet(`<h3 style="font-family:'Space Mono',monospace;font-size:16px;margin-bottom:12px">Nouvelle salle de réunion</h3>
    <div id="nrerr"></div>
    <div class="field"><label>Nom de la salle</label><input id="nr-name" placeholder="Ex : Réunion hebdo"></div>
    <button class="btn block" onclick="createRoom()">Créer la salle</button>`); }
  async function createRoom(){
    const name=($('nr-name').value||'').trim(); if(!name){ $('nrerr').innerHTML='<div class="err">Donnez un nom.</div>'; return; }
    try{ await fs.collection('op_companies').doc(COMP.id).collection('rooms').add({name,createdBy:ME.uid,createdAt:FV()}); closeSheet(); showView('room'); }
    catch(e){ $('nrerr').innerHTML='<div class="err">'+esc(e.message||'Erreur')+'</div>'; }
  }
  function loadJitsi(){ return new Promise((res,rej)=>{ if(window.JitsiMeetExternalAPI) return res(); const s=document.createElement('script'); s.src='https://meet.jit.si/external_api.js'; s.onload=res; s.onerror=()=>rej(new Error('jitsi')); document.head.appendChild(s); }); }
  let _japi=null;
  async function joinRoom(id,name){
    $('jitsi-name').textContent=name||'Réunion'; $('jitsi').classList.add('open');
    try{ await loadJitsi(); }catch(e){ $('jitsi-box').innerHTML='<p class="muted center" style="margin:auto;padding:30px">Connexion impossible (Internet requis).</p>'; return; }
    const room=('OPMSG'+COMP.id+id).replace(/[^a-zA-Z0-9]/g,'');
    $('jitsi-box').innerHTML='';
    _japi=new JitsiMeetExternalAPI('meet.jit.si',{roomName:room,parentNode:$('jitsi-box'),userInfo:{displayName:USER.name||'Invité'},configOverwrite:{prejoinPageEnabled:false,startWithVideoMuted:false}});
    _japi.addEventListener('readyToClose',closeJitsi);
  }
  function closeJitsi(){ try{ if(_japi){_japi.dispose();_japi=null;} }catch(e){} $('jitsi-box').innerHTML=''; $('jitsi').classList.remove('open'); }

  // ========== CHAT (par canal) ==========
  let _chMsgUnsub=null, _curCh=null;
  function openChannel(id,name){ _curCh={id,name};
    $('chat').innerHTML=`
      <div class="topbar">
        <button class="bk" onclick="closeChat()">‹</button>
        <div class="ava" style="${name==='Général'?'background:rgba(91,143,214,.2);color:var(--op-l)':avatarStyle(name)}">${name==='Général'?'💬':'#'}</div>
        <div class="ti"><b>${esc(name)}</b><span>${esc(COMP.name)}</span></div>
        <button class="ic" onclick="joinRoom('chat-${id}','Réunion : ${esc(name).replace(/"/g,'')}')" title="Appel">📞</button>
      </div>
      <div class="stream" id="stream"><p class="muted center" style="margin:auto">Chargement…</p></div>
      <div class="composer">
        <button class="ic" onclick="openAttach()">＋</button>
        <input id="msg" placeholder="Message…" onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="send" onclick="sendMsg()">➤</button>
      </div>`;
    $('chat').classList.add('open');
    listenCh(id);
  }
  function closeChat(){ if(_chMsgUnsub){_chMsgUnsub();_chMsgUnsub=null;} $('chat').classList.remove('open'); _curCh=null; }
  function chMsgs(){ return fs.collection('op_companies').doc(COMP.id).collection('channels').doc(_curCh.id).collection('messages'); }
  function fmtDay(d){ return d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'}); }
  function listenCh(id){
    if(_chMsgUnsub)_chMsgUnsub();
    _chMsgUnsub=fs.collection('op_companies').doc(COMP.id).collection('channels').doc(id).collection('messages').orderBy('ts','asc').limitToLast(300).onSnapshot(qs=>{
      const s=$('stream'); if(!s) return; let html='',lastDay='';
      qs.forEach(doc=>{ const m=doc.data(); const d=m.ts&&m.ts.toDate?m.ts.toDate():new Date();
        const day=fmtDay(d); if(day!==lastDay){ html+=`<div class="day">${esc(day)}</div>`; lastDay=day; }
        const mine=m.uid===ME.uid, time=d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
        let body=m.text?esc(m.text):'';
        if(m.img) body+=`<img src="${m.img}" onclick="window.open(this.src)">`;
        if(m.file){ _files[doc.id]=m.file; const pdf=/pdf/i.test(m.file.type)||/\.pdf$/i.test(m.file.name||''); body+=`<div class="filechip" onclick="openFile('${doc.id}')">${pdf?'📄':'📎'} ${esc(m.file.name)}</div>`; }
        html+=`<div class="m ${mine?'me':'them'}">${mine?'':`<div class="who">${esc(m.name||'')}</div>`}${body}<div class="t">${time}</div></div>`;
      });
      s.innerHTML=html||'<p class="muted center" style="margin:auto">Aucun message. Dites bonjour 👋</p>'; s.scrollTop=s.scrollHeight;
    }, err=>{ const s=$('stream'); if(s) s.innerHTML='<div class="err">'+esc(err.message)+'</div>'; });
  }
  async function sendMsg(){ const inp=$('msg'); const text=(inp.value||'').trim(); if(!text||!_curCh) return; inp.value='';
    try{ await chMsgs().add({uid:ME.uid,name:USER.name||ME.email,text,ts:FV()}); }catch(e){ alert('Erreur : '+(e.message||e)); } }
  function openAttach(){ openSheet(`<h3 style="font-family:'Space Mono',monospace;font-size:16px;margin-bottom:14px">Joindre</h3>
    <button class="btn block" style="margin-bottom:10px" onclick="closeSheet();$('imgpick').click()">🖼️ Photo (galerie ou appareil)</button>
    <button class="btn ghost block" onclick="closeSheet();$('filepick').click()">📄 Fichier / PDF</button>`); }
  $('imgpick').addEventListener('change',function(e){ const f=e.target.files[0]; if(!f||!_curCh) return; const r=new FileReader();
    r.onload=()=>{ const img=new Image(); img.onload=async()=>{ let w=img.width,h=img.height; const mx=1000; if(w>mx||h>mx){ if(w>h){h=h*mx/w;w=mx;}else{w=w*mx/h;h=mx;} }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h);
      try{ await chMsgs().add({uid:ME.uid,name:USER.name||ME.email,img:cv.toDataURL('image/jpeg',0.7),ts:FV()}); }catch(err){ alert('Erreur photo : '+(err.message||err)); }
    }; img.src=r.result; }; r.readAsDataURL(f); e.target.value=''; });
  $('filepick').addEventListener('change',function(e){ const f=e.target.files[0]; if(!f||!_curCh) return;
    if(f.size>800000){ alert('Fichier trop volumineux (max 800 Ko).'); e.target.value=''; return; }
    const r=new FileReader(); r.onload=async()=>{ try{ await chMsgs().add({uid:ME.uid,name:USER.name||ME.email,file:{name:f.name,type:f.type||'',data:r.result},ts:FV()}); }catch(err){ alert('Erreur fichier : '+(err.message||err)); } }; r.readAsDataURL(f); e.target.value=''; });
  function openFile(id){ const f=_files[id]; if(!f) return; const pdf=/pdf/i.test(f.type)||/\.pdf$/i.test(f.name||'');
    if(pdf){ $('viewer-name').textContent=f.name||'Document'; $('viewer-frame').src=f.data; $('viewer').classList.add('open'); }
    else { const a=document.createElement('a'); a.href=f.data; a.download=f.name||'fichier'; document.body.appendChild(a); a.click(); a.remove(); } }
  function closeViewer(){ $('viewer').classList.remove('open'); $('viewer-frame').src='about:blank'; }

  // ========== MENU / MEMBRES ==========
  function openMenu(){ openSheet(`<h3 style="font-family:'Space Mono',monospace;font-size:16px;margin-bottom:6px">${esc(COMP.name)}</h3>
    <p class="muted" style="margin-bottom:14px">${IS_OWNER?'Vous êtes administrateur.':'Membre'}</p>
    ${IS_OWNER?'<button class="btn block" style="margin-bottom:10px" onclick="showInvite()">📨 Code d\'invitation rapide</button>':''}
    <a class="btn ghost block" href="index.html" style="margin-bottom:10px;text-decoration:none">🏠 Retour à TeamOP</a>
    <button class="btn ghost block" onclick="logout()">Déconnexion</button>`); }
  async function showInvite(){ const d=await fs.collection('op_companies').doc(COMP.id).get(); const code=d.data().code;
    openSheet(`<h3 style="font-family:'Space Mono',monospace;font-size:16px;margin-bottom:8px">Code d'invitation</h3>
      <p class="muted" style="margin-bottom:12px">Pour qu'un collègue rejoigne lui-même : il crée un compte puis « Rejoindre (code) ».</p>
      <div style="background:var(--card2);border:1px solid var(--brd2);border-radius:12px;padding:16px;text-align:center;font-family:'Space Mono',monospace;font-size:28px;letter-spacing:4px;color:var(--op-l)">${esc(code)}</div>
      <button class="btn block" style="margin-top:14px" onclick="navigator.clipboard&&navigator.clipboard.writeText('${esc(code)}');this.textContent='✅ Copié'">📋 Copier</button>`); }
  function addMemberForm(){
    openSheet(`<h3 style="font-family:'Space Mono',monospace;font-size:16px;margin-bottom:8px">Ajouter un membre</h3>
      <p class="muted" style="margin-bottom:14px">Créez le compte d'un employé : prénom, nom, identifiant et mot de passe. Donnez-lui ces accès — il se connecte avec.</p>
      <div id="amerr"></div>
      <div class="field"><label>Prénom</label><input id="am-prenom" placeholder="Marie"></div>
      <div class="field"><label>Nom</label><input id="am-nom" placeholder="Dupont"></div>
      <div class="field"><label>Identifiant</label><input id="am-login" placeholder="ex : mdupont" autocapitalize="off"></div>
      <div class="field"><label>Mot de passe (min. 6)</label><input id="am-pass" placeholder="••••••"></div>
      <button class="btn block" id="am-btn" onclick="addMember()">Créer le compte</button>`);
  }
  async function addMember(){
    const errBox=m=>{ const el=$('amerr'); if(el) el.innerHTML='<div class="err">'+esc(m)+'</div>'; };
    const name=(($('am-prenom').value||'').trim()+' '+($('am-nom').value||'').trim()).trim();
    const ident=($('am-login').value||'').trim().toLowerCase().replace(/[^a-z0-9._@-]/g,'');
    const pass=($('am-pass').value||'');
    if(!name||ident.length<3){ errBox('Indiquez un prénom et un identifiant (≥3 caractères).'); return; }
    if(pass.length<6){ errBox('Mot de passe : 6 caractères minimum.'); return; }
    const email=loginEmail(ident); const btn=$('am-btn'); if(btn) btn.disabled=true; let sec=null;
    try{
      sec=firebase.initializeApp(FB_CONFIG,'sec'+Date.now());
      let cred; try{ cred=await sec.auth().createUserWithEmailAndPassword(email,pass); }
      catch(e){ if((e.code||'')==='auth/email-already-in-use') errBox('Cet identifiant existe déjà.'); else errBox(e.message||'Erreur'); if(btn)btn.disabled=false; await sec.delete(); return; }
      const sfs=sec.firestore();
      await sfs.collection('op_users').doc(cred.user.uid).set({uid:cred.user.uid,email,name,companyId:COMP.id,companyName:COMP.name});
      await sfs.collection('op_companies').doc(COMP.id).collection('members').doc(cred.user.uid).set({uid:cred.user.uid,name,ts:FV()});
      await sec.auth().signOut(); await sec.delete(); sec=null; _lastCreds={ident,pass,company:COMP.name};
      openSheet(`<div class="ok">✅ Compte créé pour <b>${esc(name)}</b>.</div>
        <p class="muted" style="margin:10px 0">Accès à donner à l'employé :</p>
        <div style="background:var(--card2);border:1px solid var(--brd2);border-radius:12px;padding:14px;font-size:14px;line-height:1.7">Identifiant : <b>${esc(ident)}</b><br>Mot de passe : <b>${esc(pass)}</b></div>
        <div style="display:flex;gap:8px;margin-top:14px"><button class="btn" style="flex:1" onclick="shareCreds()">📤 Partager</button><button class="btn ghost" style="flex:1" onclick="copyCreds(this)">📋 Copier</button></div>
        <button class="btn ghost block" style="margin-top:10px" onclick="closeSheet();showView('cont')">← Retour aux contacts</button>`);
    }catch(e){ errBox(e.message||'Erreur'); if(btn)btn.disabled=false; try{ if(sec) await sec.delete(); }catch(_){} }
  }
  function credsText(){ if(!_lastCreds) return ''; return `Vos accès OP MESSAGES — ${_lastCreds.company}\nIdentifiant : ${_lastCreds.ident}\nMot de passe : ${_lastCreds.pass}\n\nConnexion : https://teamop.fr/messages.html`; }
  async function shareCreds(){ const t=credsText(); if(!t) return; if(navigator.share){ try{ await navigator.share({title:'Accès OP MESSAGES',text:t}); }catch(e){} } else copyCreds(); }
  function copyCreds(btn){ const t=credsText(); if(!t) return; if(navigator.clipboard){ navigator.clipboard.writeText(t).then(()=>{ if(btn){ const o=btn.textContent; btn.textContent='✅ Copié'; setTimeout(()=>btn.textContent=o,1600);} }); } else alert(t); }

  function openSheet(html){ $('sheet-c').innerHTML=html+'<p class="center" style="margin-top:14px"><a class="link" onclick="closeSheet()">Fermer</a></p>'; $('sheet').classList.add('open'); }
  function closeSheet(){ $('sheet').classList.remove('open'); }
  $('sheet').addEventListener('click',e=>{ if(e.target.id==='sheet') closeSheet(); });
</script>
</body>
</html>
