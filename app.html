<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>ELAN GESTION</title>
<!-- PWA : installable sur iOS, Android, Mac et Windows -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#14181F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ELAN GESTION">
<meta name="application-name" content="ELAN GESTION">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ── MODE SOMBRE (par défaut) — palette ardoise ── */
  :root{
    --bg:#14181F; --bg1:#1C2230; --bg2:#232A3A; --bg3:#2D3543;
    --side:#11151C; --deep:#0A0E13; --toolbar:#161B24;
    --acc:#4ADE80; --acc2:#16803C; --org:#FB923C; --red:#F87171; --blue:#60A5FA; --purple:#A78BFA;
    --t1:#E8ECF2; --t2:#B4BCC8; --t3:#7A8290; --brd:#1F2533; --on-acc:#06210F;
  }
  /* Accents personnalisables (mode sombre) */
  html[data-accent="blue"]  { --acc:#60A5FA; --acc2:#1E40AF; --on-acc:#0A1430; }
  html[data-accent="purple"]{ --acc:#C084FC; --acc2:#7E22CE; --on-acc:#1B0A2E; }
  html[data-accent="orange"]{ --acc:#FB923C; --acc2:#C2410C; --on-acc:#2A1304; }

  /* ── MODE JOUR (clair) — palette macOS ── */
  html[data-theme="light"]{
    --bg:#FFFFFF; --bg1:#FFFFFF; --bg2:#F4F6FA; --bg3:#E8EEF7;
    --side:#F7F9FC; --deep:#F0F3F8; --toolbar:#FAFBFD;
    --acc:#16803C; --acc2:#0C5E26; --org:#EA580C; --red:#DC2626; --blue:#2563EB; --purple:#7C3AED;
    --t1:#1A1F28; --t2:#4A5260; --t3:#8A93A3; --brd:#E3E8F0; --on-acc:#FFFFFF;
  }
  html[data-theme="light"][data-accent="blue"]  { --acc:#2563EB; --acc2:#1E40AF; }
  html[data-theme="light"][data-accent="purple"]{ --acc:#7C3AED; --acc2:#6B21A8; }
  html[data-theme="light"][data-accent="orange"]{ --acc:#EA580C; --acc2:#C2410C; }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;}
  body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 10% 10%,rgba(74,222,128,.08) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 95% 90%,rgba(74,222,128,.05) 0%,transparent 60%);pointer-events:none;}
  .mono{font-family:'Space Mono',monospace;}

  .app{display:flex;min-height:100vh;position:relative;z-index:1;}

  /* SIDEBAR */
  .sidebar{width:262px;flex-shrink:0;background:var(--side);border-right:1px solid var(--brd);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
  .brand{display:flex;align-items:center;gap:12px;padding:20px 20px 18px;border-bottom:1px solid var(--brd);}
  .brand-icon{width:46px;height:46px;background:linear-gradient(135deg,#1A7A3E,#176030);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;font-family:'Space Mono',monospace;}
  .brand .hi{font-size:16px;font-weight:700;}
  .brand .role{font-size:12px;color:var(--acc);display:flex;align-items:center;gap:6px;margin-top:2px;}
  .brand .role::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--acc);}
  .nav{padding:10px 12px;flex:1;overflow-y:auto;}
  .nav::-webkit-scrollbar{width:6px;} .nav::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px;}
  .nav-label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;padding:14px 12px 7px;}
  .nav-item{display:flex;align-items:center;gap:13px;padding:10px 14px;border-radius:10px;color:var(--t2);font-size:14px;font-weight:500;cursor:pointer;transition:.15s;margin-bottom:1px;user-select:none;}
  .nav-item:hover{background:var(--bg2);color:var(--t1);}
  .nav-item.active{background:color-mix(in srgb,var(--acc) 15%,transparent);color:var(--acc);font-weight:600;}
  .nav-item .ico{font-size:16px;width:20px;text-align:center;}
  .nav-item .badge{margin-left:auto;background:rgba(255,255,255,.08);color:var(--t2);font-size:11px;font-weight:600;padding:1px 8px;border-radius:100px;}
  .nav-item.active .badge{background:color-mix(in srgb,var(--acc) 22%,transparent);color:var(--acc);}
  .sidebar-foot{padding:14px 18px;border-top:1px solid var(--brd);}

  /* MAIN */
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;gap:16px;padding:18px 30px;border-bottom:1px solid var(--brd);background:var(--toolbar);backdrop-filter:blur(8px);position:sticky;top:0;z-index:5;}
  .topbar-title{min-width:0;}
  .topbar-brand{display:none;} .topbar-ava{display:none;} .page-head{display:none;}
  .ph-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap;}
  .ph-title{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;letter-spacing:-.5px;}
  .ph-sub{font-size:13px;color:var(--t3);margin-top:3px;}
  .ph-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .topbar h1{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;letter-spacing:-.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .topbar .sub{font-size:13px;color:var(--t3);margin-top:2px;}
  .topbar-actions{margin-left:auto;display:flex;gap:10px;align-items:center;}
  .olsec{border:1px solid var(--brd);border-radius:16px;overflow:hidden;margin-bottom:12px;background:var(--card)}
  .olsec summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:11px;padding:13px 15px;background:color-mix(in srgb,var(--acc) 14%,transparent);font-weight:800;font-size:15px;user-select:none}
  .olsec summary::-webkit-details-marker{display:none}
  .olsec summary::after{content:'⌃';margin-left:auto;color:var(--t2);font-weight:400;transition:transform .2s}
  .olsec:not([open]) summary::after{transform:rotate(180deg)}
  .olsec-ic{font-size:17px}
  .olsec-b{padding:13px 15px}
  .ol-grid{display:grid;grid-template-columns:330px 1fr;gap:14px;align-items:start}
  .ol-side{position:sticky;top:86px;display:flex;flex-direction:column;gap:12px}
  .ol-side .card{margin-bottom:0}
  .ol-main .card{margin-bottom:12px}
  @media(max-width:980px){.ol-grid{grid-template-columns:1fr}.ol-side{position:static}}
  .gsrch{position:relative;flex:1;max-width:360px;display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:8px 12px}
  .gsrch input{flex:1;background:transparent;border:none;outline:none;color:var(--t1);font-size:13.5px;font-family:inherit;min-width:0}
  #gsrch-res{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--card);border:1px solid var(--brd);border-radius:12px;box-shadow:0 14px 40px rgba(0,0,0,.4);z-index:40;display:none;max-height:340px;overflow-y:auto}
  #gsrch-res .gr{display:flex;align-items:center;gap:9px;padding:10px 13px;cursor:pointer;border-bottom:1px solid var(--brd);font-size:13px}
  #gsrch-res .gr:hover{background:var(--bg2)}
  #gsrch-res .gr .gt{font-size:10px;color:var(--t3);margin-left:auto;white-space:nowrap}
  @media(max-width:900px){.gsrch{display:none}}
  .content{padding:26px 30px 48px;flex:1;}
  .menu-btn{display:none;background:var(--bg2);border:1px solid var(--brd);color:var(--t1);width:40px;height:40px;border-radius:10px;font-size:18px;cursor:pointer;}

  /* BUTTONS */
  .btn{display:inline-flex;align-items:center;gap:8px;background:var(--acc);color:var(--on-acc);font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;padding:10px 17px;border-radius:10px;border:none;cursor:pointer;transition:.15s;white-space:nowrap;}
  .btn:hover{background:var(--acc2);transform:translateY(-1px);}
  .btn.ghost{background:var(--bg2);border:1px solid var(--brd);color:var(--t2);}
  .btn.ghost:hover{background:var(--bg3);color:var(--t1);}
  .btn.sm{padding:7px 12px;font-size:13px;}
  .btn.danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}
  .btn.danger:hover{background:rgba(239,68,68,.25);}

  /* KPIs */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:15px;margin-bottom:26px;}
  .kpi{background:var(--bg1);border:1px solid var(--brd);border-radius:16px;padding:18px;}
  .kpi-ico{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:12px;}
  .kpi-val{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;line-height:1;}
  .kpi-lbl{font-size:13px;color:var(--t3);margin-top:6px;}

  /* CARD */
  .card{background:var(--bg1);border:1px solid var(--brd);border-radius:16px;padding:20px;margin-bottom:18px;}
  .card-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .card-head h3{font-size:16px;font-weight:600;}
  .card-head .btn{margin-left:auto;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  @media(max-width:840px){.grid2{grid-template-columns:1fr;}}

  /* TABLE */
  .tbl{width:100%;border-collapse:collapse;}
  .tbl th{text-align:left;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);font-weight:600;padding:0 14px 12px;}
  .tbl td{padding:13px 14px;border-top:1px solid var(--brd);font-size:14px;color:var(--t2);vertical-align:middle;}
  .tbl tr:hover td{background:rgba(255,255,255,.015);}
  .tbl .row-clk{cursor:pointer;}
  .tbl .strong{color:var(--t1);font-weight:600;}
  .tbl-wrap{overflow-x:auto;}
  /* Formulaire groupé style iOS (comme SwiftUI Form) */
  .fgroup{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;margin:0 0 14px;overflow:hidden;}
  .frow{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--brd);min-height:46px;}
  .frow:last-child{border-bottom:none;}
  .frow>input,.frow>select,.frow>textarea{background:transparent;border:none;padding:0;width:100%;color:var(--t1);font-size:15px;outline:none;}
  .frow-val>input,.frow-val>select,.frow-val>textarea{background:transparent;border:none;outline:none;padding:0;color:var(--t1);font-size:15px;text-align:right;font-family:inherit;appearance:none;-webkit-appearance:none;}
  .frow>textarea{resize:vertical;min-height:44px;font-family:inherit;}
  .frow .frow-lbl{color:var(--t1);font-size:15px;white-space:nowrap;}
  .frow .frow-val{margin-left:auto;display:flex;align-items:center;gap:8px;}
  .frow select{appearance:none;-webkit-appearance:none;}
  .bdt-row{display:flex;align-items:center;gap:12px;padding:15px 4px;border-bottom:1px solid var(--brd);}
  .bdt-row:last-child{border-bottom:none;}
  .bdt-ic{width:22px;text-align:center;font-size:14px;flex-shrink:0;}
  .bdt-lbl{font-size:14px;color:var(--t3);}
  .bdt-val{margin-left:auto;font-size:14px;font-weight:600;color:var(--t1);text-align:right;}

  /* STATUS */
  .st{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 11px;border-radius:100px;white-space:nowrap;}
  .st::before{content:'';width:7px;height:7px;border-radius:50%;background:currentColor;}
  .st-blue{background:rgba(59,130,246,.14);color:#60a5fa;}
  .st-org{background:rgba(245,158,11,.14);color:#fbbf24;}
  .st-green{background:rgba(74,222,128,.16);color:#34d36b;}
  .st-red{background:rgba(239,68,68,.14);color:#f87171;}
  .st-grey{background:rgba(255,255,255,.07);color:var(--t2);}
  .st-purple{background:rgba(168,85,247,.14);color:#c084fc;}
  .tag{font-size:12px;font-weight:600;padding:3px 9px;border-radius:7px;background:rgba(255,255,255,.06);color:var(--t2);}
  .tag.hot{background:rgba(239,68,68,.14);color:#f87171;}

  .search-inp{width:100%;background:var(--bg1);border:1px solid var(--brd);border-radius:12px;padding:12px 14px;color:var(--t1);font-family:'DM Sans',sans-serif;font-size:14px;margin-bottom:14px;}
  .search-inp:focus{outline:none;border-color:color-mix(in srgb,var(--acc) 55%,transparent);}
  /* FILTERS */
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .chip{background:var(--bg1);border:1px solid var(--brd);color:var(--t2);font-size:13px;font-weight:500;padding:8px 15px;border-radius:100px;cursor:pointer;transition:.15s;}
  .chip:hover{border-color:rgba(74,222,128,.3);}
  .chip.active{background:color-mix(in srgb,var(--acc) 15%,transparent);border-color:color-mix(in srgb,var(--acc) 45%,transparent);color:var(--acc);}

  /* EMPTY */
  .empty{text-align:center;padding:54px 20px;color:var(--t3);}
  .empty .e-ico{font-size:42px;margin-bottom:12px;opacity:.6;}
  .empty p{font-size:14px;margin-bottom:16px;}

  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:50;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;}
  .overlay.open{display:flex;}
  .modal{background:var(--bg1);border:1px solid var(--brd);border-radius:20px;width:100%;max-width:560px;padding:26px;animation:pop .2s ease;}
  .modal.wide{max-width:1000px;}
  .overlay.full{padding:0;align-items:flex-start;}
  @media(min-width:781px){ .overlay.full{left:262px;} }
  @media(min-width:781px) and (max-width:1100px){ .overlay.full{left:226px;} }
  .modal.full{max-width:none;width:100%;min-height:100dvh;border-radius:0;padding:22px clamp(16px,5vw,64px) 60px;}
  .modal.full .modal-head{position:sticky;top:-22px;background:var(--bg1);z-index:5;margin:-22px clamp(-16px,-5vw,-64px) 16px;padding:16px clamp(16px,5vw,64px);border-bottom:1px solid var(--brd);}
  @media(min-width:781px){ .int-cols{column-count:2;column-gap:26px;} .int-cols>*{break-inside:avoid;-webkit-column-break-inside:avoid;} }
  .comm-zone{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:12px 14px;min-height:54px;font-size:14px;line-height:1.5;white-space:pre-wrap;word-break:break-word;}
  .comm-zone.empty{color:var(--t3);font-style:italic;display:flex;align-items:center;}
  .comm-lbl{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--t3);margin-bottom:6px;display:block;}
  .fsec{break-inside:avoid;-webkit-column-break-inside:avoid;}
  .soc-search{width:100%;background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:10px 12px;color:var(--t1);font-size:14px;}
  .soc-list{margin-top:4px;max-height:240px;overflow:auto;border:1px solid var(--brd);border-radius:10px;background:var(--bg1);box-shadow:0 8px 24px rgba(0,0,0,.18);}
  .soc-item{padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--brd);}
  .soc-item:hover,.soc-item.on{background:color-mix(in srgb,var(--acc) 16%,transparent);}
  .soc-item:last-child{border-bottom:none;}
  @media(min-width:781px){ .int-form-cols{column-count:2;column-gap:26px;} }
  @media(min-width:1240px){ .int-form-cols{column-count:3;} }
  @keyframes pop{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  .modal-head{display:flex;align-items:center;margin-bottom:20px;}
  .modal-head h3{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;}
  .modal-close{margin-left:auto;background:var(--bg2);border:1px solid var(--brd);color:var(--t2);width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:16px;}
  .modal-close:hover{color:var(--t1);}
  .sheet-head{gap:10px;}
  .sheet-head h3{flex:1;text-align:center;font-size:16px;}
  .form-sec{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);font-weight:700;margin:20px 0 10px;}
  .form-sec:first-of-type{margin-top:6px;}
  .field{margin-bottom:15px;}
  .field label{display:block;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:7px;}
  .field input,.field select,.field textarea{width:100%;background:var(--deep);border:1px solid var(--brd);border-radius:10px;padding:11px 13px;color:var(--t1);font-family:'DM Sans',sans-serif;font-size:14px;transition:.15s;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:color-mix(in srgb,var(--acc) 55%,transparent);}
  .field textarea{resize:vertical;min-height:80px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
  @media(max-width:520px){.field-row{grid-template-columns:1fr;}}
  .modal-foot{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap;}
  .modal-foot .btn{flex:1 1 auto;min-width:110px;justify-content:center;}

  /* DETAIL */
  .detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
  @media(max-width:520px){.detail-grid{grid-template-columns:1fr;}}
  .dt-lbl{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:5px;}
  .dt-val{font-size:15px;color:var(--t1);}
  .detail-desc{background:var(--bg);border:1px solid var(--brd);border-radius:12px;padding:15px;margin-top:16px;font-size:14px;color:var(--t2);line-height:1.6;}
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--brd);margin-bottom:16px;overflow-x:auto;}
  .tab{padding:9px 14px;font-size:13px;font-weight:600;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
  .tab:hover{color:var(--t2);}
  .tab.active{color:var(--acc);border-bottom-color:var(--acc);}

  /* PLANNING/LIST ROWS */
  .pl-row{display:flex;align-items:center;gap:15px;background:var(--bg1);border:1px solid var(--brd);border-radius:12px;padding:13px 16px;margin-bottom:9px;cursor:pointer;transition:.15s;}
  .pl-row:hover{border-color:rgba(74,222,128,.3);transform:translateX(2px);}
  .pl-time{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;min-width:50px;}
  .pl-info{flex:1;min-width:0;}
  .pl-title{font-size:15px;font-weight:600;margin-bottom:3px;}
  .pl-meta{font-size:13px;color:var(--t3);}
  .planning-date{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:1px;color:var(--acc);text-transform:uppercase;margin:22px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--brd);}
  /* Calendrier (planning style Organilog) */
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-h{text-align:center;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;padding:4px 0;font-weight:600;}
  .cal-d{min-height:62px;border:1px solid var(--brd);border-radius:10px;padding:6px;cursor:pointer;display:flex;flex-direction:column;gap:4px;transition:.12s;background:var(--bg);}
  .cal-d:hover{border-color:color-mix(in srgb,var(--acc) 45%,transparent);}
  .cal-d.out{opacity:.32;}
  .cal-d.today{border-color:var(--acc);}
  .cal-d.sel{background:color-mix(in srgb,var(--acc) 14%,transparent);border-color:var(--acc);}
  .cal-d .num{font-size:13px;font-weight:600;}
  .cal-dots{display:flex;gap:3px;flex-wrap:wrap;}
  .cal-dot{width:6px;height:6px;border-radius:50%;}
  .cal-cnt{margin-top:auto;font-size:10px;color:var(--t3);font-weight:600;}
  @media(max-width:560px){ .cal{gap:3px;} .cal-d{min-height:48px;padding:4px;border-radius:8px;} .cal-d .num{font-size:12px;} .cal-cnt{display:none;} }

  .avatar{width:30px;height:30px;border-radius:50%;background:rgba(74,222,128,.2);border:1px solid rgba(74,222,128,.3);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--acc);flex-shrink:0;}
  .ppl{display:flex;align-items:center;gap:9px;}

  /* CHARTS */
  .bar-row{display:flex;align-items:center;gap:12px;margin-bottom:13px;}
  .bar-lbl{font-size:13px;color:var(--t2);width:140px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bar-track{flex:1;height:12px;background:var(--bg);border-radius:100px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--acc2),var(--acc));transition:width .5s;}
  .bar-val{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;width:64px;text-align:right;flex-shrink:0;}

  /* MAP */
  .map-canvas{position:relative;height:440px;border-radius:16px;overflow:hidden;border:1px solid var(--brd);background:linear-gradient(135deg,#10141b,#181f2b);background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px;}
  /* Isole la carte Leaflet : ses z-index internes restent confinés et n'écrasent plus le menu/la barre */
  #map{isolation:isolate;position:relative;z-index:0;}
  .tiles-night{filter:brightness(0.82) saturate(0.85) contrast(1.04);}
  /* Carte plein écran */
  .content-map{padding:0 !important;}
  .content-map .map-card{margin:0;border-radius:0;border:0;}
  .leaflet-popup-content a{display:inline-block;}
  .marker{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
  .marker .pin{width:34px;height:34px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.4);}
  .marker .pin span{transform:rotate(45deg);font-size:15px;}
  .marker .lbl{font-size:11px;background:rgba(0,0,0,.6);padding:2px 7px;border-radius:6px;white-space:nowrap;color:#fff;}
  .marker.veh .pin{background:var(--org);} .marker.cli .pin{background:var(--acc);}

  /* TIMELINE */
  .tl-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--brd);}
  .tl-dot{width:34px;height:34px;border-radius:10px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .tl-body{flex:1;min-width:0;}
  .tl-act{font-size:14px;color:var(--t1);font-weight:500;}
  .tl-det{font-size:13px;color:var(--t3);margin-top:2px;}
  .tl-time{font-size:12px;color:var(--t3);white-space:nowrap;}

  /* LOGIN */
  .login{position:fixed;inset:0;z-index:200;background:radial-gradient(ellipse 50% 45% at 50% 42%,rgba(74,222,128,.14) 0%,rgba(22,128,60,.05) 35%,transparent 65%),var(--deep);display:flex;align-items:center;justify-content:center;padding:20px;}
  .login-box{width:100%;max-width:380px;text-align:center;}
  .login-logo{width:104px;height:104px;margin:0 auto 18px;border-radius:24px;object-fit:cover;display:block;box-shadow:0 14px 44px rgba(0,0,0,.45),0 0 60px rgba(74,222,128,.22);}
  .login-box h2{font-family:'Space Mono',monospace;font-size:22px;letter-spacing:2px;margin-bottom:4px;font-weight:700;}
  .login-box p{color:var(--t3);font-size:13px;margin-bottom:24px;}
  .login-card{background:var(--bg1);border:1px solid var(--brd);border-radius:16px;padding:22px;margin-top:18px;text-align:left;box-shadow:0 24px 60px rgba(0,0,0,.5);}
  .login-card-title{text-align:center;font-weight:700;font-size:15px;margin-bottom:18px;color:var(--t1);}
  .login-card .field label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);}
  .login-remember{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--t2);margin:2px 0 8px;cursor:pointer;}
  .login-remember input{width:16px;height:16px;accent-color:var(--acc);}
  .login-error{color:var(--red);font-size:12px;font-weight:600;margin-bottom:8px;}
  .login-users{display:flex;flex-direction:column;gap:10px;}
  .login-user{display:flex;align-items:center;gap:12px;background:var(--bg1);border:1px solid var(--brd);border-radius:12px;padding:13px 16px;cursor:pointer;transition:.15s;text-align:left;}
  .login-user:hover{border-color:rgba(74,222,128,.4);}
  .login-user .nom{font-weight:600;font-size:15px;}
  .login-user .role2{font-size:12px;color:var(--t3);}
  .pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:260px;margin:0 auto;}
  .pin-key{background:var(--bg1);border:1px solid var(--brd);color:var(--t1);font-size:22px;font-family:'Space Mono',monospace;padding:16px 0;border-radius:14px;cursor:pointer;transition:.1s;}
  .pin-key:hover{background:var(--bg2);border-color:rgba(74,222,128,.4);}
  .pin-key:active{transform:scale(.95);}
  .pin-dots{display:flex;gap:14px;justify-content:center;margin:20px 0;}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--t3);transition:.15s;}
  .pin-dot.on{background:var(--acc);border-color:var(--acc);}
  .pin-err{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:none}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
  .link-btn{background:none;border:none;color:var(--t3);font-size:13px;cursor:pointer;margin-top:16px;text-decoration:underline;}
  .link-btn:hover{color:var(--acc);}

  /* NOTIF */
  .bell{position:relative;background:var(--bg2);border:1px solid var(--brd);color:var(--t2);width:42px;height:42px;border-radius:11px;font-size:18px;cursor:pointer;transition:.15s;}
  .bell:hover{color:var(--t1);border-color:rgba(74,222,128,.4);}
  .bell-count{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;font-size:11px;font-weight:700;min-width:19px;height:19px;border-radius:100px;display:flex;align-items:center;justify-content:center;padding:0 5px;}
  .notif-panel{position:absolute;top:54px;right:0;width:340px;max-width:90vw;background:var(--bg1);border:1px solid var(--brd);border-radius:14px;box-shadow:0 20px 50px rgba(0,0,0,.5);z-index:30;overflow:hidden;}
  .notif-head{padding:15px 18px;border-bottom:1px solid var(--brd);font-weight:600;font-size:14px;}
  .notif-list{max-height:380px;overflow-y:auto;}
  .notif-it{display:flex;gap:12px;padding:13px 18px;border-bottom:1px solid var(--brd);cursor:pointer;}
  .notif-it:hover{background:var(--bg2);}
  .notif-it .ni-ico{font-size:18px;}
  .notif-it .ni-txt{font-size:13px;color:var(--t2);line-height:1.4;}
  .notif-it .ni-txt b{color:var(--t1);}

  /* SCANNER */
  .scan-view{background:#000;border-radius:14px;overflow:hidden;aspect-ratio:4/3;position:relative;margin-bottom:16px;}
  .scan-view video{width:100%;height:100%;object-fit:cover;}
  .scan-frame{position:absolute;inset:18% 15%;border:3px solid var(--acc);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,.35);}
  .scan-result{background:var(--bg);border:1px solid rgba(74,222,128,.4);border-radius:12px;padding:16px;margin-bottom:16px;}
  .bscan-toggle{display:flex;gap:10px;margin-bottom:14px;}
  .bscan-tg{flex:1;padding:12px;border-radius:12px;border:1.5px solid var(--brd);background:var(--bg1);color:var(--t3);font-weight:700;font-size:14px;cursor:pointer;transition:.15s;}
  .bscan-tg.on{border-color:var(--acc);background:color-mix(in srgb,var(--acc) 14%,transparent);color:var(--acc);}
  .bscan-tg.rem.on{border-color:var(--red);background:color-mix(in srgb,var(--red) 14%,transparent);color:var(--red);}
  .bscan-err{background:color-mix(in srgb,var(--red) 10%,transparent);border:1px solid color-mix(in srgb,var(--red) 35%,transparent);color:var(--red);border-radius:12px;padding:13px 15px;font-size:13.5px;font-weight:600;text-align:center;}
  /* VISITE GUIDÉE */
  .tour-card{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:120;width:min(440px,calc(100vw - 28px));background:var(--bg1);border:1px solid rgba(74,222,128,.35);border-radius:18px;box-shadow:0 24px 70px rgba(0,0,0,.6);padding:20px 20px 16px;animation:tourIn .3s ease;}
  @keyframes tourIn{from{opacity:0;transform:translateX(-50%) translateY(22px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
  .tour-card .step{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--acc);font-weight:700;}
  .tour-card h4{font-size:18px;margin:6px 0 8px;display:flex;align-items:center;gap:9px;}
  .tour-card p{font-size:14px;color:var(--t2);line-height:1.6;}
  .tour-card .menuref{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--t3);background:var(--bg2);border:1px solid var(--brd);padding:3px 11px;border-radius:100px;margin-top:11px;}
  .tour-dots{display:flex;gap:5px;justify-content:center;margin:14px 0 12px;flex-wrap:wrap;}
  .tour-dots i{width:7px;height:7px;border-radius:50%;background:var(--brd);transition:.2s;}
  .tour-dots i.on{background:var(--acc);width:18px;border-radius:4px;}
  .tour-btns{display:flex;gap:8px;align-items:center;}
  .tour-btns .sp{flex:1;}
  .nav-item.tour-hl{outline:2px solid var(--acc);outline-offset:-1px;background:color-mix(in srgb,var(--acc) 18%,transparent)!important;box-shadow:0 0 0 4px color-mix(in srgb,var(--acc) 16%,transparent);}
  /* Étiquette de titre sur la carte des box */
  .leaflet-tooltip.box-tip{background:#16803C;color:#fff;border:none;font-weight:700;font-size:11px;padding:2px 8px;border-radius:7px;box-shadow:0 2px 6px rgba(0,0,0,.35);white-space:nowrap;}
  .leaflet-tooltip.box-tip::before{display:none;}
  /* TABLEAU TYPE EXCEL (intégré) */
  .xl{border-collapse:collapse;width:100%;min-width:820px;font-size:13px;}
  .xl th,.xl td{border:1px solid var(--brd);padding:9px 12px;white-space:nowrap;}
  .xl th{background:var(--bg2);color:var(--t2);font-weight:700;font-size:11px;letter-spacing:.04em;text-transform:uppercase;position:sticky;top:0;text-align:left;}
  .xl tbody tr{cursor:pointer;}
  .xl tbody tr:nth-child(even){background:color-mix(in srgb,var(--bg2) 50%,transparent);}
  .xl tbody tr:hover{background:var(--bg2);}
  .xl tfoot td{background:var(--bg2);border-top:2px solid var(--acc);font-weight:800;}
  /* MESSAGERIE : avatar de groupe + mentions @ */
  .grp-ava{border-radius:50%;object-fit:cover;background:color-mix(in srgb,var(--acc) 20%,transparent);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--brd);}
  .mention{color:var(--acc);font-weight:700;}
  .mention-pop{position:absolute;bottom:54px;left:0;right:62px;background:var(--bg1);border:1px solid var(--brd);border-radius:12px;box-shadow:0 14px 36px rgba(0,0,0,.55);overflow:hidden auto;z-index:20;max-height:230px;}
  .mention-item{padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px;}
  .mention-item:last-child{border-bottom:none;}
  .mention-item:hover{background:var(--bg2);}
  .grp-photo-pick{width:78px;height:78px;border-radius:50%;border:2px dashed var(--brd);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;background:var(--bg2);font-size:26px;color:var(--t3);}
  .grp-photo-pick img{width:100%;height:100%;object-fit:cover;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--acc);color:var(--on-acc);font-weight:700;font-size:14px;padding:13px 22px;border-radius:12px;z-index:100;transition:transform .3s;box-shadow:0 10px 30px rgba(0,0,0,.4);}
  .toast.show{transform:translateX(-50%) translateY(0);}

  /* ASSISTANT */
  .fab{position:fixed;right:24px;bottom:24px;width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,#1A7A3E,#176030);color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 12px 30px rgba(0,0,0,.5),0 0 0 1px rgba(74,222,128,.25);z-index:60;transition:transform .15s;}
  .fab:hover{transform:scale(1.07);}
  .asst{position:fixed;right:24px;bottom:92px;width:374px;max-width:calc(100vw - 32px);height:540px;max-height:calc(100vh - 130px);background:var(--bg1);border:1px solid var(--brd);border-radius:18px;box-shadow:0 30px 70px rgba(0,0,0,.6);z-index:61;display:none;flex-direction:column;overflow:hidden;}
  .asst.open{display:flex;animation:pop .2s ease;}
  .asst-head{padding:15px 16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:12px;}
  .asst-head .ava{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#1A7A3E,#176030);display:flex;align-items:center;justify-content:center;font-size:18px;}
  .asst-head .t{font-weight:700;font-size:15px;}
  .asst-head .s{font-size:12px;color:var(--acc);display:flex;align-items:center;gap:5px;}
  .asst-head .x{margin-left:auto;}
  .asst-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
  .msg{max-width:86%;padding:11px 14px;border-radius:15px;font-size:14px;line-height:1.5;}
  .msg.bot{background:var(--bg2);color:var(--t1);border-bottom-left-radius:4px;align-self:flex-start;}
  .msg.bot b{color:var(--acc);}
  .msg.user{background:var(--acc2);color:#fff;border-bottom-right-radius:4px;align-self:flex-end;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;padding:0 14px 10px;}
  .asst-chip{background:var(--bg2);border:1px solid var(--brd);color:var(--t2);font-size:12.5px;padding:7px 12px;border-radius:100px;cursor:pointer;transition:.15s;}
  .asst-chip:hover{border-color:var(--acc);color:var(--acc);}
  .asst-foot{padding:11px;border-top:1px solid var(--brd);display:flex;gap:8px;}
  .asst-foot input{flex:1;background:var(--deep);border:1px solid var(--brd);border-radius:10px;padding:10px 13px;color:var(--t1);font-family:'DM Sans',sans-serif;font-size:14px;}
  .asst-foot input:focus{outline:none;border-color:color-mix(in srgb,var(--acc) 55%,transparent);}

  /* PERMISSIONS */
  .perm-row{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--brd);}
  .perm-row .pn{flex:1;font-size:14px;}
  .switch{position:relative;width:46px;height:26px;flex-shrink:0;cursor:pointer;}
  .switch input{display:none;}
  .switch .track{position:absolute;inset:0;background:var(--bg3);border-radius:100px;transition:.2s;}
  .switch .knob{position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.2s;}
  .switch input:checked + .track{background:var(--acc);}
  .switch input:checked + .track + .knob{transform:translateX(20px);}

  .sidebar-backdrop{display:none;}
  @media(max-width:780px){
    .sidebar{position:fixed;left:0;top:0;z-index:40;transform:translateX(-100%);transition:transform .25s;}
    .sidebar.open{transform:none;box-shadow:0 0 40px rgba(0,0,0,.5);}
    .sidebar.open ~ .sidebar-backdrop{display:block;position:fixed;inset:0;z-index:39;background:rgba(0,0,0,.45);}
    .menu-btn{display:flex;align-items:center;justify-content:center;order:0;}
    .content,.topbar{padding-left:16px;padding-right:16px;}
    .bar-lbl{width:96px;}
    /* ── Interface iPhone : barre « ELAN GESTION » centrée + ☰ + cloche/avatar, titre dans le contenu ── */
    .topbar{position:sticky;top:0;z-index:30;gap:8px;padding-top:12px;padding-bottom:12px;}
    .topbar-title{display:none;}
    .topbar-actions{display:none;}
    .topbar-brand{display:block;flex:1;min-width:0;text-align:center;overflow:hidden;text-overflow:ellipsis;font-size:11px;letter-spacing:1px;color:var(--t3);font-weight:700;pointer-events:none;white-space:nowrap;}
    @media(max-width:560px){ .topbar-brand{display:none;} .topbar{gap:10px;} .topbar .menu-btn{margin-right:auto;} }
    /* Fiche intervention : barre d'onglets pleine largeur, plate, comme Organilog */
    .int-tabs{margin-left:-16px !important;margin-right:-16px !important;border-radius:0 !important;border-left:none !important;border-right:none !important;}
    #theme-btn{display:none;}
    .topbar-bell{margin-left:auto;}
    .topbar .bell{width:34px;height:34px;font-size:15px;}
    .topbar-ava{display:flex;width:36px;height:36px;cursor:pointer;}
    /* Les tableaux de liste deviennent des cartes (style iOS ELAN) sur mobile */
    .list-tbl,.list-tbl tbody,.list-tbl tr,.list-tbl td{display:block;width:100%;}
    .list-tbl thead{display:none;}
    .list-tbl{border-collapse:separate;}
    .list-tbl .tbl-wrap{overflow:visible;}
    .list-tbl tr{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;margin-bottom:8px;padding:8px 6px;position:relative;}
    .list-tbl td{border:none !important;padding:3px 14px;font-size:13px;color:var(--t2);}
    .list-tbl td:first-child{font-size:15px;font-weight:600;color:var(--t1);padding-top:6px;padding-bottom:2px;}
    .list-tbl td:last-child{padding-top:8px;text-align:left !important;}
    .list-tbl td:empty{display:none;}
    .card:has(>.tbl-wrap>.list-tbl){background:transparent;border:none;padding:0;}
    .page-head{display:block;padding:14px 16px 0;}
    .content-map .page-head{padding:14px 16px;}
    /* Formulaires plein écran (feuille iOS) */
    .overlay{padding:0;align-items:flex-start;}
    .modal{max-width:100%;width:100%;min-height:100dvh;border-radius:0;padding:16px 16px 40px;}
    .modal-head{position:sticky;top:0;background:var(--bg1);z-index:3;margin:-16px -16px 14px;padding:14px 16px;border-bottom:1px solid var(--brd);}
    .modal-foot{position:sticky;bottom:0;background:var(--bg1);margin:14px -16px -40px;padding:14px 16px;border-top:1px solid var(--brd);}
  }
  /* ── Tablettes (iPad) : barre latérale plus compacte ── */
  @media(min-width:781px) and (max-width:1100px){
    .sidebar{width:226px;}
    .content,.topbar{padding-left:22px;padding-right:22px;}
  }
  /* ── Orientation paysage sur petits écrans (téléphone à l'horizontale) ── */
  @media(orientation:landscape) and (max-height:560px){
    .login{align-items:flex-start;overflow-y:auto;padding-top:22px;}
    .topbar{padding-top:12px;padding-bottom:12px;}
    .content{padding-top:18px;}
    .asst{height:calc(100vh - 78px);bottom:68px;}
  }
  /* ── Encoches / Dynamic Island / poinçon caméra — safe-area complète ── */
  @supports(padding:max(0px)){
    /* Bulle assistant, visite guidée : bas + côté droit */
    .fab{right:max(24px,env(safe-area-inset-right));bottom:max(24px,env(safe-area-inset-bottom));}
    .asst{right:max(24px,env(safe-area-inset-right));}
    .tour-card{bottom:max(22px,env(safe-area-inset-bottom));}
    /* Menu latéral : retrait à gauche (notch en paysage) */
    .sidebar{padding-left:env(safe-area-inset-left);}
    /* Barre du haut : descend sous la Dynamic Island / le poinçon caméra */
    .topbar{padding-top:max(18px,env(safe-area-inset-top));}
    /* Écran de connexion : haut + bas dégagés */
    .login{padding-top:max(20px,env(safe-area-inset-top));padding-bottom:max(20px,env(safe-area-inset-bottom));}
    @media(min-width:781px){ .content{padding-bottom:max(48px,env(safe-area-inset-bottom));} }
    /* Téléphones (iPhone Dynamic Island, Samsung punch-hole) */
    @media(max-width:780px){
      .topbar{padding-top:max(12px,env(safe-area-inset-top));padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right));}
      .content{padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right));padding-bottom:max(40px,env(safe-area-inset-bottom));}
      .sidebar{padding-top:env(safe-area-inset-top);}
      .notif-panel{max-height:calc(100vh - 90px - env(safe-area-inset-top));overflow-y:auto;}
      /* Feuilles plein écran (formulaires) : en-tête sous l'Island, pied au-dessus du home indicator */
      .modal-head{padding-top:max(14px,env(safe-area-inset-top));}
      .modal-foot{padding-bottom:max(14px,env(safe-area-inset-bottom));}
      .asst{max-height:calc(100vh - 130px - env(safe-area-inset-top));}
    }
    /* Téléphone à l'horizontale : encoche/poinçon sur le côté */
    @media(orientation:landscape) and (max-width:1024px){
      .topbar{padding-left:max(20px,env(safe-area-inset-left));padding-right:max(20px,env(safe-area-inset-right));}
      .content{padding-left:max(20px,env(safe-area-inset-left));padding-right:max(20px,env(safe-area-inset-right));}
      .login{padding-left:max(20px,env(safe-area-inset-left));padding-right:max(20px,env(safe-area-inset-right));}
      .modal{padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right));}
    }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="login" style="display:none"><div class="login-box" id="login-box"></div></div>

<!-- APP -->
<div class="app" id="app-root" style="display:none">
  <aside class="sidebar" id="sidebar">
    <div class="brand">

   Un « espace » = un identifiant d'équipe + une clé de chiffrement uniques.
   Chaque entreprise a son espace : données séparées et illisibles par les autres.
   Le « Code espace » encode (identifiant + clé + nom) pour rejoindre l'espace en 1 saisie. */
function teamopCurrentSpace(){ return localStorage.getItem('elan_sync_team')||FB_TEAM; }
function teamopGenSpace(name){
  const slug=(name||'espace').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,20)||'espace';
  const rnd=Array.from(crypto.getRandomValues(new Uint8Array(4))).map(b=>b.toString(16).padStart(2,'0')).join('');
  const t=slug+'-'+rnd;
  const k=_b64e(crypto.getRandomValues(new Uint8Array(24))).replace(/[^A-Za-z0-9]/g,'').slice(0,28);
  const code=btoa(unescape(encodeURIComponent(JSON.stringify({t,k,n:name||''})))).replace(/=+$/,'');
  return {t,k,code,name:name||''};
}
function teamopDecode(code){ try{ const o=JSON.parse(decodeURIComponent(escape(atob((code||'').trim())))); if(o&&o.t&&o.k) return o; }catch(e){} return null; }

function teamopCopy(code,btn){ try{ navigator.clipboard.writeText(code); if(btn){ const o=btn.textContent; btn.textContent='Copié !'; setTimeout(()=>btn.textContent=o,1600); } }catch(e){ toast('Copie manuelle : '+code); } }
function teamopSpaces(){ try{ return JSON.parse(localStorage.getItem('teamop_spaces')||'[]'); }catch(e){ return []; } }
function teamopShowSavedCode(t){ const s=teamopSpaces().find(x=>x.t===t); if(!s){ toast('Espace introuvable'); return; } const code=btoa(unescape(encodeURIComponent(JSON.stringify({t:s.t,k:s.k,n:s.name})))).replace(/=+$/,''); teamopShowCode({t:s.t,k:s.k,name:s.name,code}); }
function teamopJoinPrompt(){
  const code=prompt('Colle le Code espace de ton entreprise :'); if(!code) return;
  teamopJoin(code);
}
function teamopJoin(code){
  const o=teamopDecode(code); if(!o){ toast('Code espace invalide'); return; }
  if(!confirm('Rejoindre l\'espace « '+(o.n||o.t)+' » ?\n\nCet appareil va se connecter UNIQUEMENT aux données de cet espace (il repart propre et adopte les données de cet espace).')) return;
  localStorage.setItem('elan_sync_team',o.t);
  localStorage.setItem('elan_sync_secret',o.k);
  localStorage.setItem('elan_sync_on','1');
  try{ localStorage.removeItem(STORE_KEY); }catch(e){}   // repart propre → pas de fuite de données entre espaces
  _ck={}; _syncTs=0;
  toast('Connexion à l\'espace « '+(o.n||o.t)+' »…');
  setTimeout(()=>location.reload(),700);
}

function showAside(){ return localStorage.getItem('elan_aside')==='1'; }

/* Accès d'un module pour un utilisateur donné : surcharge par utilisateur > défaut du rôle */
function userSeesModule(u,k){ if(!u) return false; if(u.role==='admin') return true;
  const it=NAV.flatMap(s=>s.items).find(x=>x.k===k);
  const ov=u.acces&&u.acces.modules; if(ov && Object.prototype.hasOwnProperty.call(ov,k)) return ov[k]!==false;
  // Réglage explicite par rôle (modules non réservés à l'admin) — s'applique à TOUS les rôles
  const pr=db.permissions[u.role]; if(pr && Object.prototype.hasOwnProperty.call(pr,k) && !(it&&it.admin)) return pr[k]!==false;
  if(u.role==='dr' || u.role==='chefEquipe') return !['utilisateurs','permissions'].includes(k);
  const p = db.permissions[u.role] || db.permissions.technicien || {};
  if(it && it.admin && p[k]!==true) return false;
  return p[k] !== false;
}
function canSee(item){ if(!currentUser) return false; if(item.aside && !showAside()) return false; return userSeesModule(currentUser,item.k); }
/* ── Droits d'action par rôle (qui peut supprimer, annuler, créer, tout voir) ──
   admin / dr / chefEquipe : tout
   commercial : crée interventions & devis, voit tout, mais ne SUPPRIME pas
   technicien : remplit ses rapports, voit SES interventions ; ne crée/annule/supprime pas
   (chaque droit est réglable au cas par cas par utilisateur via l'écran Accès) */
const CAPS = {
  admin:      { supprimer:1, annuler:1, voirTout:1, creerIntervention:1 },
  dr:         { supprimer:1, annuler:1, voirTout:1, creerIntervention:1 },
  chefEquipe: { supprimer:1, annuler:1, voirTout:1, creerIntervention:1 },
  commercial: { supprimer:0, annuler:1, voirTout:1, creerIntervention:1 },
  compta:     { supprimer:0, annuler:0, voirTout:1, creerIntervention:0 },
  technicien: { supprimer:0, annuler:0, voirTout:0, creerIntervention:0 },
};
function userCap(u,cap){ if(!u) return false; if(u.role==='admin') return true;
  const ov=u.acces&&u.acces.caps; if(ov && Object.prototype.hasOwnProperty.call(ov,cap)) return !!ov[cap];
  const rp=db.permissions&&db.permissions[u.role]&&db.permissions[u.role].caps; if(rp && Object.prototype.hasOwnProperty.call(rp,cap)) return !!rp[cap];
  const c=CAPS[u.role]||CAPS.technicien; return !!c[cap]; }
function can(cap){ if(!currentUser) return false; return userCap(currentUser,cap); }
/* Technicien connecté → son enregistrement technicien (par lien explicite, sinon par nom) */
function myTechId(){ if(!currentUser) return null; if(currentUser.techId) return currentUser.techId;
  const fn=fullName(currentUser).toLowerCase().trim(); const t=(db.techniciens||[]).find(x=>(x.nom||'').toLowerCase().trim()===fn); return t?t.id:null; }
/* Interventions visibles selon le rôle : tout, ou seulement les siennes pour un technicien */
function visibleInts(list){ if(can('voirTout')) return list||[]; const tid=myTechId(); return (list||[]).filter(i=>intTechIds(i).includes(tid)); }
/* Box visibles selon le rôle : tout (admin/chef/DR/commercial/compta = « voir tout »), ou seulement
   les box assignés au technicien connecté. Même logique que les interventions → séparation par technicien. */
function visibleBoxes(list){ if(can('voirTout')) return list||[]; const tid=myTechId(); return (list||[]).filter(b=>b.visibleTous || (b.techIds||[]).includes(tid)); }

function gsearch(q){ const box=$('gsrch-res'); if(!box) return; q=norm((q||'').trim()); if(q.length<2){ box.style.display='none'; box.innerHTML=''; return; }
  const out=[];
  db.clients.forEach(c=>{ if(norm(c.nom||'').includes(q)) out.push({ic:'🏢',t:c.nom,sub:'Client',fn:"ficheClient('"+c.id+"')"}); });
  db.interventions.forEach(i2=>{ if(norm((i2.num||'')+' '+(i2.titre||'')+' '+clientName(i2.clientId)).includes(q)) out.push({ic:'🧰',t:(i2.num?i2.num+' · ':'')+(i2.titre||''),sub:(i2.date?fmtShort(i2.date)+' · ':'')+((STATUT_INT[i2.statut]||{}).l||''),fn:"detailIntervention('"+i2.id+"')"}); });
  (db.chantiers||[]).forEach(ch=>{ if(norm(ch.nom||'').includes(q)) out.push({ic:'🏗️',t:ch.nom,sub:'Chantier',fn:"detailChantier('"+ch.id+"')"}); });
  (db.taches||[]).forEach(t2=>{ if(norm(t2.titre||'').includes(q)) out.push({ic:'✅',t:t2.titre,sub:'Tâche',fn:"go('taches')"}); });
  const top=out.slice(0,8);
  box.innerHTML=top.length?top.map(r=>`<div class="gr" onclick="gsrchGo(this)" data-fn="${esc(r.fn)}"><span>${r.ic}</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.t)}</span><span class="gt">${esc(r.sub)}</span></div>`).join(''):'<div class="gr" style="cursor:default;color:var(--t3)">Aucun résultat</div>';

function monthShift(iso,n){ const d=new Date(iso+'T00:00:00'); d.setMonth(d.getMonth()+n); return d.toISOString().slice(0,10); }
function planDropDay(e,iso){ e.preventDefault(); const id=(e.dataTransfer.getData('text/plain')||'').trim(); const i=db.interventions.find(x=>x.id===id); if(!i)return; if(i.date===iso)return;

function planDropTech(e,techId){ e.preventDefault(); const id=(e.dataTransfer.getData('text/plain')||'').trim(); const i=db.interventions.find(x=>x.id===id); if(!i)return;
  i.techId=techId||''; i.techIds=techId?[techId]:[]; if(!i.date){ i.date=planSel; } if(i.statut==='aplanifier') i.statut='planifiee';
  intHisto(i,'Assignée à '+(techName(techId)||'Non assigné'));
  const cf=intConflictOf(i,i.id); const ab=techId?absentOn(techId,i.date):null; save(); views.planning();

        ${badge(STATUT_INT,i.statut)}
        <span style="display:flex;gap:4px">${!fin&&i.statut!=='annulee'?`${i.statut==='planifiee'?`<button class="btn ghost sm" title="Démarrer (passe en cours)" onclick="intDemarrerQuick('${i.id}')">▶</button>`:''}<button class="btn sm" title="Effectué" onclick="intEffectuer('${i.id}')">Effectué</button>`:`<button class="btn ghost sm" title="Rapport" onclick="formRapport('${i.id}')">Rapport</button>`}</span>
      </span>
    </div>`; };
  if(intView==='liste'){
    const labels={all:'Toutes',aplanifier:'À planifier',planifiee:'Planifiées',encours:'En cours',terminee:'Terminées',annulee:'Annulées'};
    const counts={}; Object.keys(labels).forEach(k=>counts[k]= k==='all'?SRC.length:SRC.filter(i=>i.statut===k).length);
    let list=[...SRC];
    const q=norm(intSearch||'');
    if(q) list=list.filter(i=>norm((i.num||'')+' '+(i.titre||'')+' '+(i.type||'')+' '+clientName(i.clientId)+' '+techNames(i)).includes(q));
    if(intFilter!=='all') list=list.filter(i=>i.statut===intFilter);
    if(intTechF) list=list.filter(i=>intTechIds(i).includes(intTechF));
    if(intPeriod==='jour') list=list.filter(i=>i.date===todayISO());
    else if(intPeriod==='semaine'){ const days=weekDays(todayISO()); list=list.filter(i=>days.includes(i.date)); }
    else if(intPeriod==='mois'){ const m=todayISO().slice(0,7); list=list.filter(i=>(i.date||'').indexOf(m)===0); }
    list.sort((a,b)=>((b.date||'')+(b.heure||'')).localeCompare((a.date||'')+(a.heure||'')));
    // Groupes par jour (façon Organilog) — À planifier en tête
    const groups={}; list.forEach(i=>{ const k=(i.statut==='aplanifier'||!i.date)?'__aplanifier':i.date; (groups[k]=groups[k]||[]).push(i); });
    const keys=Object.keys(groups).sort((a,b)=>{ if(a==='__aplanifier') return -1; if(b==='__aplanifier') return 1; return b.localeCompare(a); });
    const dayLabel=k=>{ if(k==='__aplanifier') return 'À planifier'; if(k===todayISO()) return 'Aujourd’hui'; if(k===shiftDay(todayISO(),1)) return 'Demain'; if(k===shiftDay(todayISO(),-1)) return 'Hier'; return fmtLong(k); };
    const body=keys.map(k=>`<div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:${k==='__aplanifier'?'var(--org)':k===todayISO()?'var(--acc)':'var(--t3)'};margin:14px 2px 7px;font-weight:700">${dayLabel(k)} · ${groups[k].length}</div>`+groups[k].map(card).join('')).join('');

      <div style="display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:10px 13px;margin-bottom:10px">🔍<input id="int-search" value="${esc(intSearch)}" placeholder="Rechercher (n°, titre, client, type, technicien)…" oninput="intSearch=this.value;views.interventions(true)" style="flex:1;background:transparent;border:none;outline:none;color:var(--t1);font-size:14px;font-family:inherit"></div>
      <div class="filters">${Object.keys(labels).map(k=>`<div class="chip ${intFilter===k?'active':''}" onclick="intFilter='${k}';views.interventions()">${labels[k]} (${counts[k]})</div>`).join('')}</div>
      <div class="filters" style="margin-top:6px"><div class="chip ${!intTechF?'active':''}" onclick="intTechF='';views.interventions()">Tous</div>${db.techniciens.map(t=>`<div class="chip ${intTechF===t.id?'active':''}" onclick="intTechF='${t.id}';views.interventions()">${esc(t.nom)}</div>`).join('')}</div>
      <div class="filters" style="margin-top:6px">${[['tout','Toute période'],['jour','Aujourd’hui'],['semaine','Cette semaine'],['mois','Ce mois']].map(([k,l])=>`<div class="chip ${intPeriod===k?'active':''}" onclick="intPeriod='${k}';views.interventions()">${l}</div>`).join('')}</div>
      ${list.length? body : `<div class="card" style="margin-top:12px">${emptyState('🧰',q?'Aucun résultat pour cette recherche.':'Aucune intervention dans ces filtres.','Nouvelle','formIntervention()')}</div>`}`;
    if(arguments[0]===true){ const si=$('int-search'); if(si){ si.focus(); try{ si.setSelectionRange(si.value.length,si.value.length); }catch(e){} } }
    return;
  }
  // Vue semaine
  if(!intSelDay) intSelDay=todayISO(); if(!intWeekRef) intWeekRef=intSelDay;
  const days=weekDays(intWeekRef), WD=['L','M','M','J','V','S','D'];
  const moisLabel=new Date(intSelDay+'T00:00:00').toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
  const strip=`<div class="card" style="padding:10px 8px;margin-bottom:12px">

    <div style="display:flex;align-items:center;gap:4px">

      <div style="flex:1;display:flex;gap:3px">${days.map((iso,k)=>{ const dd=new Date(iso+'T00:00:00'); const n=SRC.filter(x=>x.date===iso).length; const sel=iso===intSelDay; const today=iso===todayISO();
        return `<div onclick="intSelDay='${iso}';views.interventions()" ondragover="event.preventDefault();this.style.outline='2px solid var(--acc)'" ondragleave="this.style.outline=''" ondrop="this.style.outline='';intDropDay(event,'${iso}')" style="flex:1;text-align:center;cursor:pointer;padding:7px 0;border-radius:10px;background:${sel?'var(--acc)':(today?'color-mix(in srgb,var(--acc) 14%,transparent)':'transparent')};color:${sel?'var(--on-acc)':'var(--t2)'}">
          <div style="font-size:11px">${WD[k]}</div><div style="font-weight:800;font-size:15px">${dd.getDate()}</div>
          <div style="height:12px;margin-top:1px;font-size:10px;font-weight:900;line-height:1">${n?(SRC.filter(x=>x.date===iso).every(x=>x.statut==='terminee'||x.statut==='annulee')?`<span style="color:${sel?'var(--on-acc)':'#22c55e'}">✓</span>`:`<span style="color:${sel?'var(--on-acc)':'var(--red)'}">✕</span>`):''}</div></div>`;}).join('')}</div>
      <button class="btn ghost sm" onclick="intWeekRef=shiftDay(intWeekRef,7);views.interventions()">›</button>
    </div>
    <div style="text-align:center;margin-top:8px"><button class="btn ghost sm" onclick="intSelDay=todayISO();intWeekRef=todayISO();views.interventions()">Aujourd'hui</button></div>
  </div>`;
  const dayInts=SRC.filter(i=>i.date===intSelDay).sort((a,b)=>(a.heure||'').localeCompare(b.heure||''));
  askPos();
  const cardOrg=i=>{ const cli=db.clients.find(c=>c.id===i.clientId)||{};
    const start=i.date&&i.heure?new Date(i.date+'T'+i.heure).getTime():0;
    const fut=start&&start>Date.now()&&(i.statut==='planifiee'||i.statut==='encours');
    const dist=(_myPos&&cli.lat&&cli.lng)?distKm(_myPos,{lat:+cli.lat,lng:+cli.lng}):null;
    const adr=i.adresse||cli.adresse||'';
    return `<div class="card" draggable="true" ondragstart="event.dataTransfer.setData('text/plain','${i.id}')" onclick="detailIntervention('${i.id}')" style="padding:15px 16px;margin-bottom:12px;cursor:pointer;border-left:4px solid ${INT_STCOLOR[i.statut]||'var(--acc)'}">
      <div style="display:flex;gap:12px">
        <div style="flex:1;min-width:0">
          <div style="font-weight:800;color:var(--acc);font-size:14.5px;letter-spacing:.02em;margin-bottom:9px">${esc((i.titre||'').toUpperCase())}</div>
          <div style="display:flex;align-items:center;gap:9px;margin-bottom:8px"><span style="color:var(--t3)">👤</span><b style="font-size:13.5px">${esc((clientName(i.clientId)||'—').toUpperCase())}</b></div>
          <div style="display:flex;gap:9px;margin-bottom:8px"><span style="color:var(--t3)">📍</span><div style="min-width:0">${dist!=null?`<b style="font-size:13px">à ${dist} km de votre position</b><br>`:''}<span style="font-size:12.5px;color:var(--t2)">${esc(adr)||'—'}</span></div></div>
          <div style="display:flex;gap:9px"><span style="color:var(--t3)">🕐</span><div>${fut?`<b style="font-size:13.5px">${esc(fmtCountdownLong(start-Date.now()))}</b><br>`:''}<span style="font-size:12.5px;color:var(--t2)">${new Date((i.date||todayISO())+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'})} ${esc(i.heure||'')}${i.heure?'-'+esc(addMin(i.heure,i.duree||60)):''}</span></div></div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:10px;flex-shrink:0">
          <span onclick="event.stopPropagation();planSel='${i.date}';planWeekRef='${i.date}';planMode='jour';go('planning')" title="Voir au planning" style="font-size:24px;color:var(--acc);cursor:pointer">📅</span>
          ${badge(STATUT_INT,i.statut)}
        </div>
      </div>
    </div>`; };
  $('content').innerHTML=strip
    +`<div style="text-align:center;margin:2px 0 14px"><span style="background:color-mix(in srgb,var(--acc) 16%,transparent);color:var(--t1);font-weight:800;padding:9px 22px;border-radius:100px;font-size:14.5px;text-transform:capitalize">${new Date(intSelDay+'T00:00:00').toLocaleDateString('fr-FR',{weekday:'short',day:'2-digit',month:'short'})}</span></div>`
    +(dayInts.length? dayInts.map(cardOrg).join('') : `<div class="card">${emptyState('🗓️','Aucune intervention ce jour.','Planifier',`formIntervention('','${intSelDay}')`)}</div>`);
};
function intDropDay(e,iso){ e.preventDefault(); const id=(e.dataTransfer.getData('text/plain')||'').trim(); const i=db.interventions.find(x=>x.id===id); if(!i)return; if(i.date===iso)return; i.date=iso; save(); intSelDay=iso; views.interventions(); toast('Intervention déplacée au '+fmtShort(iso)); }
function intEffectuer(id){ const i=db.interventions.find(x=>x.id===id); if(!i)return; if(!i.debutReel)i.debutReel=Date.now(); save(); formRapport(id); }

function addDays(iso,d){ const dt=new Date((iso||todayISO())+'T00:00:00'); dt.setDate(dt.getDate()+(d||0)); return dt.toISOString().slice(0,10); }

/* Chevauchements (même technicien, même jour, plages horaires qui se croisent) */
function toMin(h){ if(!h) return 0; const [a,b]=(h||'0:0').split(':'); return (+a)*60+(+b||0); }
function nextRecurDate(iso,recur){ const d=new Date(iso+'T00:00:00'); if(isNaN(d)) return '';
  if(recur==='hebdo') d.setDate(d.getDate()+7);
  else if(recur==='bimensuelle') d.setDate(d.getDate()+14);
  else if(recur==='mensuelle') d.setMonth(d.getMonth()+1);
  else if(recur==='trimestrielle') d.setMonth(d.getMonth()+3);
  else if(recur==='semestrielle') d.setMonth(d.getMonth()+6);
  else if(recur==='annuelle') d.setFullYear(d.getFullYear()+1);
  else return '';
  return d.toISOString().slice(0,10); }
function intConflictOf(cand,ignoreId){ const ids=intTechIds(cand); if(!ids.length||!cand.date||!cand.heure) return null;
  const s1=toMin(cand.heure), e1=s1+(parseInt(cand.duree)||60);
  return db.interventions.find(x=>x.id!==ignoreId && intTechIds(x).some(t=>ids.includes(t)) && x.date===cand.date && x.heure && x.statut!=='annulee' && x.statut!=='terminee' &&
    Math.max(s1,toMin(x.heure)) < Math.min(e1,toMin(x.heure)+(parseInt(x.duree)||60)))||null; }

  if(!data.date){ data.statut='aplanifier'; }
  else if(data.statut==='aplanifier'){ data.statut='planifiee'; }

  data.nuisibles=[...intNuis]; data.nuisible=data.nuisibles[0]||'—'; data.methodes=[...intMeth];
  data.traitementNuis=JSON.parse(JSON.stringify(intTrait));

  if(!data.clientId){ const n=((document.getElementById('cli-search')||{}).value||'').trim();

  if(!data.clientId){ toast('Indique un client'); return; }

  if(data.clientId){ const cli=db.clients.find(x=>x.id===data.clientId); if(cli){
    if(_cliTel!==undefined&&_cliTel!=='') cli.tel=_cliTel; if(_cliEmail!==undefined&&_cliEmail!=='') cli.email=_cliEmail;
    // Adresse choisie dans la recherche → complète la fiche client (code postal/ville/GPS) si vide
    const gv=idd=>{const el=document.getElementById(idd);return el?el.value:'';};
    const cp=gv('adr-cp'),ville=gv('adr-ville'),lat=gv('adr-lat'),lng=gv('adr-lng');
    if(cp){ if(!cli.codePostal)cli.codePostal=cp; if(ville&&!cli.ville)cli.ville=ville; if(data.adresse&&!cli.adresse)cli.adresse=data.adresse; if(lat&&lng){cli.lat=+lat;cli.lng=+lng;} }
  } }

  else{ const obj={id:uid(),num:intNum(),compteRendu:'',...data}; intHisto(obj,'Intervention créée'); db.interventions.push(obj); syncFactureFromIntervention(obj); logEvent('Nouvelle intervention',data.titre,'crud'); notifyTechNewInt(obj); }

  const key=keyForClient(data.clientId);
  if(data.clientId && key && !techForKey(key)) autoMsg='Département '+keyLabel(key)+' non couvert par un technicien';

function fallbackCopy(text,done){ try{ const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done&&done(); }catch(e){ prompt('Copie cette adresse :',text); } }
function copierAdresse(id){ const i=db.interventions.find(x=>x.id===id); if(!i)return; const c=db.clients.find(x=>x.id===i.clientId)||{};
  const adr=[i.adresse||c.adresse||c.adresseComplete||'', ((c.codePostal||'')+' '+(c.ville||'')).trim()].filter(Boolean).join(', ');
  if(!adr){ toast('Aucune adresse à copier'); return; }
  const done=()=>toast('Adresse copiée — colle-la dans ton GPS');
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(adr).then(done).catch(()=>fallbackCopy(adr,done)); }
  else fallbackCopy(adr,done); }
/* SMS « le technicien arrive dans X » — calcule le trajet depuis la position du téléphone */
async function smsArrivee(id){ const i=db.interventions.find(x=>x.id===id); if(!i)return; const c=db.clients.find(x=>x.id===i.clientId)||{};
  const tel=(c.tel||'').replace(/\s/g,''); if(!tel){ toast('Pas de numéro pour ce client'); return; }
  const soc=rapportSociete(i.rapportModele);
  toast('Calcul du trajet…');
  let dest=(c.lat!=null)?{lat:c.lat,lng:c.lng}:null;
  try{ if(!dest && (c.adresse||i.adresse)) dest=await geocode(c.adresse||i.adresse); }catch(e){}
  let eta='';
  try{
    if(dest && navigator.geolocation){
      const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:9000,enableHighAccuracy:true}));
      const leg=await travelLeg({lat:pos.coords.latitude,lng:pos.coords.longitude},dest);
      if(leg&&leg.min) eta=dureeTrajet(leg.min);
    }
  }catch(e){}
  const msg = eta
    ? ('Bonjour, votre technicien '+soc+' arrive dans environ '+eta+' pour votre intervention. À tout de suite.')
    : ('Bonjour, votre technicien '+soc+' est en route pour votre intervention.');
  location.href='sms:'+tel+'?&body='+encodeURIComponent(msg);
}

function traitementFor(cat){ return TRAITEMENT[cat]||null; }
function renderRapTraitement(){ const el=$('rap-traitement'); const wrap=$('rap-presta-wrap'); if(!el)return;
  const cfg=traitementFor(rapTraitCat);
  if(!cfg){ el.innerHTML=''; if(wrap)wrap.style.display=''; return; }
  if(wrap)wrap.style.display='none';
  let h='<div class="form-sec">Traitement \u2014 '+esc(rapTraitCat)+'</div><div class="fgroup">';
  cfg.forEach(f=>{ const v=rapTraitement[f.key];
    if(f.type==='header'){ h+='<div class="frow" style="background:color-mix(in srgb,var(--acc) 8%,transparent)"><span class="frow-lbl" style="font-weight:700">'+esc(f.label)+'</span></div>'; return; }
    if(f.type==='number'){ h+='<div class="frow"><span class="frow-lbl">'+esc(f.label)+'</span><div class="frow-val"><button type="button" class="btn ghost sm" onclick="traitNum(\''+f.key+'\',-1)">\u2212</button><input id="tr-'+f.key+'" type="number" min="0" value="'+(v||0)+'" style="width:52px;text-align:center" oninput="rapTraitement[\''+f.key+'\']=parseInt(this.value)||0"><button type="button" class="btn ghost sm" onclick="traitNum(\''+f.key+'\',1)">\uFF0B</button></div></div>'; return; }
    if(f.type==='ouinon'){ const yes=v==='Oui',no=v==='Non'; h+='<div class="frow"><span class="frow-lbl">'+esc(f.label)+'</span><div class="frow-val"><button type="button" onclick="rapTraitement[\''+f.key+'\']=\'Oui\';renderRapTraitement()" style="cursor:pointer;padding:6px 14px;border-radius:14px 0 0 14px;border:1px solid var(--brd);font-weight:600;background:'+(yes?'var(--acc)':'var(--bg2)')+';color:'+(yes?'#fff':'var(--t2)')+'">Oui</button><button type="button" onclick="rapTraitement[\''+f.key+'\']=\'Non\';renderRapTraitement()" style="cursor:pointer;padding:6px 14px;border-radius:0 14px 14px 0;border:1px solid var(--brd);border-left:none;font-weight:600;background:'+(no?'var(--red)':'var(--bg2)')+';color:'+(no?'#fff':'var(--t2)')+'">Non</button></div></div>'; return; }
    if(f.type==='select'){ h+='<div class="frow"><span class="frow-lbl">'+esc(f.label)+'</span><div class="frow-val"><select onchange="rapTraitement[\''+f.key+'\']=this.value;"><option value="">Choix</option>'+f.options.map(o=>'<option '+(v===o?'selected':'')+'>'+esc(o)+'</option>').join('')+'</select></div></div>'; return; }
    h+='<div class="frow" style="display:block"><div class="frow-lbl" style="margin-bottom:6px">'+esc(f.label)+'</div><div style="display:flex;flex-wrap:wrap;gap:6px">'+f.options.map(o=>{ const on=Array.isArray(v)&&v.includes(o); return '<button type="button" data-o="'+esc(o)+'" onclick="traitToggle(\''+f.key+'\',this.dataset.o)" style="cursor:pointer;font-size:12px;font-weight:600;padding:6px 11px;border-radius:14px;border:1px solid '+(on?'var(--acc)':'var(--brd)')+';background:'+(on?'var(--acc)':'var(--bg2)')+';color:'+(on?'#fff':'var(--t2)')+'">'+(on?'\u2713 ':'')+esc(o)+'</button>'; }).join('')+'</div></div>';
  });
  h+='</div>'; el.innerHTML=h;
}
function traitToggle(key,opt){ if(!Array.isArray(rapTraitement[key]))rapTraitement[key]=[]; const a=rapTraitement[key],k=a.indexOf(opt); if(k>=0)a.splice(k,1); else a.push(opt); renderRapTraitement(); }
function traitNum(key,d){ rapTraitement[key]=Math.max(0,(parseInt(rapTraitement[key])||0)+d); renderRapTraitement(); }
function traitementSummary(it){ const cfg=traitementFor(it.type); const t=it.traitement||{}; if(!cfg)return []; const out=[]; cfg.forEach(f=>{ if(f.type==="header")return; const v=t[f.key]; if(f.type==="check"){ if(Array.isArray(v)&&v.length)out.push([f.label,v.join(", ")]); } else if(f.type==="number"){ if(v)out.push([f.label,String(v)]); } else if(f.type==="ouinon"||f.type==="select"){ if(v)out.push([f.label,v]); } }); return out; }
/* Résumé d'une fiche de traitement par nuisible (clé TRAITEMENT, données stockées) */
function ficheSummary(catKey,data){ const cfg=TRAITEMENT[catKey]; const t=data||{}; if(!cfg)return []; const out=[]; cfg.forEach(f=>{ if(f.type==="header")return; const v=t[f.key]; if(f.type==="check"){ if(Array.isArray(v)&&v.length)out.push([f.label,v.join(", ")]); } else if(f.type==="number"){ if(v)out.push([f.label,String(v)]); } else if(f.type==="ouinon"||f.type==="select"){ if(v)out.push([f.label,v]); } }); return out; }
async function aiGenRapport(id){ const i=db.interventions.find(x=>x.id===id); if(!i)return;
  if(!aiHasKey()){ toast('Ajoute ta clé IA dans Paramètres'); go('parametres'); return; }
  const ta=document.getElementById('rap-cr'); const notes=ta?ta.value.trim():'';
  const soc=rapportSociete(i.rapportModele);
  const ctx=[
    'Société : '+soc,
    'Catégorie : '+(i.type||'—'),
    'Client : '+(clientName(i.clientId)||'—'),
    'Adresse : '+(i.adresse||'—'),
    'Nuisibles : '+((i.nuisibles||[]).join(', ')||'—'),
    'Méthodes : '+((i.methodes||[]).join(', ')||'—'),
    'Niveau d\'infestation : '+(rapConstat.infestation||'—'),
    'Notes du technicien : '+(notes||'(aucune)')
  ].join('\n');
  const sys="Tu es un technicien expert en lutte anti-nuisibles en France. À partir des informations d'une intervention, rédige un COMPTE-RENDU d'intervention professionnel, clair et concis (4 à 8 phrases), à la première personne du pluriel (« nous avons »). Décris le constat, les actions réalisées et le traitement. Reste factuel, en français, sans inventer de produits ou de chiffres non fournis. Ne mets pas de titre, juste le paragraphe.";
  if(ta){ ta.value='Rédaction en cours…'; ta.disabled=true; }
  try{
    const out=await callClaude(sys, ctx, 1200);
    if(ta){ ta.value=out; ta.disabled=false; }
    toast('Rapport généré — relis et ajuste si besoin');
  }catch(e){
    if(ta){ ta.value=notes; ta.disabled=false; }
    if(String(e.message).includes('NO_KEY')) { toast('Clé IA manquante'); go('parametres'); }
    else if(String(e.message).includes('REFUS')) toast('L\'IA a refusé cette demande');
    else toast('Erreur IA : '+e.message);
  }
}

/* Compresse/redimensionne une image avant stockage (évite de saturer le stockage local) */
function compressImage(file, maxDim, quality){ maxDim=maxDim||1200; quality=quality||0.72;
  return new Promise(resolve=>{ const r=new FileReader();
    r.onload=()=>{ const img=new Image();
      img.onload=()=>{ let w=img.width, h=img.height;
        if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; } else if(h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
        try{ const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h); resolve(c.toDataURL('image/jpeg',quality)); }
        catch(e){ resolve(r.result); } };
      img.onerror=()=>resolve(r.result); img.src=r.result; };
    r.onerror=()=>resolve(''); r.readAsDataURL(file); });
}

function initSigPad(existing,cvId){ const cv=$(cvId||'sig-pad'); if(!cv) return; const ctx=cv.getContext('2d'); cv._ctx=ctx; let drawing=false;
  ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--acc')||'#4ADE80'; ctx.lineWidth=2.4; ctx.lineCap='round';
  if(existing){ const img=new Image(); img.onload=()=>ctx.drawImage(img,0,0,cv.width,cv.height); img.src=existing; cv.dataset.has='1'; }
  const pos=e=>{ const r=cv.getBoundingClientRect(); const t=e.touches?e.touches[0]:e; return {x:(t.clientX-r.left)*(cv.width/r.width), y:(t.clientY-r.top)*(cv.height/r.height)}; };
  const down=e=>{ drawing=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); };
  const move=e=>{ if(!drawing)return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); cv.dataset.has='1'; e.preventDefault(); };
  const up=()=>{ drawing=false; };
  cv.onmousedown=down; cv.onmousemove=move; window.addEventListener('mouseup',up);
  cv.ontouchstart=down; cv.ontouchmove=move; cv.ontouchend=up;
}

  traitementSummary(i).forEach(r=>L.push(r[0]+' : '+r[1]));
  { const tn=i.traitementNuis||{}; Object.keys(tn).forEach(n=>{ if(!NUIS_TRAIT[n])return; ficheSummary(NUIS_TRAIT[n],tn[n]).forEach(r=>L.push(n+' — '+r[0]+' : '+r[1])); }); }
  if(prod){ L.push(''); L.push('Produits utilisés :'); L.push(prod); }
  if(i.compteRendu){ L.push(''); L.push('Compte-rendu :'); L.push(i.compteRendu); }
  if(co.conformite) L.push('\nConformité : '+co.conformite);
  if(co.recommandations){ L.push(''); L.push('Recommandations :'); L.push(co.recommandations); }
  L.push(''); L.push('— '+rapportSociete(i.rapportModele));
  return L.join('\n');
}

  openModal(`<div class="modal-head sheet-head"><button type="button" class="btn ghost sm" onclick="closeModal()">Annuler</button><h3>Ajouter un produit aux boxes</h3><button type="button" class="btn sm" onclick="applyAjoutProduitBoxes()">Ajouter</button></div>

function renderApbList(){ const el=$('apb-list'); if(!el) return; el.innerHTML=visibleBoxes(db.boxes).map(b=>`<label class="pl-row" style="cursor:pointer"><input type="checkbox" ${bulkBoxes.has(b.id)?'checked':''} onchange="apbToggle('${b.id}',this.checked)" style="width:18px;height:18px;accent-color:var(--acc);flex-shrink:0"><div class="pl-info"><div class="pl-title">${esc(b.numero||'')} ${esc(b.nom)}</div><div class="pl-meta">${esc(b.ville||'')}</div></div></label>`).join(''); const c=$('apb-count'); if(c)c.textContent=bulkBoxes.size; }
function apbToggle(id,on){ if(on)bulkBoxes.add(id); else bulkBoxes.delete(id); const c=$('apb-count'); if(c)c.textContent=bulkBoxes.size; }
function apbAll(on){ bulkBoxes=new Set(on?visibleBoxes(db.boxes).map(b=>b.id):[]); renderApbList(); }
function applyAjoutProduitBoxes(){ const pid=$('apb-prod').value; if(!pid){toast('Choisis un produit');return;} if(!bulkBoxes.size){toast('Choisis au moins une box');return;}
  const ctn=parseInt($('apb-ctn').value)||0, u=parseInt($('apb-u').value)||0; const p=produit(pid);
  bulkBoxes.forEach(id=>{ const b=db.boxes.find(x=>x.id===id); if(!b)return; b.stock=b.stock||{}; const cur=b.stock[pid]||{ctn:0,u:0}; b.stock[pid]={ctn:cur.ctn+ctn,u:cur.u+u}; });
  logEvent('Produit ajouté aux boxes',`${p.nom} → ${bulkBoxes.size} box`,'stock'); save(); closeModal(); toast(p.nom+' ajouté à '+bulkBoxes.size+' box'); views.boxes(); }

function loadJsPDF(){ return new Promise((res,rej)=>{ if(window.jspdf&&window.jspdf.jsPDF) return res(); const s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js'; s.onload=()=>res(); s.onerror=()=>rej(new Error('jspdf')); document.head.appendChild(s); }); }
/* Partager le stock d'une box EN PDF (partage de fichier natif, sinon téléchargement, sinon impression) */
async function shareBoxStock(id){ const b=db.boxes.find(x=>x.id===id); if(!b)return; b.stock=b.stock||{};
  const prods=Object.keys(b.stock).map(pid=>({p:produit(pid),s:b.stock[pid]})).filter(x=>x.p&&x.p.id).sort((a,b2)=>(a.p.nom||'').localeCompare(b2.p.nom||''));
  toast('Génération du PDF…');
  try{
    await loadJsPDF(); const { jsPDF }=window.jspdf; const doc=new jsPDF({unit:'pt',format:'a4'}); let y=50;
    doc.setFont('helvetica','bold'); doc.setFontSize(18); doc.setTextColor(22,128,60); doc.text('STOCK DE LA BOX',40,y); y+=24;
    doc.setFontSize(13); doc.setTextColor(30,31,40); doc.text(String(b.nom||b.numero||'Box'),40,y); y+=17;
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(110);
    if(b.numero){ doc.text('N° '+b.numero,40,y); y+=13; }
    const lieu=[b.adresse,((b.codePostal||'')+' '+(b.ville||'')).trim()].filter(Boolean).join(' - '); if(lieu){ doc.text(lieu,40,y); y+=13; }
    if(b.categorie){ doc.text('Categorie : '+b.categorie,40,y); y+=13; }
    y+=8; doc.setDrawColor(22,128,60); doc.setLineWidth(1.2); doc.line(40,y,555,y); y+=20;
    doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(30,31,40); doc.text('Produit',40,y); doc.text('Cartons',400,y); doc.text('Unites',480,y); y+=8;
    doc.setDrawColor(220); doc.setLineWidth(.5); doc.line(40,y,555,y); y+=16; doc.setFont('helvetica','normal'); doc.setFontSize(10);
    if(prods.length){ prods.forEach(x=>{ if(y>800){ doc.addPage(); y=50; } doc.setTextColor(30,31,40); doc.text(String(x.p.nom||'').slice(0,58),40,y); doc.text(String(x.s.ctn||0),415,y); doc.text(String(x.s.u||0),492,y); y+=16; }); }
    else { doc.setTextColor(130); doc.text('Aucun produit dans cette box.',40,y); y+=16; }
    doc.setFontSize(9); doc.setTextColor(150); doc.text('ELAN GESTION - '+new Date().toLocaleDateString('fr-FR'),40,820);
    const fname='stock_'+String(b.numero||b.nom||'box').replace(/[^a-z0-9]/gi,'_')+'.pdf';
    const blob=doc.output('blob'); const file=new File([blob],fname,{type:'application/pdf'});
    if(navigator.canShare && navigator.canShare({files:[file]})){ try{ await navigator.share({files:[file],title:'Stock '+(b.nom||b.numero||'Box')}); return; }catch(e){ if(e&&e.name==='AbortError') return; } }
    doc.save(fname); toast('PDF téléchargé');
  }catch(e){ toast('Hors-ligne : j\'ouvre la fiche imprimable (Enregistrer en PDF)'); printBox(id); }
}
/* Fiche PDF d'un poste (box) : infos + historique des passages */
function printBox(id){ const b=db.boxes.find(x=>x.id===id); if(!b)return; const cli=b.clientId?(db.clients.find(x=>x.id===b.clientId)||{}):null;
  const w=window.open('','_blank'); if(!w){ toast('Autorisez les pop-ups'); return; }
  const ps=(b.passages||[]).slice().sort((a,b2)=>(b2.date||'').localeCompare(a.date||''));
  const prods=Object.keys(b.stock||{}).map(pid=>({p:produit(pid),s:b.stock[pid]})).filter(x=>x.p&&x.p.id);
  w.document.write(`<!doctype html><html lang="fr"><head><meta charset="utf-8"><title>Fiche poste ${esc(b.numero||'')}</title>
    <style>*{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}body{margin:0;padding:36px;color:#1A1F28}
    .noprint{position:fixed;top:0;left:0;right:0;background:#16803C;display:flex;gap:10px;justify-content:center;padding:10px}.noprint button{background:#fff;color:#16803C;border:none;border-radius:8px;padding:9px 18px;font-weight:700;cursor:pointer}
    h1{font-size:20px;color:#16803C;margin:0}.muted{color:#666;font-size:13px}.box{background:#F7F9FC;border:1px solid #E3E8F0;border-radius:8px;padding:12px;margin:10px 0;font-size:13px}
    table{width:100%;border-collapse:collapse;margin-top:8px}th{background:#16803C;color:#fff;padding:7px;text-align:left;font-size:12px}td{padding:7px;border-bottom:1px solid #E3E8F0;font-size:12px}
    @media print{body{padding:18px}.noprint{display:none!important}}</style></head>
    <body><div class="noprint"><button onclick="window.print()">Imprimer</button><button onclick="window.close()">Fermer</button></div><div style="height:50px"></div>
    <h1>FICHE POSTE — ${esc(b.numero||'')}</h1><div class="muted">${esc(b.nom||'')}${b.categorie?' · '+esc(b.categorie):''}</div>
    <div class="box"><b>Emplacement :</b> ${esc([b.adresse,((b.codePostal||'')+' '+(b.ville||'')).trim(),b.etage].filter(Boolean).join(' · '))||'—'}${cli?`<br><b>Client :</b> ${esc(cli.nom||'')}`:''}
      ${(b.codesAcces||[]).length?'<br><b>Accès :</b> '+b.codesAcces.map(c=>esc(c.type)+' '+esc(c.valeur)).join(' · '):''}
      ${b.frequence&&b.frequence!=='Aucune'?'<br><b>Fréquence :</b> '+esc(b.frequence):''}${b.prochaineVisite?' · <b>Prochaine visite :</b> '+new Date(b.prochaineVisite+'T00:00:00').toLocaleDateString('fr-FR'):''}
      ${b.notes?'<br><b>Notes :</b> '+esc(b.notes):''}</div>
    ${b.photo?`<img src="${b.photo}" style="max-width:280px;border-radius:8px;border:1px solid #E3E8F0;margin:6px 0">`:''}
    <h3 style="color:#16803C;font-size:14px">Produits (${prods.length})</h3>
    <table><thead><tr><th>Produit</th><th>Cartons</th><th>Unités</th></tr></thead><tbody>${prods.map(x=>`<tr><td>${esc(x.p.nom)}</td><td>${x.s.ctn||0}</td><td>${x.s.u||0}</td></tr>`).join('')||'<tr><td colspan="3">—</td></tr>'}</tbody></table>
    <h3 style="color:#16803C;font-size:14px;margin-top:18px">Passages & relevés (${ps.length})</h3>
    <table><thead><tr><th>Date</th><th>Technicien</th><th>État</th><th>Observations</th></tr></thead><tbody>${ps.map(p=>`<tr><td>${new Date((p.date||todayISO())+'T00:00:00').toLocaleDateString('fr-FR')}</td><td>${esc(p.technicienNom||'')}</td><td>${esc((APPAT_ETATS[p.etat]||{}).l||'')}</td><td>${esc(p.note||'')}</td></tr>`).join('')||'<tr><td colspan="4">Aucun passage</td></tr>'}</tbody></table>
    <div style="margin-top:24px;font-size:11px;color:#999;text-align:center">Document généré par ELAN GESTION — ${new Date().toLocaleDateString('fr-FR')}</div>
    </body></html>`); w.document.close();
}

  openModal(`<div class="modal-head sheet-head"><button type="button" class="btn ghost sm" onclick="renderBoxDetail()">Annuler</button><h3>Relevé de passage</h3><button type="submit" form="passform" class="btn sm">Enregistrer</button></div>

      <input type="number" min="0" value="${s.u||0}" title="unités" style="width:42px;text-align:center" oninput="boxFormStock['${pid}'].u=parseInt(this.value)||0"><span style="font-size:11px;color:var(--t3)">u</span>
      <button type="button" class="btn danger sm" onclick="delete boxFormStock['${pid}'];renderBoxFormProds()">✕</button></div></div>`;}).join('');
