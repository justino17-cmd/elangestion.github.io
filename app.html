<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELAN GESTION — Interventions</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:    #050f08;
    --bg1:   #091c10;
    --bg2:   #0e2515;
    --bg3:   #123019;
    --acc:   #22b14c;
    --acc2:  #1a8a3a;
    --org:   #f59e0b;
    --red:   #ef4444;
    --blue:  #3b82f6;
    --t1:    #ffffff;
    --t2:    rgba(255,255,255,0.72);
    --t3:    rgba(255,255,255,0.40);
    --brd:   rgba(255,255,255,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }
  body {
    background: var(--bg);
    color: var(--t1);
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 10%, rgba(34,177,76,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 95% 90%, rgba(34,177,76,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  /* ── LAYOUT ── */
  .app { display: flex; min-height: 100vh; position: relative; z-index: 1; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 252px; flex-shrink: 0;
    background: var(--bg1);
    border-right: 1px solid var(--brd);
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh;
  }
  .brand {
    display: flex; align-items: center; gap: 12px;
    padding: 24px 22px 22px;
    border-bottom: 1px solid var(--brd);
  }
  .brand-icon {
    width: 42px; height: 42px;
    background: rgba(34,177,76,0.15);
    border: 1px solid rgba(34,177,76,0.3);
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .brand-text { font-family:'Space Mono',monospace; font-size:14px; font-weight:700; letter-spacing:1.5px; }
  .brand-sub { font-size:10px; color:var(--t3); margin-top:1px; letter-spacing:.5px; }

  .nav { padding: 16px 12px; flex: 1; overflow-y: auto; }
  .nav-label { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--t3); text-transform:uppercase; padding:12px 12px 8px; }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px; border-radius: 10px;
    color: var(--t2); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: background .15s, color .15s;
    margin-bottom: 2px; user-select: none;
  }
  .nav-item:hover { background: var(--bg2); color: var(--t1); }
  .nav-item.active { background: rgba(34,177,76,0.14); color: var(--acc); }
  .nav-item .ico { font-size: 17px; width: 20px; text-align: center; }
  .nav-item .badge { margin-left:auto; background:rgba(34,177,76,0.18); color:var(--acc); font-size:11px; font-weight:600; padding:1px 8px; border-radius:100px; }

  .sidebar-foot { padding: 16px 22px; border-top: 1px solid var(--brd); font-size: 12px; color: var(--t3); }

  /* ── MAIN ── */
  .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .topbar {
    display: flex; align-items: center; gap: 16px;
    padding: 20px 32px;
    border-bottom: 1px solid var(--brd);
    background: rgba(5,15,8,0.7); backdrop-filter: blur(8px);
    position: sticky; top: 0; z-index: 5;
  }
  .topbar h1 { font-family:'Space Mono',monospace; font-size:20px; font-weight:700; letter-spacing:-.5px; }
  .topbar .sub { font-size:13px; color:var(--t3); margin-top:2px; }
  .topbar-actions { margin-left:auto; display:flex; gap:10px; align-items:center; }

  .content { padding: 28px 32px 48px; flex: 1; }

  /* ── MOBILE TOGGLE ── */
  .menu-btn { display:none; background:var(--bg2); border:1px solid var(--brd); color:var(--t1); width:40px;height:40px;border-radius:10px;font-size:18px;cursor:pointer; }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--acc); color: #fff;
    font-family:'DM Sans',sans-serif; font-weight: 600; font-size: 14px;
    padding: 11px 18px; border-radius: 10px; border: none;
    cursor: pointer; transition: background .2s, transform .1s;
  }
  .btn:hover { background: var(--acc2); transform: translateY(-1px); }
  .btn.ghost { background: var(--bg2); border:1px solid var(--brd); color:var(--t2); }
  .btn.ghost:hover { background: var(--bg3); color:var(--t1); }
  .btn.sm { padding:7px 12px; font-size:13px; }
  .btn.danger { background: rgba(239,68,68,0.15); color:var(--red); border:1px solid rgba(239,68,68,0.3); }
  .btn.danger:hover { background: rgba(239,68,68,0.25); }

  /* ── KPI CARDS ── */
  .kpis { display:grid; grid-template-columns: repeat(4,1fr); gap:16px; margin-bottom:28px; }
  @media (max-width:900px){ .kpis{ grid-template-columns:1fr 1fr; } }
  .kpi { background:var(--bg1); border:1px solid var(--brd); border-radius:16px; padding:20px; }
  .kpi-ico { width:40px;height:40px;border-radius:11px; display:flex;align-items:center;justify-content:center;font-size:19px; margin-bottom:14px; }
  .kpi-val { font-family:'Space Mono',monospace; font-size:30px; font-weight:700; line-height:1; }
  .kpi-lbl { font-size:13px; color:var(--t3); margin-top:6px; }

  /* ── CARD ── */
  .card { background:var(--bg1); border:1px solid var(--brd); border-radius:16px; padding:22px; margin-bottom:20px; }
  .card-head { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
  .card-head h3 { font-size:16px; font-weight:600; }
  .card-head .btn { margin-left:auto; }

  /* ── TABLE ── */
  .tbl { width:100%; border-collapse:collapse; }
  .tbl th { text-align:left; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--t3); font-weight:600; padding:0 14px 12px; }
  .tbl td { padding:14px; border-top:1px solid var(--brd); font-size:14px; color:var(--t2); vertical-align:middle; }
  .tbl tr:hover td { background:rgba(255,255,255,0.015); }
  .tbl .row-clk { cursor:pointer; }
  .tbl .strong { color:var(--t1); font-weight:600; }

  /* ── STATUS BADGES ── */
  .st { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; padding:4px 11px; border-radius:100px; white-space:nowrap; }
  .st::before { content:''; width:7px;height:7px;border-radius:50%; background:currentColor; }
  .st-planifiee { background:rgba(59,130,246,0.14); color:#60a5fa; }
  .st-encours   { background:rgba(245,158,11,0.14); color:#fbbf24; }
  .st-terminee  { background:rgba(34,177,76,0.16); color:#34d36b; }
  .st-annulee   { background:rgba(239,68,68,0.14); color:#f87171; }

  .prio { font-size:12px; font-weight:600; padding:3px 9px; border-radius:7px; }
  .prio-haute { background:rgba(239,68,68,0.14); color:#f87171; }
  .prio-normale { background:rgba(255,255,255,0.07); color:var(--t2); }
  .prio-basse { background:rgba(255,255,255,0.05); color:var(--t3); }

  /* ── FILTERS ── */
  .filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
  .chip { background:var(--bg1); border:1px solid var(--brd); color:var(--t2); font-size:13px; font-weight:500; padding:8px 16px; border-radius:100px; cursor:pointer; transition:.15s; }
  .chip:hover { border-color:rgba(34,177,76,0.3); }
  .chip.active { background:rgba(34,177,76,0.14); border-color:rgba(34,177,76,0.4); color:var(--acc); }

  /* ── EMPTY ── */
  .empty { text-align:center; padding:60px 20px; color:var(--t3); }
  .empty .e-ico { font-size:44px; margin-bottom:14px; opacity:.6; }
  .empty p { font-size:14px; margin-bottom:18px; }

  /* ── MODAL ── */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); z-index:50; display:none; align-items:flex-start; justify-content:center; padding:40px 16px; overflow-y:auto; }
  .overlay.open { display:flex; }
  .modal { background:var(--bg1); border:1px solid var(--brd); border-radius:20px; width:100%; max-width:560px; padding:28px; animation:pop .2s ease; }
  @keyframes pop { from{ opacity:0; transform:translateY(14px);} to{opacity:1;transform:none;} }
  .modal-head { display:flex; align-items:center; margin-bottom:22px; }
  .modal-head h3 { font-family:'Space Mono',monospace; font-size:18px; font-weight:700; }
  .modal-close { margin-left:auto; background:var(--bg2); border:1px solid var(--brd); color:var(--t2); width:34px;height:34px;border-radius:9px; cursor:pointer; font-size:16px; }
  .modal-close:hover { color:var(--t1); }

  .field { margin-bottom:16px; }
  .field label { display:block; font-size:13px; font-weight:500; color:var(--t2); margin-bottom:7px; }
  .field input, .field select, .field textarea {
    width:100%; background:var(--bg); border:1px solid var(--brd); border-radius:10px;
    padding:12px 14px; color:var(--t1); font-family:'DM Sans',sans-serif; font-size:14px;
    transition:border-color .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { outline:none; border-color:rgba(34,177,76,0.5); }
  .field textarea { resize:vertical; min-height:80px; }
  .field-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media (max-width:520px){ .field-row{ grid-template-columns:1fr; } }
  .modal-foot { display:flex; gap:10px; margin-top:24px; }
  .modal-foot .btn { flex:1; justify-content:center; }

  /* ── DETAIL ── */
  .detail-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:18px; margin-bottom:6px; }
  @media (max-width:520px){ .detail-grid{ grid-template-columns:1fr; } }
  .dt-item .dt-lbl { font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--t3); margin-bottom:5px; }
  .dt-item .dt-val { font-size:15px; color:var(--t1); }
  .detail-desc { background:var(--bg); border:1px solid var(--brd); border-radius:12px; padding:16px; margin-top:18px; font-size:14px; color:var(--t2); line-height:1.6; }

  /* ── PLANNING ── */
  .planning-day { margin-bottom:24px; }
  .planning-date { font-family:'Space Mono',monospace; font-size:13px; letter-spacing:1px; color:var(--acc); text-transform:uppercase; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--brd); }
  .pl-row { display:flex; align-items:center; gap:16px; background:var(--bg1); border:1px solid var(--brd); border-radius:12px; padding:14px 18px; margin-bottom:10px; cursor:pointer; transition:.15s; }
  .pl-row:hover { border-color:rgba(34,177,76,0.3); transform:translateX(2px); }
  .pl-time { font-family:'Space Mono',monospace; font-size:15px; font-weight:700; color:var(--t1); min-width:54px; }
  .pl-info { flex:1; min-width:0; }
  .pl-title { font-size:15px; font-weight:600; margin-bottom:3px; }
  .pl-meta { font-size:13px; color:var(--t3); }

  .avatar { width:30px;height:30px;border-radius:50%; background:rgba(34,177,76,0.2); border:1px solid rgba(34,177,76,0.3); display:inline-flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--acc); }
  .ppl { display:flex; align-items:center; gap:9px; }

  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(120px); background:var(--acc); color:#fff; font-weight:600; font-size:14px; padding:13px 22px; border-radius:12px; z-index:100; transition:transform .3s; box-shadow:0 10px 30px rgba(0,0,0,0.4); }
  .toast.show { transform:translateX(-50%) translateY(0); }

  @media (max-width:780px){
    .sidebar { position:fixed; left:0; top:0; z-index:40; transform:translateX(-100%); transition:transform .25s; }
    .sidebar.open { transform:none; }
    .menu-btn { display:flex; align-items:center; justify-content:center; }
    .content, .topbar { padding-left:18px; padding-right:18px; }
    .kpis { grid-template-columns:1fr 1fr; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-icon">🛠️</div>
      <div>
        <div class="brand-text">ELAN GESTION</div>
        <div class="brand-sub">Gestion d'interventions</div>
      </div>
    </div>
    <nav class="nav">
      <div class="nav-label">Pilotage</div>
      <div class="nav-item active" data-view="dashboard"><span class="ico">📊</span> Tableau de bord</div>
      <div class="nav-item" data-view="planning"><span class="ico">🗓️</span> Planning</div>
      <div class="nav-label">Gestion</div>
      <div class="nav-item" data-view="interventions"><span class="ico">🧰</span> Interventions <span class="badge" id="nav-int">0</span></div>
      <div class="nav-item" data-view="clients"><span class="ico">🏢</span> Clients <span class="badge" id="nav-cli">0</span></div>
      <div class="nav-item" data-view="techniciens"><span class="ico">👷</span> Techniciens <span class="badge" id="nav-tec">0</span></div>
      <div class="nav-label">ELAN GESTION</div>
      <div class="nav-item" data-view="boxes"><span class="ico">📦</span> Boxes / Stocks <span class="badge" id="nav-box">0</span></div>
      <div class="nav-item" data-view="enveloppes"><span class="ico">📮</span> Enveloppes <span class="badge" id="nav-env">0</span></div>
      <div class="nav-label">Outils</div>
      <div class="nav-item" data-view="rapports"><span class="ico">📄</span> Rapports</div>
    </nav>
    <div class="sidebar-foot">v1.0 — Données locales</div>
  </aside>

  <!-- ── MAIN ── -->
  <div class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
      <div>
        <h1 id="page-title">Tableau de bord</h1>
        <div class="sub" id="page-sub">Vue d'ensemble de votre activité</div>
      </div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- ── MODAL ── -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════
   ELAN GESTION — App de gestion d'interventions
   Données persistées dans le navigateur (localStorage)
   ═══════════════════════════════════════════════ */

const STORE_KEY = 'elan_gestion_v1';

const STATUS = {
  planifiee: { label: 'Planifiée', cls: 'st-planifiee' },
  encours:   { label: 'En cours',  cls: 'st-encours' },
  terminee:  { label: 'Terminée',  cls: 'st-terminee' },
  annulee:   { label: 'Annulée',   cls: 'st-annulee' },
};
const PRIO = {
  basse:   { label: 'Basse',   cls: 'prio-basse' },
  normale: { label: 'Normale', cls: 'prio-normale' },
  haute:   { label: 'Haute',   cls: 'prio-haute' },
};
const ENV_STATUS = {
  attente:  { label: 'En attente', cls: 'st-encours' },
  encaisse: { label: 'Encaissé',   cls: 'st-terminee' },
};

/* ── État ── */
let db = load();

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      // Migration : garantir la présence des nouveaux modules ELAN GESTION
      d.boxes = d.boxes || [];
      d.enveloppes = d.enveloppes || [];
      return d;
    }
  } catch (e) {}
  return seed();
}
function save() { localStorage.setItem(STORE_KEY, JSON.stringify(db)); refreshBadges(); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

/* ── Données de démonstration ── */
function seed() {
  const t1 = uid(), t2 = uid(), t3 = uid();
  const c1 = uid(), c2 = uid(), c3 = uid();
  const today = new Date();
  const d = (offset) => { const x = new Date(today); x.setDate(x.getDate()+offset); return x.toISOString().slice(0,10); };
  return {
    techniciens: [
      { id: t1, nom: 'Marc Dubois', tel: '06 12 34 56 78', email: 'marc@elan.fr', metier: 'Plombier' },
      { id: t2, nom: 'Sophie Martin', tel: '06 98 76 54 32', email: 'sophie@elan.fr', metier: 'Électricienne' },
      { id: t3, nom: 'Karim Benali', tel: '06 11 22 33 44', email: 'karim@elan.fr', metier: 'Chauffagiste' },
    ],
    clients: [
      { id: c1, nom: 'Résidence Les Tilleuls', contact: 'M. Leroy', tel: '01 23 45 67 89', email: 'contact@tilleuls.fr', adresse: '12 rue des Fleurs, 75011 Paris' },
      { id: c2, nom: 'Boulangerie Au Bon Pain', contact: 'Mme Petit', tel: '01 98 76 54 32', email: 'aubonpain@mail.fr', adresse: '5 av. de la Gare, 92100 Boulogne' },
      { id: c3, nom: 'Cabinet Médical Saint-Roch', contact: 'Dr. Garnier', tel: '01 45 67 89 10', email: 'cabinet@stroch.fr', adresse: '28 bd Voltaire, 75011 Paris' },
    ],
    interventions: [
      { id: uid(), titre: 'Fuite chauffe-eau', clientId: c1, techId: t1, date: d(0), heure: '09:00', duree: 90, statut: 'encours', prio: 'haute', adresse: '12 rue des Fleurs, 75011 Paris', desc: 'Fuite détectée au niveau du chauffe-eau collectif, sous-sol bâtiment B.', compteRendu: '' },
      { id: uid(), titre: 'Remplacement tableau électrique', clientId: c2, techId: t2, date: d(0), heure: '14:00', duree: 180, statut: 'planifiee', prio: 'normale', adresse: '5 av. de la Gare, 92100 Boulogne', desc: 'Mise aux normes du tableau électrique de la boulangerie.', compteRendu: '' },
      { id: uid(), titre: 'Entretien chaudière annuel', clientId: c3, techId: t3, date: d(1), heure: '10:30', duree: 60, statut: 'planifiee', prio: 'basse', adresse: '28 bd Voltaire, 75011 Paris', desc: 'Entretien réglementaire annuel de la chaudière gaz.', compteRendu: '' },
      { id: uid(), titre: 'Dépannage prise électrique', clientId: c1, techId: t2, date: d(-1), heure: '11:00', duree: 45, statut: 'terminee', prio: 'normale', adresse: '12 rue des Fleurs, 75011 Paris', desc: 'Prise du hall d\'entrée ne fonctionne plus.', compteRendu: 'Disjoncteur remplacé, prise testée et fonctionnelle. Intervention de 40 min.' },
    ],
    boxes: [
      { id: uid(), ref: 'PLB-001', nom: 'Joints téflon', categorie: 'Plomberie', qte: 48, seuil: 20, emplacement: 'Atelier A · Étagère 2' },
      { id: uid(), ref: 'PLB-014', nom: 'Raccords cuivre 14mm', categorie: 'Plomberie', qte: 8, seuil: 15, emplacement: 'Atelier A · Étagère 3' },
      { id: uid(), ref: 'ELC-003', nom: 'Disjoncteurs 16A', categorie: 'Électricité', qte: 22, seuil: 10, emplacement: 'Atelier B · Bac 1' },
      { id: uid(), ref: 'ELC-009', nom: 'Câble 2.5mm² (rouleau)', categorie: 'Électricité', qte: 3, seuil: 5, emplacement: 'Atelier B · Bac 4' },
      { id: uid(), ref: 'CHF-002', nom: 'Vannes thermostatiques', categorie: 'Chauffage', qte: 15, seuil: 8, emplacement: 'Atelier C · Étagère 1' },
    ],
    enveloppes: [
      { id: uid(), num: 'ENV-2026-001', clientId: c1, montant: 320, mode: 'Chèque', date: d(-1), statut: 'encaisse', note: 'Dépannage prise électrique' },
      { id: uid(), num: 'ENV-2026-002', clientId: c2, montant: 850, mode: 'Virement', date: d(0), statut: 'attente', note: 'Acompte tableau électrique' },
      { id: uid(), num: 'ENV-2026-003', clientId: c3, montant: 120, mode: 'Espèces', date: d(0), statut: 'attente', note: 'Entretien chaudière' },
    ],
  };
}

/* ═══════ ROUTAGE ═══════ */
const views = {};
let current = 'dashboard';

document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => {
    document.getElementById('sidebar').classList.remove('open');
    go(el.dataset.view);
  });
});

function go(view) {
  current = view;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === view));
  views[view]();
}

function setHeader(title, sub, actionsHtml = '') {
  document.getElementById('page-title').textContent = title;
  document.getElementById('page-sub').textContent = sub;
  document.getElementById('topbar-actions').innerHTML = actionsHtml;
}

/* ═══════ HELPERS ═══════ */
const $ = id => document.getElementById(id);
const esc = s => (s ?? '').toString().replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const clientName = id => (db.clients.find(c => c.id === id) || {}).nom || '—';
const techName = id => (db.techniciens.find(t => t.id === id) || {}).nom || 'Non assigné';
const initials = name => (name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}
function fmtDateShort(iso) {
  if (!iso) return '—';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'short' });
}
function todayISO() { return new Date().toISOString().slice(0,10); }

function toast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2200);
}

views.planning = function () {

  const ints = [...db.interventions].sort((a,b)=> (a.date+a.heure).localeCompare(b.date+b.heure));

  e.preventDefault();
  const f = new FormData(e.target);

    const idx = db.interventions.findIndex(x => x.id === id);

    db.interventions.push({ id: uid(), compteRendu: '', ...data });
    toast('Intervention créée');

  save(); closeModal(); go(current);
}

      <div class="field"><label>Statut de l'intervention</label><select name="statut">${Object.entries(STATUS).map(([k,v])=>`<option value="${k}" ${i.statut===k?'selected':''}>${v.label}</option>`).join('')}</select></div>
      <div class="modal-foot">
        <button type="button" class="btn ghost" onclick="closeModal()">Fermer</button>
        <button type="submit" class="btn">💾 Enregistrer le rapport</button>
      </div>
    </form>`);
}
function saveRapport(e, id) {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target).entries());
  const idx = db.interventions.findIndex(x => x.id === id);
  db.interventions[idx] = { ...db.interventions[idx], ...data };
  save(); closeModal(); toast('Rapport enregistré'); go(current);
}

/* ═══════════════════════════════════════════════
   VUE : BOXES / STOCKS   (ELAN GESTION)
   ═══════════════════════════════════════════════ */
let boxCat = 'all';
views.boxes = function () {
  const boxes = db.boxes || [];
  const cats = ['all', ...new Set(boxes.map(b => b.categorie).filter(Boolean))];
  const lowStock = boxes.filter(b => b.qte <= b.seuil).length;
  setHeader('Boxes / Stocks', `${boxes.length} référence(s)${lowStock ? ` · ${lowStock} sous le seuil` : ''}`,
    `<button class="btn" onclick="formBox()">＋ Nouvelle box</button>`);

  let list = boxes;
  if (boxCat !== 'all') list = list.filter(b => b.categorie === boxCat);

  $('content').innerHTML = `
    ${lowStock ? `<div class="card" style="border-color:rgba(245,158,11,0.3);background:rgba(245,158,11,0.05)">
      <div style="display:flex;align-items:center;gap:10px;font-size:14px;color:#fbbf24;font-weight:600">⚠️ ${lowStock} référence(s) sous le seuil de réapprovisionnement</div>
    </div>` : ''}
    <div class="filters">
      ${cats.map(c => `<div class="chip ${boxCat===c?'active':''}" onclick="boxCat='${c}';views.boxes()">${c==='all'?'Toutes catégories':esc(c)}</div>`).join('')}
    </div>
    <div class="card">
      ${list.length ? `<table class="tbl">
        <thead><tr><th>Réf.</th><th>Article</th><th>Catégorie</th><th>Emplacement</th><th>Quantité</th><th style="text-align:right">Ajuster</th></tr></thead>
        <tbody>${list.map(b => {
          const low = b.qte <= b.seuil;
          return `<tr>
            <td class="strong" style="font-family:'Space Mono',monospace">${esc(b.ref)}</td>
            <td class="strong">${esc(b.nom)}</td>
            <td>${esc(b.categorie)||'—'}</td>
            <td>${esc(b.emplacement)||'—'}</td>
            <td><span style="font-family:'Space Mono',monospace;font-weight:700;font-size:16px;color:${low?'#fbbf24':'var(--t1)'}">${b.qte}</span> <span style="color:var(--t3);font-size:12px">/ seuil ${b.seuil}</span> ${low?'<span class="prio prio-haute" style="margin-left:6px">Bas</span>':''}</td>
            <td style="text-align:right;white-space:nowrap">
              <button class="btn ghost sm" onclick="adjustBox('${b.id}',-1)">−</button>
              <button class="btn ghost sm" onclick="adjustBox('${b.id}',1)">＋</button>
              <button class="btn ghost sm" onclick="formBox('${b.id}')">✎</button>
              <button class="btn danger sm" onclick="delBox('${b.id}')">🗑</button>
            </td>
          </tr>`;
        }).join('')}</tbody></table>`
      : emptyState('📦', 'Aucune box dans cette catégorie.', 'Ajouter une box', 'formBox()')}
    </div>`;
};

function adjustBox(id, delta) {
  const b = db.boxes.find(x => x.id === id);
  if (!b) return;
  b.qte = Math.max(0, (b.qte||0) + delta);
  save(); views.boxes();
}
function formBox(id) {
  const b = id ? db.boxes.find(x => x.id === id) : {};
  openModal(`
    <div class="modal-head"><h3>${id?'Modifier':'Nouvelle'} box</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <form onsubmit="saveBox(event,'${id||''}')">
      <div class="field-row">
        <div class="field"><label>Référence *</label><input name="ref" required value="${esc(b.ref)}" placeholder="Ex : PLB-001"></div>
        <div class="field"><label>Catégorie</label><input name="categorie" value="${esc(b.categorie)}" placeholder="Ex : Plomberie"></div>
      </div>
      <div class="field"><label>Désignation *</label><input name="nom" required value="${esc(b.nom)}" placeholder="Ex : Joints téflon"></div>
      <div class="field"><label>Emplacement</label><input name="emplacement" value="${esc(b.emplacement)}" placeholder="Ex : Atelier A · Étagère 2"></div>
      <div class="field-row">
        <div class="field"><label>Quantité en stock</label><input type="number" name="qte" min="0" value="${b.qte ?? 0}"></div>
        <div class="field"><label>Seuil d'alerte</label><input type="number" name="seuil" min="0" value="${b.seuil ?? 5}"></div>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn ghost" onclick="closeModal()">Annuler</button>
        <button type="submit" class="btn">${id?'Enregistrer':'Créer'}</button>
      </div>
    </form>`);
}
function saveBox(e, id) {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target).entries());
  data.qte = parseInt(data.qte) || 0;
  data.seuil = parseInt(data.seuil) || 0;
  if (id) { const idx = db.boxes.findIndex(x=>x.id===id); db.boxes[idx] = {...db.boxes[idx], ...data}; toast('Box mise à jour'); }
  else { db.boxes.push({ id: uid(), ...data }); toast('Box ajoutée'); }
  save(); closeModal(); views.boxes();
}
function delBox(id) {
  if (!confirm('Supprimer cette box ?')) return;
  db.boxes = db.boxes.filter(x => x.id !== id);
  save(); toast('Box supprimée'); views.boxes();
}

/* ═══════════════════════════════════════════════
   VUE : ENVELOPPES / ENCAISSEMENTS   (ELAN GESTION)
   ═══════════════════════════════════════════════ */
let envFilter = 'all';
views.enveloppes = function () {
  const envs = db.enveloppes || [];
  const total = envs.reduce((s,e)=> s + (e.montant||0), 0);
  const encaisse = envs.filter(e=>e.statut==='encaisse').reduce((s,e)=> s + (e.montant||0), 0);
  const attente = total - encaisse;
  setHeader('Enveloppes', 'Suivi des encaissements clients',
    `<button class="btn" onclick="formEnv()">＋ Nouvelle enveloppe</button>`);

  let list = [...envs].sort((a,b)=> (b.date||'').localeCompare(a.date||''));
  if (envFilter !== 'all') list = list.filter(e => e.statut === envFilter);

  const eur = n => (n||0).toLocaleString('fr-FR') + ' €';

  $('content').innerHTML = `
    <div class="kpis" style="grid-template-columns:repeat(3,1fr)">
      <div class="kpi"><div class="kpi-ico" style="background:rgba(34,177,76,0.16)">💶</div><div class="kpi-val">${eur(total)}</div><div class="kpi-lbl">Total enveloppes</div></div>
      <div class="kpi"><div class="kpi-ico" style="background:rgba(34,177,76,0.16)">✅</div><div class="kpi-val">${eur(encaisse)}</div><div class="kpi-lbl">Encaissé</div></div>
      <div class="kpi"><div class="kpi-ico" style="background:rgba(245,158,11,0.14)">⏳</div><div class="kpi-val">${eur(attente)}</div><div class="kpi-lbl">En attente</div></div>
    </div>
    <div class="filters">
      ${['all','attente','encaisse'].map(c => `<div class="chip ${envFilter===c?'active':''}" onclick="envFilter='${c}';views.enveloppes()">${c==='all'?'Toutes':ENV_STATUS[c].label}</div>`).join('')}
    </div>
    <div class="card">
      ${list.length ? `<table class="tbl">
        <thead><tr><th>N°</th><th>Client</th><th>Montant</th><th>Mode</th><th>Date</th><th>Statut</th><th></th></tr></thead>
        <tbody>${list.map(e => `<tr>
          <td class="strong" style="font-family:'Space Mono',monospace">${esc(e.num)}</td>
          <td>${esc(clientName(e.clientId))}</td>
          <td class="strong">${eur(e.montant)}</td>
          <td>${esc(e.mode)||'—'}</td>
          <td>${fmtDateShort(e.date)}</td>
          <td><span class="st ${ENV_STATUS[e.statut]?.cls||'st-encours'}">${ENV_STATUS[e.statut]?.label||'—'}</span></td>
          <td style="text-align:right;white-space:nowrap">
            ${e.statut==='attente'?`<button class="btn sm" onclick="encaisser('${e.id}')">Encaisser</button>`:''}
            <button class="btn ghost sm" onclick="formEnv('${e.id}')">✎</button>
            <button class="btn danger sm" onclick="delEnv('${e.id}')">🗑</button>
          </td>
        </tr>`).join('')}</tbody></table>`
      : emptyState('📮', 'Aucune enveloppe enregistrée.', 'Nouvelle enveloppe', 'formEnv()')}
    </div>`;
};

function encaisser(id) {
  const e = db.enveloppes.find(x => x.id === id);
  if (!e) return;
  e.statut = 'encaisse';
  save(); toast('Enveloppe encaissée'); views.enveloppes();
}
function nextEnvNum() {
  const year = new Date().getFullYear();
  const n = (db.enveloppes||[]).length + 1;
  return `ENV-${year}-${String(n).padStart(3,'0')}`;
}
function formEnv(id) {
  const e = id ? db.enveloppes.find(x => x.id === id) : {};
  const opt = db.clients.map(c => `<option value="${c.id}" ${c.id===e.clientId?'selected':''}>${esc(c.nom)}</option>`).join('');
  openModal(`
    <div class="modal-head"><h3>${id?'Modifier':'Nouvelle'} enveloppe</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <form onsubmit="saveEnv(event,'${id||''}')">
      <div class="field-row">
        <div class="field"><label>N° d'enveloppe *</label><input name="num" required value="${esc(e.num)||nextEnvNum()}"></div>
        <div class="field"><label>Date</label><input type="date" name="date" value="${e.date||todayISO()}"></div>
      </div>
      <div class="field"><label>Client *</label><select name="clientId" required><option value="">— Sélectionner —</option>${opt}</select></div>
      <div class="field-row">
        <div class="field"><label>Montant (€) *</label><input type="number" name="montant" required min="0" step="0.01" value="${e.montant ?? ''}"></div>
        <div class="field"><label>Mode de règlement</label><select name="mode">${['Espèces','Chèque','Virement','Carte'].map(m=>`<option ${e.mode===m?'selected':''}>${m}</option>`).join('')}</select></div>
      </div>
      <div class="field"><label>Statut</label><select name="statut">${Object.entries(ENV_STATUS).map(([k,v])=>`<option value="${k}" ${e.statut===k?'selected':''}>${v.label}</option>`).join('')}</select></div>
      <div class="field"><label>Note</label><input name="note" value="${esc(e.note)}" placeholder="Référence intervention, observation..."></div>
      <div class="modal-foot">
        <button type="button" class="btn ghost" onclick="closeModal()">Annuler</button>
        <button type="submit" class="btn">${id?'Enregistrer':'Créer'}</button>
      </div>
    </form>`);
}
function saveEnv(e, id) {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target).entries());
  data.montant = parseFloat(data.montant) || 0;
  if (id) { const idx = db.enveloppes.findIndex(x=>x.id===id); db.enveloppes[idx] = {...db.enveloppes[idx], ...data}; toast('Enveloppe mise à jour'); }
  else { db.enveloppes.push({ id: uid(), ...data }); toast('Enveloppe créée'); }
  save(); closeModal(); views.enveloppes();
}
function delEnv(id) {
  if (!confirm('Supprimer cette enveloppe ?')) return;
  db.enveloppes = db.enveloppes.filter(x => x.id !== id);
  save(); toast('Enveloppe supprimée'); views.enveloppes();
}

/* ═══════ UTIL ═══════ */
function emptyState(ico, txt, btnLabel, btnFn) {
  return `<div class="empty"><div class="e-ico">${ico}</div><p>${txt}</p>${btnLabel?`<button class="btn" onclick="${btnFn}">${btnLabel}</button>`:''}</div>`;
}

/* ═══════ INIT ═══════ */
refreshBadges();
go('dashboard');
</script>
</body>
</html>
