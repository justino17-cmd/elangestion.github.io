<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>ELAN GESTION</title>
<!-- PWA : installable sur iOS, Android, Mac et Windows -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#14181F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ELAN GESTION">
<meta name="application-name" content="ELAN GESTION">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* в”Җв”Җ MODE SOMBRE (par dГ©faut) вҖ” palette macOS в”Җв”Җ */
  :root{
    --bg:#14181F; --bg1:#1C2230; --bg2:#232A3A; --bg3:#2D3543;
    --side:#11151C; --deep:#0A0E13; --toolbar:#161B24;
    --acc:#4ADE80; --acc2:#16803C; --org:#FB923C; --red:#F87171; --blue:#60A5FA; --purple:#A78BFA;
    --t1:#E8ECF2; --t2:#B4BCC8; --t3:#7A8290; --brd:#1F2533; --on-acc:#06210F;
  }
  /* Accents personnalisables (mode sombre) */
  html[data-accent="blue"]  { --acc:#60A5FA; --acc2:#1E40AF; --on-acc:#0A1430; }
  html[data-accent="purple"]{ --acc:#C084FC; --acc2:#7E22CE; --on-acc:#1B0A2E; }
  html[data-accent="orange"]{ --acc:#FB923C; --acc2:#C2410C; --on-acc:#2A1304; }

  /* в”Җв”Җ MODE JOUR (clair) вҖ” palette macOS в”Җв”Җ */
  html[data-theme="light"]{
    --bg:#FFFFFF; --bg1:#FFFFFF; --bg2:#F4F6FA; --bg3:#E8EEF7;
    --side:#F7F9FC; --deep:#F0F3F8; --toolbar:#FAFBFD;
    --acc:#16803C; --acc2:#0C5E26; --org:#EA580C; --red:#DC2626; --blue:#2563EB; --purple:#7C3AED;
    --t1:#1A1F28; --t2:#4A5260; --t3:#8A93A3; --brd:#E3E8F0; --on-acc:#FFFFFF;
  }
  html[data-theme="light"][data-accent="blue"]  { --acc:#2563EB; --acc2:#1E40AF; }
  html[data-theme="light"][data-accent="purple"]{ --acc:#7C3AED; --acc2:#6B21A8; }
  html[data-theme="light"][data-accent="orange"]{ --acc:#EA580C; --acc2:#C2410C; }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;}
  body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 10% 10%,rgba(74,222,128,.08) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 95% 90%,rgba(74,222,128,.05) 0%,transparent 60%);pointer-events:none;}
  .mono{font-family:'Space Mono',monospace;}

  .app{display:flex;min-height:100vh;position:relative;z-index:1;}

  /* SIDEBAR */
  .sidebar{width:262px;flex-shrink:0;background:var(--side);border-right:1px solid var(--brd);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
  .brand{display:flex;align-items:center;gap:12px;padding:20px 20px 18px;border-bottom:1px solid var(--brd);}
  .brand-icon{width:46px;height:46px;background:linear-gradient(135deg,#1A7A3E,#176030);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;font-family:'Space Mono',monospace;}
  .brand .hi{font-size:16px;font-weight:700;}
  .brand .role{font-size:12px;color:var(--acc);display:flex;align-items:center;gap:6px;margin-top:2px;}
  .brand .role::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--acc);}
  .nav{padding:10px 12px;flex:1;overflow-y:auto;}
  .nav::-webkit-scrollbar{width:6px;} .nav::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px;}
  .nav-label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;padding:14px 12px 7px;}
  .nav-item{display:flex;align-items:center;gap:13px;padding:10px 14px;border-radius:10px;color:var(--t2);font-size:14px;font-weight:500;cursor:pointer;transition:.15s;margin-bottom:1px;user-select:none;}
  .nav-item:hover{background:var(--bg2);color:var(--t1);}
  .nav-item.active{background:color-mix(in srgb,var(--acc) 15%,transparent);color:var(--acc);font-weight:600;}
  .nav-item .ico{font-size:16px;width:20px;text-align:center;}
  .nav-item .badge{margin-left:auto;background:rgba(255,255,255,.08);color:var(--t2);font-size:11px;font-weight:600;padding:1px 8px;border-radius:100px;}
  .nav-item.active .badge{background:color-mix(in srgb,var(--acc) 22%,transparent);color:var(--acc);}
  .sidebar-foot{padding:14px 18px;border-top:1px solid var(--brd);}

  /* MAIN */
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;gap:16px;padding:18px 30px;border-bottom:1px solid var(--brd);background:var(--toolbar);backdrop-filter:blur(8px);position:sticky;top:0;z-index:5;}
  .topbar h1{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;letter-spacing:-.5px;}
  .topbar .sub{font-size:13px;color:var(--t3);margin-top:2px;}
  .topbar-actions{margin-left:auto;display:flex;gap:10px;align-items:center;}
  .content{padding:26px 30px 48px;flex:1;}
  .menu-btn{display:none;background:var(--bg2);border:1px solid var(--brd);color:var(--t1);width:40px;height:40px;border-radius:10px;font-size:18px;cursor:pointer;}

  /* BUTTONS */
  .btn{display:inline-flex;align-items:center;gap:8px;background:var(--acc);color:var(--on-acc);font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;padding:10px 17px;border-radius:10px;border:none;cursor:pointer;transition:.15s;white-space:nowrap;}
  .btn:hover{background:var(--acc2);transform:translateY(-1px);}
  .btn.ghost{background:var(--bg2);border:1px solid var(--brd);color:var(--t2);}
  .btn.ghost:hover{background:var(--bg3);color:var(--t1);}
  .btn.sm{padding:7px 12px;font-size:13px;}
  .btn.danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}
  .btn.danger:hover{background:rgba(239,68,68,.25);}

  /* KPIs */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:15px;margin-bottom:26px;}
  .kpi{background:var(--bg1);border:1px solid var(--brd);border-radius:16px;padding:18px;}
  .kpi-ico{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:12px;}
  .kpi-val{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;line-height:1;}
  .kpi-lbl{font-size:13px;color:var(--t3);margin-top:6px;}

  /* CARD */
  .card{background:var(--bg1);border:1px solid var(--brd);border-radius:16px;padding:20px;margin-bottom:18px;}
  .card-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .card-head h3{font-size:16px;font-weight:600;}
  .card-head .btn{margin-left:auto;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  @media(max-width:840px){.grid2{grid-template-columns:1fr;}}

  /* TABLE */
  .tbl{width:100%;border-collapse:collapse;}
  .tbl th{text-align:left;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);font-weight:600;padding:0 14px 12px;}
  .tbl td{padding:13px 14px;border-top:1px solid var(--brd);font-size:14px;color:var(--t2);vertical-align:middle;}
  .tbl tr:hover td{background:rgba(255,255,255,.015);}
  .tbl .row-clk{cursor:pointer;}
  .tbl .strong{color:var(--t1);font-weight:600;}
  .tbl-wrap{overflow-x:auto;}

  /* STATUS */
  .st{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 11px;border-radius:100px;white-space:nowrap;}
  .st::before{content:'';width:7px;height:7px;border-radius:50%;background:currentColor;}
  .st-blue{background:rgba(59,130,246,.14);color:#60a5fa;}
  .st-org{background:rgba(245,158,11,.14);color:#fbbf24;}
  .st-green{background:rgba(74,222,128,.16);color:#34d36b;}
  .st-red{background:rgba(239,68,68,.14);color:#f87171;}
  .st-grey{background:rgba(255,255,255,.07);color:var(--t2);}
  .st-purple{background:rgba(168,85,247,.14);color:#c084fc;}
  .tag{font-size:12px;font-weight:600;padding:3px 9px;border-radius:7px;background:rgba(255,255,255,.06);color:var(--t2);}
  .tag.hot{background:rgba(239,68,68,.14);color:#f87171;}

  /* FILTERS */
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .chip{background:var(--bg1);border:1px solid var(--brd);color:var(--t2);font-size:13px;font-weight:500;padding:8px 15px;border-radius:100px;cursor:pointer;transition:.15s;}
  .chip:hover{border-color:rgba(74,222,128,.3);}
  .chip.active{background:color-mix(in srgb,var(--acc) 15%,transparent);border-color:color-mix(in srgb,var(--acc) 45%,transparent);color:var(--acc);}

  /* EMPTY */
  .empty{text-align:center;padding:54px 20px;color:var(--t3);}
  .empty .e-ico{font-size:42px;margin-bottom:12px;opacity:.6;}
  .empty p{font-size:14px;margin-bottom:16px;}

  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:50;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;}
  .overlay.open{display:flex;}
  .modal{background:var(--bg1);border:1px solid var(--brd);border-radius:20px;width:100%;max-width:560px;padding:26px;animation:pop .2s ease;}
  @keyframes pop{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  .modal-head{display:flex;align-items:center;margin-bottom:20px;}
  .modal-head h3{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;}
  .modal-close{margin-left:auto;background:var(--bg2);border:1px solid var(--brd);color:var(--t2);width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:16px;}
  .modal-close:hover{color:var(--t1);}
  .field{margin-bottom:15px;}
  .field label{display:block;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:7px;}
  .field input,.field select,.field textarea{width:100%;background:var(--deep);border:1px solid var(--brd);border-radius:10px;padding:11px 13px;color:var(--t1);font-family:'DM Sans',sans-serif;font-size:14px;transition:.15s;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:color-mix(in srgb,var(--acc) 55%,transparent);}
  .field textarea{resize:vertical;min-height:80px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
  @media(max-width:520px){.field-row{grid-template-columns:1fr;}}
  .modal-foot{display:flex;gap:10px;margin-top:22px;}
  .modal-foot .btn{flex:1;justify-content:center;}

  /* DETAIL */
  .detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
  @media(max-width:520px){.detail-grid{grid-template-columns:1fr;}}
  .dt-lbl{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:5px;}
  .dt-val{font-size:15px;color:var(--t1);}
  .detail-desc{background:var(--bg);border:1px solid var(--brd);border-radius:12px;padding:15px;margin-top:16px;font-size:14px;color:var(--t2);line-height:1.6;}
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--brd);margin-bottom:16px;overflow-x:auto;}
  .tab{padding:9px 14px;font-size:13px;font-weight:600;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
  .tab:hover{color:var(--t2);}
  .tab.active{color:var(--acc);border-bottom-color:var(--acc);}

  /* PLANNING/LIST ROWS */
  .pl-row{display:flex;align-items:center;gap:15px;background:var(--bg1);border:1px solid var(--brd);border-radius:12px;padding:13px 16px;margin-bottom:9px;cursor:pointer;transition:.15s;}
  .pl-row:hover{border-color:rgba(74,222,128,.3);transform:translateX(2px);}
  .pl-time{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;min-width:50px;}
  .pl-info{flex:1;min-width:0;}
  .pl-title{font-size:15px;font-weight:600;margin-bottom:3px;}
  .pl-meta{font-size:13px;color:var(--t3);}
  .planning-date{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:1px;color:var(--acc);text-transform:uppercase;margin:22px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--brd);}
  /* Calendrier (planning style Organilog) */
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-h{text-align:center;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;padding:4px 0;font-weight:600;}
  .cal-d{min-height:62px;border:1px solid var(--brd);border-radius:10px;padding:6px;cursor:pointer;display:flex;flex-direction:column;gap:4px;transition:.12s;background:var(--bg);}
  .cal-d:hover{border-color:color-mix(in srgb,var(--acc) 45%,transparent);}
  .cal-d.out{opacity:.32;}
  .cal-d.today{border-color:var(--acc);}
  .cal-d.sel{background:color-mix(in srgb,var(--acc) 14%,transparent);border-color:var(--acc);}
  .cal-d .num{font-size:13px;font-weight:600;}
  .cal-dots{display:flex;gap:3px;flex-wrap:wrap;}
  .cal-dot{width:6px;height:6px;border-radius:50%;}
  .cal-cnt{margin-top:auto;font-size:10px;color:var(--t3);font-weight:600;}
  @media(max-width:560px){ .cal{gap:3px;} .cal-d{min-height:48px;padding:4px;border-radius:8px;} .cal-d .num{font-size:12px;} .cal-cnt{display:none;} }

  .avatar{width:30px;height:30px;border-radius:50%;background:rgba(74,222,128,.2);border:1px solid rgba(74,222,128,.3);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--acc);flex-shrink:0;}
  .ppl{display:flex;align-items:center;gap:9px;}

  /* CHARTS */
  .bar-row{display:flex;align-items:center;gap:12px;margin-bottom:13px;}
  .bar-lbl{font-size:13px;color:var(--t2);width:140px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bar-track{flex:1;height:12px;background:var(--bg);border-radius:100px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--acc2),var(--acc));transition:width .5s;}
  .bar-val{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;width:64px;text-align:right;flex-shrink:0;}

  /* MAP */
  .map-canvas{position:relative;height:440px;border-radius:16px;overflow:hidden;border:1px solid var(--brd);background:linear-gradient(135deg,#10141b,#181f2b);background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px;}
  .marker{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
  .marker .pin{width:34px;height:34px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.4);}
  .marker .pin span{transform:rotate(45deg);font-size:15px;}
  .marker .lbl{font-size:11px;background:rgba(0,0,0,.6);padding:2px 7px;border-radius:6px;white-space:nowrap;color:#fff;}
  .marker.veh .pin{background:var(--org);} .marker.cli .pin{background:var(--acc);}

  /* TIMELINE */
  .tl-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--brd);}
  .tl-dot{width:34px;height:34px;border-radius:10px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .tl-body{flex:1;min-width:0;}
  .tl-act{font-size:14px;color:var(--t1);font-weight:500;}
  .tl-det{font-size:13px;color:var(--t3);margin-top:2px;}
  .tl-time{font-size:12px;color:var(--t3);white-space:nowrap;}

  /* LOGIN */
  .login{position:fixed;inset:0;z-index:200;background:radial-gradient(ellipse 50% 45% at 50% 42%,rgba(74,222,128,.14) 0%,rgba(22,128,60,.05) 35%,transparent 65%),var(--deep);display:flex;align-items:center;justify-content:center;padding:20px;}
  .login-box{width:100%;max-width:380px;text-align:center;}
  .login-logo{width:78px;height:78px;margin:0 auto 18px;background:linear-gradient(135deg,#1A7A3E,#176030);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#fff;font-family:'Space Mono',monospace;box-shadow:0 0 60px rgba(74,222,128,.35);}
  .login-box h2{font-family:'Space Mono',monospace;font-size:22px;letter-spacing:2px;margin-bottom:4px;font-weight:700;}
  .login-box p{color:var(--t3);font-size:13px;margin-bottom:24px;}
  .login-card{background:var(--bg1);border:1px solid var(--brd);border-radius:16px;padding:22px;margin-top:18px;text-align:left;box-shadow:0 24px 60px rgba(0,0,0,.5);}
  .login-card-title{text-align:center;font-weight:700;font-size:15px;margin-bottom:18px;color:var(--t1);}
  .login-card .field label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);}
  .login-remember{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--t2);margin:2px 0 8px;cursor:pointer;}
  .login-remember input{width:16px;height:16px;accent-color:var(--acc);}
  .login-error{color:var(--red);font-size:12px;font-weight:600;margin-bottom:8px;}
  .login-users{display:flex;flex-direction:column;gap:10px;}
  .login-user{display:flex;align-items:center;gap:12px;background:var(--bg1);border:1px solid var(--brd);border-radius:12px;padding:13px 16px;cursor:pointer;transition:.15s;text-align:left;}
  .login-user:hover{border-color:rgba(74,222,128,.4);}
  .login-user .nom{font-weight:600;font-size:15px;}
  .login-user .role2{font-size:12px;color:var(--t3);}
  .pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:260px;margin:0 auto;}
  .pin-key{background:var(--bg1);border:1px solid var(--brd);color:var(--t1);font-size:22px;font-family:'Space Mono',monospace;padding:16px 0;border-radius:14px;cursor:pointer;transition:.1s;}
  .pin-key:hover{background:var(--bg2);border-color:rgba(74,222,128,.4);}
  .pin-key:active{transform:scale(.95);}
  .pin-dots{display:flex;gap:14px;justify-content:center;margin:20px 0;}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--t3);transition:.15s;}
  .pin-dot.on{background:var(--acc);border-color:var(--acc);}
  .pin-err{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:none}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
  .link-btn{background:none;border:none;color:var(--t3);font-size:13px;cursor:pointer;margin-top:16px;text-decoration:underline;}
  .link-btn:hover{color:var(--acc);}

  /* NOTIF */
  .bell{position:relative;background:var(--bg2);border:1px solid var(--brd);color:var(--t2);width:42px;height:42px;border-radius:11px;font-size:18px;cursor:pointer;transition:.15s;}
  .bell:hover{color:var(--t1);border-color:rgba(74,222,128,.4);}
  .bell-count{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;font-size:11px;font-weight:700;min-width:19px;height:19px;border-radius:100px;display:flex;align-items:center;justify-content:center;padding:0 5px;}
  .notif-panel{position:absolute;top:54px;right:0;width:340px;max-width:90vw;background:var(--bg1);border:1px solid var(--brd);border-radius:14px;box-shadow:0 20px 50px rgba(0,0,0,.5);z-index:30;overflow:hidden;}
  .notif-head{padding:15px 18px;border-bottom:1px solid var(--brd);font-weight:600;font-size:14px;}
  .notif-list{max-height:380px;overflow-y:auto;}
  .notif-it{display:flex;gap:12px;padding:13px 18px;border-bottom:1px solid var(--brd);cursor:pointer;}
  .notif-it:hover{background:var(--bg2);}
  .notif-it .ni-ico{font-size:18px;}
  .notif-it .ni-txt{font-size:13px;color:var(--t2);line-height:1.4;}
  .notif-it .ni-txt b{color:var(--t1);}

  /* SCANNER */
  .scan-view{background:#000;border-radius:14px;overflow:hidden;aspect-ratio:4/3;position:relative;margin-bottom:16px;}
  .scan-view video{width:100%;height:100%;object-fit:cover;}

function canSee(item){
  if(!currentUser) return false;
  if(currentUser.role==='admin') return true;

  if(currentUser.role==='dr' && ['validations','conso','enveloppes','audit'].includes(item.k)) return true;
  if(item.admin) return false;
  const p = db.permissions[currentUser.role] || db.permissions.technicien || {};
  return p[item.k] !== false;
}

const CHAMP_TYPES={texte:'Texte',nombre:'Nombre',oui_non:'Oui/Non',liste:'Liste',tableau:'Tableau'};
let rapChamps={};
function champInput(f){ const v=rapChamps[f.id];
  if(f.type==='nombre') return `<input type="number" value="${v!=null?esc(v):''}" oninput="rapChamps['${f.id}']=this.value">`;

  if(f.type==='liste') return `<select onchange="rapChamps['${f.id}']=this.value"><option value="">вҖ”</option>${(f.options||[]).map(o=>`<option ${v===o?'selected':''}>${esc(o)}</option>`).join('')}</select>`;
  if(f.type==='tableau'){ const cols=f.colonnes||[], rows=Array.isArray(v)?v:[];
    return `<div style="overflow-x:auto"><table class="tbl" style="width:100%"><thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join('')}<th></th></tr></thead><tbody>
      ${rows.map((r,ri)=>`<tr>${cols.map((c,ci)=>`<td style="padding:4px;border:0"><input value="${esc(r[ci]||'')}" oninput="rapChamps['${f.id}'][${ri}][${ci}]=this.value" style="padding:7px"></td>`).join('')}<td style="border:0"><button type="button" class="btn danger sm" onclick="rapChamps['${f.id}'].splice(${ri},1);renderChamps()">вң•</button></td></tr>`).join('')}
      </tbody></table></div><button type="button" class="btn ghost sm" onclick="rapTableAddRow('${f.id}',${cols.length})">пјӢ Ligne</button>`;
  }
  return `<input value="${v!=null?esc(v):''}" oninput="rapChamps['${f.id}']=this.value">`;
}

let sigCtx=null, sigDraw=false;
function initSigPad(existing){ const cv=$('sig-pad'); if(!cv) return; sigCtx=cv.getContext('2d'); sigCtx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--acc')||'#4ADE80'; sigCtx.lineWidth=2.4; sigCtx.lineCap='round';
  if(existing){ const img=new Image(); img.onload=()=>sigCtx.drawImage(img,0,0,cv.width,cv.height); img.src=existing; cv.dataset.has='1'; }
  const pos=e=>{ const r=cv.getBoundingClientRect(); const t=e.touches?e.touches[0]:e; return {x:(t.clientX-r.left)*(cv.width/r.width), y:(t.clientY-r.top)*(cv.height/r.height)}; };
  const down=e=>{ sigDraw=true; const p=pos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x,p.y); e.preventDefault(); };
  const move=e=>{ if(!sigDraw)return; const p=pos(e); sigCtx.lineTo(p.x,p.y); sigCtx.stroke(); cv.dataset.has='1'; e.preventDefault(); };
  const up=()=>{ sigDraw=false; };
  cv.onmousedown=down; cv.onmousemove=move; window.addEventListener('mouseup',up);
  cv.ontouchstart=down; cv.ontouchmove=move; cv.ontouchend=up;
}
function clearSig(){ const cv=$('sig-pad'); if(cv&&sigCtx){ sigCtx.clearRect(0,0,cv.width,cv.height); cv.dataset.has=''; } }
function saveRapport(e,id){ e.preventDefault(); const data=Object.fromEntries(new FormData(e.target)); const ix=db.interventions.findIndex(x=>x.id===id);
  const cv=$('sig-pad'); const sig = (cv&&cv.dataset.has) ? cv.toDataURL('image/png') : (db.interventions[ix].signature||'');
  db.interventions[ix]={...db.interventions[ix],...data,photos:rapPhotos.slice(),signature:sig,champs:JSON.parse(JSON.stringify(rapChamps))};
  logEvent('Rapport rГ©digГ©',db.interventions[ix].titre+(sig?' (signГ©)':''),'crud'); save(); closeModal(); toast('Rapport enregistrГ©'); go(current); }

    <style>*{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}body{margin:0;padding:40px;color:#1A1F28}

    h1{font-size:18px;margin:0}.muted{color:#666;font-size:13px}.box{background:#F7F9FC;border:1px solid #E3E8F0;border-radius:8px;padding:12px;margin:10px 0;font-size:13px}
    table{width:100%;border-collapse:collapse}th{background:#16803C;color:#fff;padding:7px;text-align:left;font-size:12px}td{padding:7px;border-bottom:1px solid #E3E8F0;font-size:12px}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ CARTE в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
let _map=null, _mapLayer='m';
function loadLeaflet(){ return new Promise((res,rej)=>{
  if(window.L) return res();
  const css=document.createElement('link'); css.rel='stylesheet'; css.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'; document.head.appendChild(css);
  const js=document.createElement('script'); js.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'; js.onload=()=>res(); js.onerror=()=>rej(new Error('leaflet')); document.head.appendChild(js);
}); }
async function geocode(q){ try{ const r=await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(q)); const j=await r.json(); if(j&&j[0]) return {lat:+j[0].lat,lng:+j[0].lon}; }catch(e){} return null; }
async function geocodeClients(){ const todo=db.clients.filter(c=>c.adresse && c.lat==null); if(!todo.length){ toast('Toutes les adresses sont dГ©jГ  localisГ©es'); return; }
  toast('Localisation en coursвҖҰ'); let n=0;
  for(const c of todo){ const g=await geocode(c.adresse); if(g){ c.lat=g.lat; c.lng=g.lng; n++; save(); } await new Promise(r=>setTimeout(r,1100)); }
  toast(n+' adresse(s) localisГ©e(s)'); if(current==='carte') views.carte();
}
function setMapLayer(l){ _mapLayer=l; if(current==='carte') views.carte(); }
views.carte=function(){
  const nLoc=db.clients.filter(c=>c.lat!=null).length, nMiss=db.clients.filter(c=>c.adresse&&c.lat==null).length;
  setHeader('Carte','Clients et interventions sur Google Maps',
    `${nMiss?`<button class="btn ghost" onclick="geocodeClients()">рҹ“Қ GГ©olocaliser (${nMiss})</button> `:''}<button class="btn ghost sm" onclick="setMapLayer('${_mapLayer==='m'?'s':'m'}')">${_mapLayer==='m'?'рҹӣ°пёҸ Satellite':'рҹ—әпёҸ Plan'}</button>`);
  $('content').innerHTML=`<div class="card" style="padding:0;overflow:hidden;border-radius:16px"><div id="map" style="height:520px;background:var(--bg2)"></div></div>
    <div style="display:flex;gap:18px;margin-top:10px;font-size:13px;color:var(--t2)"><span>рҹ“Қ ${nLoc} client(s) localisГ©(s)</span>${nMiss?`<span style="color:var(--org)">вҡ пёҸ ${nMiss} Г  gГ©olocaliser</span>`:''}</div>
    <div id="map-fb"></div>`;
  loadLeaflet().then(()=>initMap()).catch(()=>{ $('map-fb').innerHTML=`<div class="card">${emptyState('рҹ—әпёҸ','Carte indisponible вҖ” connexion Internet requise pour charger Google Maps.','','')}</div>`; });
};
function initMap(){
  const el=$('map'); if(!el||!window.L) return;
  if(_map){ try{_map.remove();}catch(e){} _map=null; }
  _map=L.map(el,{zoomControl:true}).setView([46.6,2.4],5);
  const url = _mapLayer==='s' ? 'https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}' : 'https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}';
  L.tileLayer(url,{subdomains:['mt0','mt1','mt2','mt3'],maxZoom:20,attribution:'В© Google'}).addTo(_map);
  const pts=[];
  db.clients.filter(c=>c.lat!=null).forEach(c=>{
    const m=L.marker([c.lat,c.lng]).addTo(_map);
    m.bindPopup(`<b>${esc(c.nom)}</b><br>${esc(c.adresse||'')}<br>${c.tel?esc(c.tel)+'<br>':''}<a href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(c.adresse||(c.lat+','+c.lng))}" target="_blank" rel="noopener">рҹ§ӯ ItinГ©raire Google Maps</a>`);
    pts.push([c.lat,c.lng]);
  });
  if(pts.length) _map.fitBounds(pts,{padding:[50,50],maxZoom:14});
  setTimeout(()=>{ try{_map.invalidateSize();}catch(e){} },150);
}

function ficheTech(id){ const t=db.techniciens.find(x=>x.id===id); if(!t) return;

  const veh=db.vehicules.find(v=>v.techId===id);
  const enCours=ints.filter(i=>i.statut==='encours'||i.statut==='planifiee').length;
  const k=(ic,bg,val,lbl)=>`<div class="kpi" style="padding:14px"><div class="kpi-ico" style="width:34px;height:34px;font-size:16px;margin-bottom:8px;background:${bg}">${ic}</div><div class="kpi-val" style="font-size:22px">${val}</div><div class="kpi-lbl">${lbl}</div></div>`;

    <div class="detail-grid" style="margin-bottom:6px">

      <div><div class="dt-lbl">Email</div><div class="dt-val">${esc(t.email)||'вҖ”'}</div></div>
      <div><div class="dt-lbl">VГ©hicule</div><div class="dt-val">${veh?esc(veh.immat):'вҖ”'}</div></div></div>
    <div class="kpis" style="grid-template-columns:repeat(3,1fr);margin:14px 0">
      ${k('рҹ§°','rgba(96,165,250,.14)',ints.length,'Interventions')}
      ${k('рҹ“…','rgba(251,146,60,.14)',enCours,'En cours/Г  venir')}
      ${k('вҸұпёҸ','rgba(74,222,128,.16)',dureeStr(totMin),'Temps pointГ©')}</div>
    <div class="dt-lbl" style="margin:8px 0">рҹ§° DerniГЁres interventions</div>
    ${ints.length? ints.slice(0,5).map(i=>`<div class="pl-row" onclick="closeModal();detailIntervention('${i.id}')"><div class="pl-info"><div class="pl-title">${esc(i.titre)}</div><div class="pl-meta">${fmtShort(i.date)} В· ${esc(clientName(i.clientId))}</div></div>${badge(STATUT_INT,i.statut)}</div>`).join('') : '<div style="color:var(--t3);font-size:13px">Aucune intervention</div>'}

}

    <form onsubmit="saveUser(event,'${id||''}')">

async function saveUser(e,id){ e.preventDefault(); const d=Object.fromEntries(new FormData(e.target));
  const loginNorm=(d.login||'').trim().toLowerCase();
  if(db.users.some(x=>x.login&&x.login.toLowerCase()===loginNorm&&x.id!==id)){ toast('Identifiant dГ©jГ  utilisГ©'); return; }
  if(id){ const ix=db.users.findIndex(x=>x.id===id); db.users[ix]={...db.users[ix],prenom:d.prenom,nom:d.nom,login:loginNorm,role:d.role,actif:d.actif==='true'};
    if(currentUser.id===id){ currentUser=db.users[ix]; const fn=fullName(currentUser); $('brand-ini').textContent=initials(fn); $('brand-role').textContent=ROLE[currentUser.role]||'Technicien'; renderNav(); } toast('Mis Г  jour'); }
  else{ if(db.users.length>=120){toast('Limite de 120 atteinte');return;} db.users.push({id:uid(),prenom:d.prenom,nom:d.nom,login:loginNorm,role:d.role,actif:true,pinHash:await sha256(d.pin)}); logEvent('Utilisateur crГ©Г©',`@${loginNorm}`,'auth'); toast('CrГ©Г©'); }
  save(); closeModal(); views.utilisateurs();
}
async function resetPin(id){ const pin=prompt('Nouveau code PIN (4 Г  8 chiffres) :'); if(!pin)return; if(!/^\d{4,8}$/.test(pin)){toast('PIN invalide');return;}
  const u=db.users.find(x=>x.id===id); u.pinHash=await sha256(pin); save(); toast('PIN rГ©initialisГ©'); }
function delUser(id){ if(id===currentUser.id){toast('Impossible de supprimer votre compte');return;} if(!confirm('Supprimer cet utilisateur ?'))return;
  db.users=db.users.filter(x=>x.id!==id); save(); toast('SupprimГ©'); views.utilisateurs(); }

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ GГүNГүRIQUES в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function saveSimple(e,coll,id,numFields){ e.preventDefault(); const d=Object.fromEntries(new FormData(e.target)); (numFields||[]).forEach(f=>{ if(d[f]!==undefined) d[f]=parseFloat(d[f])||0; });
  if(id){ const ix=db[coll].findIndex(x=>x.id===id); db[coll][ix]={...db[coll][ix],...d}; toast('Mis Г  jour'); }
  else{ if(coll==='clients'){ d.x=10+Math.random()*80; d.y=10+Math.random()*80; } db[coll].push({id:uid(),...d}); logEvent('CrГ©ation',`${coll} : ${d.nom||d.ref||''}`,'crud'); toast('CrГ©Г©'); }
  save(); closeModal(); go(current);
}
function delItem(coll,id){ if(!confirm('Supprimer cet Г©lГ©ment ?'))return; db[coll]=db[coll].filter(x=>x.id!==id); logEvent('Suppression',coll,'crud'); save(); closeModal(); toast('SupprimГ©'); go(current); }

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ SCANNER в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
let scanStream=null, scanTimer=null;
function openScanner(){ const hasBD='BarcodeDetector' in window;
  const refs=[...db.produits,...db.boxes];
  openModal(`<div class="modal-head"><h3>рҹ“· Scanner</h3><button class="modal-close" onclick="closeModal()">вң•</button></div>
    ${hasBD?`<div class="scan-view"><video id="scan-video" playsinline muted></video><div class="scan-frame"></div></div><p style="color:var(--t3);font-size:13px;text-align:center;margin-bottom:14px">Placez le code dans le cadreвҖҰ</p>`:''}
    <div class="field"><label>${hasBD?'Ou saisissez la rГ©fГ©rence':'RГ©fГ©rence'}</label><input id="scan-ref" list="rl" placeholder="Ex : PLB-001" oninput="scanLookup(this.value)" autofocus>
    <datalist id="rl">${refs.map(r=>`<option value="${esc(r.ref)}">${esc(r.nom)}</option>`).join('')}</datalist></div>
    <div id="scan-match"></div>`);
  if(hasBD) startCamera();
}
async function startCamera(){ try{ scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}); const v=$('scan-video'); if(!v)return; v.srcObject=scanStream; await v.play();
  const det=new BarcodeDetector(); scanTimer=setInterval(async()=>{ try{ const c=await det.detect(v); if(c.length){ const val=c[0].rawValue; const i=$('scan-ref'); if(i)i.value=val; scanLookup(val); } }catch(e){} },600);
  }catch(e){} }
function scanLookup(ref){ const r=(ref||'').toLowerCase(); const item=db.produits.find(p=>(p.ref||'').toLowerCase()===r)||db.boxes.find(b=>(b.ref||'').toLowerCase()===r);
  const coll=db.produits.includes(item)?'produits':'boxes'; const el=$('scan-match'); if(!el)return;
  if(!item){ el.innerHTML=ref?`<p style="color:var(--t3);font-size:13px">Aucun article pour В« ${esc(ref)} В»</p>`:''; return; }
  el.innerHTML=`<div class="scan-result"><div style="font-weight:600;margin-bottom:4px">${esc(item.nom)}</div>
    <div style="color:var(--t3);font-size:13px;margin-bottom:14px">${esc(item.ref)} В· Stock actuel</div>
    <div style="display:flex;gap:12px;align-items:center;justify-content:center"><button class="btn ghost" onclick="scanAdjust('${coll}','${item.id}',-1)">вҲ’</button>
    <span id="scan-qte" class="mono" style="font-size:26px;font-weight:700;min-width:50px;text-align:center">${item.qte}</span>
    <button class="btn ghost" onclick="scanAdjust('${coll}','${item.id}',1)">пјӢ</button></div></div>`;
}
function scanAdjust(coll,id,dl){ const it=db[coll].find(x=>x.id===id); it.qte=Math.max(0,it.qte+dl);

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ POINTAGE (temps de travail) в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function minutes(deb,fin){ if(!deb||!fin) return 0; const [h1,m1]=deb.split(':').map(Number),[h2,m2]=fin.split(':').map(Number); return Math.max(0,(h2*60+m2)-(h1*60+m1)); }
function dureeStr(min){ const h=Math.floor(min/60),m=min%60; return `${h}h${String(m).padStart(2,'0')}`; }

    ${list.length? tableCard(['Date','Technicien','Horaires','Pause','Net','Note',''],rows):`<div class="card">${emptyState('вҸұпёҸ','Aucun pointage.','Pointer','formPointage()')}</div>`}`;

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ STATISTIQUES (pilotage d'activitГ©) в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
views.statistiques=function(){
  setHeader('Statistiques',"Pilotage de l'activitГ©");
  const caPaye=db.factures.filter(f=>f.statut==='payee').reduce((s,f)=>s+docTot(f).ttc,0);
  const caAtt=db.factures.filter(f=>f.statut==='envoyee'||f.statut==='retard').reduce((s,f)=>s+docTot(f).ttc,0);
  const devisTtc=db.devis.reduce((s,d)=>s+docTot(d).ttc,0);
  const tauxAccept=db.devis.length? Math.round(db.devis.filter(d=>d.statut==='accepte').length/db.devis.length*100):0;
  // interventions par statut
  const parSt={}; db.interventions.forEach(i=>parSt[i.statut]=(parSt[i.statut]||0)+1);
  const maxI=Math.max(1,...Object.values(parSt));
  // CA par client (factures)
  const parClient={}; db.factures.forEach(f=>{ parClient[f.clientId]=(parClient[f.clientId]||0)+docTot(f).ttc; });
  const topC=Object.entries(parClient).map(([id,v])=>({nom:clientName(id),v})).sort((a,b)=>b.v-a.v).slice(0,6);
  const maxC=Math.max(1,...topC.map(c=>c.v));
  $('content').innerHTML=`<div class="kpis">
    <div class="kpi"><div class="kpi-ico" style="background:rgba(74,222,128,.16)">рҹ’¶</div><div class="kpi-val">${eur(caPaye)}</div><div class="kpi-lbl">CA encaissГ©</div></div>
    <div class="kpi"><div class="kpi-ico" style="background:rgba(251,146,60,.14)">вҸі</div><div class="kpi-val">${eur(caAtt)}</div><div class="kpi-lbl">En attente de paiement</div></div>
    <div class="kpi"><div class="kpi-ico" style="background:rgba(96,165,250,.14)">рҹ’°</div><div class="kpi-val">${eur(devisTtc)}</div><div class="kpi-lbl">Devis Г©mis</div></div>
    <div class="kpi"><div class="kpi-ico" style="background:rgba(167,139,250,.14)">вң…</div><div class="kpi-val">${tauxAccept}%</div><div class="kpi-lbl">Taux d'acceptation devis</div></div></div>
    <div class="grid2">
      <div class="card"><div class="card-head"><h3>рҹ§° Interventions par statut</h3></div>
        ${Object.keys(parSt).length? Object.entries(parSt).map(([k,v])=>`<div class="bar-row"><div class="bar-lbl">${STATUT_INT[k]?STATUT_INT[k].l:k}</div><div class="bar-track"><div class="bar-fill" style="width:${v/maxI*100}%"></div></div><div class="bar-val">${v}</div></div>`).join(''):emptyState('рҹ§°','Aucune intervention','','')}
      </div>
      <div class="card"><div class="card-head"><h3>рҹҸў Top clients (CA facturГ©)</h3></div>
        ${topC.length? topC.map(c=>`<div class="bar-row"><div class="bar-lbl">${esc(c.nom)}</div><div class="bar-track"><div class="bar-fill" style="width:${c.v/maxC*100}%"></div></div><div class="bar-val">${eur(c.v)}</div></div>`).join(''):emptyState('рҹҸў','Aucune facture','','')}
      </div>
    </div>`;
};

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ NOTIFICATIONS в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function computeNotifs(){ const out=[]; const today=todayISO();
  db.produits.filter(p=>p.qte<=p.seuil).forEach(p=>out.push({ic:'рҹ“Ұ',txt:`Stock bas : <b>${esc(p.nom)}</b> (${p.qte}/${p.seuil})`,v:'stock'}));
  if(currentUser && (currentUser.role==='admin'||currentUser.role==='dr')){
    db.demandes.filter(d=>d.statut==='attente').forEach(d=>out.push({ic:'вңҲпёҸ',txt:`Demande Г  valider : <b>${esc(d.num)}</b>`,v:'validations'}));
    db.enveloppes.filter(e=>e.statut==='attente').forEach(e=>out.push({ic:'рҹ“®',txt:`Enveloppe en attente : <b>${esc(e.num)}</b>`,v:'enveloppes'}));
  }
  db.interventions.filter(i=>i.date===today&&i.statut!=='terminee'&&i.statut!=='annulee').forEach(i=>out.push({ic:'рҹ§°',txt:`Aujourd'hui : <b>${esc(i.titre)}</b> Г  ${i.heure}`,v:'planning'}));
  return out;
}
function updateBell(){ if(!currentUser)return; const n=computeNotifs().length, c=$('bell-count'); c.style.display=n?'flex':'none'; c.textContent=n; }
let notifOpen=false;
function toggleNotif(e){ e.stopPropagation(); notifOpen?closeNotif():openNotif(); }
function openNotif(){ const list=computeNotifs(); notifOpen=true;
  $('notif-panel').innerHTML=`<div class="notif-panel" onclick="event.stopPropagation()"><div class="notif-head">рҹ”” Notifications (${list.length})</div>
    <div class="notif-list">${list.length? list.map(n=>`<div class="notif-it" onclick="go('${n.v}');closeNotif()"><span class="ni-ico">${n.ic}</span><span class="ni-txt">${n.txt}</span></div>`).join('') : '<div class="empty" style="padding:34px"><div class="e-ico">вң…</div><p>Aucune alerte</p></div>'}</div></div>`;
}
function closeNotif(){ notifOpen=false; $('notif-panel').innerHTML=''; }
document.addEventListener('click',()=>{ if(notifOpen) closeNotif(); });

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ AUTH вҖ” identifiant + code PIN (SHA-256), comme l'app macOS в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
async function sha256(str){ try{ if(window.crypto&&crypto.subtle){ const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str)); return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join(''); } }catch(e){}
  let h=0; for(let i=0;i<str.length;i++) h=(Math.imul(31,h)+str.charCodeAt(i))|0; return 'fb'+(h>>>0).toString(16); }
function getSession(){ return localStorage.getItem('elan_session')||sessionStorage.getItem('elan_session'); }
async function boot(){ let ch=false; for(const u of db.users){ if(!u.pinHash){ u.pinHash=await sha256('1234'); ch=true; } } if(ch) save();
  defaultPinHash=await sha256('1234');
  const u=db.users.find(x=>x.id===getSession()&&x.actif); if(u) enterApp(u); else renderLogin(); }
function enterApp(u){ currentUser=u; $('login').style.display='none'; $('app-root').style.display='flex';
  const av=$('app-ver'); if(av) av.textContent=APP_VERSION;
  const fn=fullName(u); $('brand-ini').textContent=initials(fn); $('brand-hi').textContent='Bonjour '+(u.prenom||fn.split(' ')[0]||'')+','; $('brand-role').textContent=ROLE[u.role]||'Technicien';
  asstMsgs=[]; asstOpen=false; renderAsst();
  renderNav(); logEvent('Connexion',`${fn} (@${u.login}) вҖ” ${ROLE[u.role]||''}`,'auth'); save(); go('dashboard'); }
function renderLogin(){ $('app-root').style.display='none'; $('login').style.display='flex';
  const saved=localStorage.getItem('elan_savedLogin')||'';
  $('login-box').innerHTML=`<div class="login-logo">EA</div><h2>ELAN GESTION</h2>
    <form onsubmit="doLogin(event)" autocomplete="off">
      <div class="login-card">
        <div class="login-card-title">Connexion</div>
        <div class="field"><label>Identifiant</label><input id="li-login" value="${esc(saved)}" placeholder="Votre identifiant" autocomplete="username" required></div>
        <div class="field"><label>Code PIN</label><input id="li-pin" type="password" inputmode="numeric" placeholder="вҖўвҖўвҖўвҖў" autocomplete="current-password" required></div>
        <label class="login-remember"><input type="checkbox" id="li-remember" ${saved?'checked':''}> Rester connectГ©</label>
        <div id="li-error" class="login-error" style="display:none">вҡ  Identifiant ou code PIN incorrect</div>
        <button type="submit" class="btn" style="width:100%;justify-content:center;margin-top:6px">вҶ’ Se connecter</button>
      </div>
    </form>`;
  setTimeout(()=>{ const el=$(saved?'li-pin':'li-login'); if(el) el.focus(); },60);
}
async function doLogin(e){ e.preventDefault();
  const login=$('li-login').value.trim(), pin=$('li-pin').value.trim(), remember=$('li-remember').checked;
  const h=await sha256(pin);
  const u=db.users.find(x=> x.login && x.login.toLowerCase()===login.toLowerCase() && x.actif && (x.pinHash===h || x.pinHash===pin));
  if(u){
    sessionStorage.setItem('elan_session',u.id);
    if(remember){ localStorage.setItem('elan_session',u.id); localStorage.setItem('elan_savedLogin',u.login); }
    else { localStorage.removeItem('elan_session'); localStorage.removeItem('elan_savedLogin'); }
    enterApp(u);
  } else {
    const er=$('li-error'); if(er) er.style.display='block';
    const c=document.querySelector('.login-card'); if(c){ c.classList.add('pin-err'); setTimeout(()=>c.classList.remove('pin-err'),400); }
    const p=$('li-pin'); if(p){ p.value=''; p.focus(); }
  }
}
function logout(){ logEvent('DГ©connexion','','auth'); save(); localStorage.removeItem('elan_session'); sessionStorage.removeItem('elan_session'); currentUser=null; asstMsgs=[]; asstOpen=false; $('assistant').innerHTML=''; closeNotif(); renderLogin(); }

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ ASSISTANT ELAN вҖ” aide intГ©grГ©e pour chaque utilisateur в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
let defaultPinHash='';
let asstMsgs=[], asstOpen=false;
const norm = s => (s||'').toLowerCase().normalize('NFD').replace(/[МҖ-НҜ]/g,'');

function defaultPinWarning(){
  const w = defaultPinHash && db.users.some(u=>u.actif && u.pinHash===defaultPinHash);
  return w ? 'вҡ пёҸ Un compte actif utilise encore le code PIN par dГ©faut <b>1234</b> вҖ” pense Г  le changer.'
           : 'вң… Aucun compte sur le code PIN par dГ©faut.';
}
function asstDiagnostic(){
  const out=[];
  const bas=db.produits.filter(p=>p.qte<=p.seuil);
  out.push((bas.length?'вҡ пёҸ':'вң…')+` Stock : ${bas.length? bas.length+' produit(s) sous le seuil':'tout est OK'}`);
  if(currentUser.role==='admin'||currentUser.role==='dr'){ const da=db.demandes.filter(d=>d.statut==='attente').length; out.push((da?'вҡ пёҸ':'вң…')+` Demandes Г  valider : ${da}`); }
  let kb=0; try{ kb=Math.round((localStorage.getItem(STORE_KEY)||'').length/1024);}catch(e){}
  out.push(`рҹ’ҫ DonnГ©es locales : ~${kb} Ko sauvegardГ©s`);
  out.push(navigator.onLine?'рҹҢҗ RГ©seau : en ligne':'рҹ“ҙ Hors connexion (l\'app fonctionne quand mГӘme)');
  out.push('рҹ”җ '+defaultPinWarning());
  return '<b>Diagnostic de l\'application :</b><br>'+out.join('<br>');
}

const ASST_KB = [
  {k:['pin','mot de passe','oublie','code','connexion','connecter','login','identifiant'], a:()=>`Connexion = ton <b>identifiant</b> + ton <b>code PIN</b>. ${currentUser.role==='admin'?'En admin, tu rГ©initialises le PIN d\'un compte via <b>Utilisateurs вҶ’ рҹ”‘ PIN</b>.':'Si tu as oubliГ© ton PIN, demande Г  un administrateur de le rГ©initialiser.'} Le PIN par dГ©faut d\'un nouveau compte est <b>1234</b>.`},
  {k:['stock','rupture','seuil','manque','quantite','reappro','approvision'], a:()=>{const bas=db.produits.filter(p=>p.qte<=p.seuil); return `Pour le stock : <b>Stock</b> (boutons +/вҲ’), <b>Mouvements stock</b> (entrГ©e/sortie prГ©cise) ou le <b>рҹ“· Scanner</b>. ${bas.length?`вҡ пёҸ LГ , <b>${bas.length}</b> produit(s) sous le seuil.`:'вң… Stocks OK pour le moment.'}`;}},
  {k:['intervention','planning','rendez','rdv','chantier','agenda'], a:()=>`Planifie une intervention dans <b>Planning</b> ou <b>Interventions вҶ’ пјӢ</b> : client, technicien, date, heure, prioritГ©.`},
  {k:['scan','scanner','code-barre','code barre','etiquette','qr'], a:()=>`Le <b>рҹ“· Scanner</b> (Produits / Stock / Boxes) lit le code avec la camГ©ra et ajuste la quantitГ© avec +/вҲ’. Tu peux aussi saisir la rГ©fГ©rence Г  la main.`},
  {k:['sauvegarde','synchro','sync','export','import','backup','donnee','perdu'], a:()=>`Tes donnГ©es sont stockГ©es localement (fonctionne hors connexion). Dans <b>Synchroniser</b> tu peux <b>Exporter</b> une sauvegarde .json et la <b>Importer</b> ailleurs. Pense Г  exporter rГ©guliГЁrement.`},
  {k:['enveloppe','encaiss','paiement','argent','reglement','facture'], a:()=>`Les <b>Enveloppes</b> suivent les encaissements clients : crГ©e l\'enveloppe, choisis le mode de rГЁglement, puis <b>Encaisser</b> une fois rГ©glГ©.`},
  {k:['demande','validation','bon de commande','commande','fournisseur'], a:()=>`Fais une demande de rГ©appro dans <b>Mes demandes вҶ’ пјӢ</b>. ${(currentUser.role==='admin'||currentUser.role==='dr')?'Tu valides ensuite dans <b>Validations DR</b> вҶ’ un bon de commande est crГ©Г© automatiquement.':'Un responsable la validera dans Validations DR.'}`},
  {k:['vehicule','flotte','voiture','camion','immat','kilometr'], a:()=>`GГЁre la flotte dans <b>VГ©hicules</b> : immatriculation, affectation Г  un technicien, kilomГ©trage, statut.`},
  {k:['permission','acces','droit','role','rГҙle'], a:()=>`Les accГЁs dГ©pendent du rГҙle (Technicien, Chef d\'Г©quipe, Directeur RГ©gional, Administrateur). ${currentUser.role==='admin'?'Tu rГЁgles les accГЁs des techniciens dans <b>Permissions</b>.':'Un administrateur gГЁre les permissions.'}`},
  {k:['securite','sur','protection','chiffr','hash','hache'], a:()=>`рҹ”җ SГ©curitГ© : connexion par code PIN <b>hachГ© en SHA-256</b> (jamais en clair). ${defaultPinWarning()}`},
  {k:['bug','probleme','erreur','marche pas','bloque','plante','lent','souci','ca marche'], a:()=>asstDiagnostic()+`<br><br>Si Г§a persiste, clique sur <b>В« Signaler un problГЁme В»</b> et un administrateur sera prГ©venu.`},
  {k:['diagnostic','verifier','sante','test','etat'], a:()=>asstDiagnostic()},
  {k:['merci','super','genial','cool','parfait'], a:()=>`Avec plaisir ${currentUser.prenom||''} ! рҹҳҠ Je reste dispo.`},
  {k:['bonjour','salut','hello','coucou','bonsoir'], a:()=>`Bonjour ${currentUser.prenom||''} рҹ‘Ӣ Je suis l\'assistant ELAN. Pose ta question ou choisis un sujet.`},
];

function toggleAsst(){ asstOpen?closeAsst():openAsst(); }
function openAsst(){ asstOpen=true; if(!asstMsgs.length){ asstMsgs.push({s:'bot',t:`Bonjour ${currentUser.prenom||''} рҹ‘Ӣ Je suis l\'<b>assistant ELAN</b>. Une question ou un souci ? Choisis un sujet ci-dessous ou Г©cris-moi.`}); } renderAsst(); }
function closeAsst(){ asstOpen=false; renderAsst(); }
function asstChip(c){ if(c==='Signaler un problГЁme'){ asstReport(); return; } askAssistant(c); }
function asstSend(){ const i=$('asst-input'); if(!i) return; const v=i.value.trim(); if(!v) return; askAssistant(v); }
function askAssistant(text){
  asstMsgs.push({s:'user',t:esc(text)});
  const n=norm(text);
  const entry=ASST_KB.find(e=>e.k.some(kw=>n.includes(norm(kw))));
  const ans = entry ? entry.a() : `Je ne suis pas sГ»r d\'avoir compris рҹӨ”. Je peux t\'aider sur : connexion/PIN, stock, interventions, scanner, sauvegarde, enveloppes, demandes, vГ©hicules, permissions, sГ©curitГ©. Tu peux aussi <b>signaler un problГЁme</b>.`;
  asstMsgs.push({s:'bot',t:ans});
  renderAsst();
}
function asstReport(){
  const txt=prompt('DГ©cris le problГЁme rencontrГ© :'); if(!txt) return;
  logEvent('ProblГЁme signalГ©',txt,'support'); save();
  asstMsgs.push({s:'bot',t:`Merci ${currentUser.prenom||''}, ton signalement a Г©tГ© transmis Г  l\'Г©quipe вң… (visible par les administrateurs dans l\'Historique/Audit).`});
  renderAsst();
}
function renderAsst(){
  if(!currentUser){ $('assistant').innerHTML=''; return; }
  const chips=['Signaler un problГЁme','Diagnostic','Stock','Intervention','Scanner','Sauvegarde','SГ©curitГ©'];
  $('assistant').innerHTML=`
    <button class="fab" onclick="toggleAsst()" title="Assistant ELAN">${asstOpen?'вң•':'рҹ’¬'}</button>
    <div class="asst ${asstOpen?'open':''}">
      <div class="asst-head"><div class="ava">рҹӨ–</div><div><div class="t">Assistant ELAN</div><div class="s">в—Ҹ En ligne В· rГ©pond Г  chaque utilisateur</div></div><button class="modal-close x" onclick="closeAsst()">вң•</button></div>
      <div class="asst-body" id="asst-body">${asstMsgs.map(m=>`<div class="msg ${m.s}">${m.t}</div>`).join('')}</div>
      <div class="chips">${chips.map(c=>`<div class="asst-chip" onclick="asstChip('${c}')">${c}</div>`).join('')}</div>
      <div class="asst-foot"><input id="asst-input" placeholder="Гүcris ta questionвҖҰ" onkeydown="if(event.key==='Enter'){event.preventDefault();asstSend();}"><button class="btn sm" onclick="asstSend()">вһӨ</button></div>
    </div>`;
  const body=$('asst-body'); if(body) body.scrollTop=body.scrollHeight;
  if(asstOpen){ const i=$('asst-input'); if(i) setTimeout(()=>i.focus(),50); }
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ THГҲME (auto systГЁme / jour / sombre + couleur d'accent) в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
const ACCENTS = { green:'Vert ELAN', blue:'Bleu', purple:'Violet', orange:'Orange' };
const THEME_LBL = { auto:'Auto (systГЁme)', light:'Mode jour', dark:'Mode sombre' };
const THEME_ICO = { auto:'рҹҢ—', light:'вҳҖпёҸ', dark:'рҹҢҷ' };
function getThemePref(){ return localStorage.getItem('elan_theme')||'auto'; }
function getAccent(){ return localStorage.getItem('elan_accent')||'green'; }
function systemDark(){ return !!(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches); }
function effectiveTheme(){ const p=getThemePref(); return p==='auto' ? (systemDark()?'dark':'light') : p; }
function applyTheme(){
  const eff=effectiveTheme(), a=getAccent(), r=document.documentElement;
  if(eff==='light') r.setAttribute('data-theme','light'); else r.removeAttribute('data-theme');
  if(a&&a!=='green') r.setAttribute('data-accent',a); else r.removeAttribute('data-accent');
  const tb=$('theme-btn'); if(tb){ tb.textContent=THEME_ICO[getThemePref()]; tb.title='ThГЁme : '+THEME_LBL[getThemePref()]; }
  const mc=document.querySelector('meta[name=theme-color]'); if(mc) mc.setAttribute('content', eff==='light'?'#FFFFFF':'#14181F');
}
function setThemePref(p){ localStorage.setItem('elan_theme',p); applyTheme(); toast(THEME_ICO[p]+' '+THEME_LBL[p]); if(current==='parametres') views.parametres(); }
function toggleTheme(){ const o=['auto','light','dark']; setThemePref(o[(o.indexOf(getThemePref())+1)%3]); }
function setAccent(a){ localStorage.setItem('elan_accent',a); applyTheme(); toast('Couleur В« '+ACCENTS[a]+' В» appliquГ©e'); if(current==='parametres') views.parametres(); }
/* Suit le thГЁme systГЁme en direct quand le rГ©glage est sur В« Auto В» */
if(window.matchMedia){ try{ window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>{ if(getThemePref()==='auto') applyTheme(); }); }catch(e){} }

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ INIT в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
applyTheme();
boot();

/* PWA : service worker pour le mode hors-ligne (HTTPS / GitHub Pages) */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(reg=>{
      // VГ©rifie les mises Г  jour Г  chaque ouverture
      reg.update && reg.update();
      reg.addEventListener('updatefound',()=>{ const nw=reg.installing; if(!nw) return;
        nw.addEventListener('statechange',()=>{ if(nw.state==='installed' && navigator.serviceWorker.controller){ toast && toast('Mise Г  jour disponibleвҖҰ'); }});
      });
    }).catch(()=>{});
  });
  let _reloaded=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{ if(_reloaded) return; _reloaded=true; location.reload(); });
}
</script>
