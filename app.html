<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELAN GESTION</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#07140b; --bg1:#091c10; --bg2:#0e2515; --bg3:#132e1b;
    --acc:#22b14c; --acc2:#1a8a3a; --org:#f59e0b; --red:#ef4444; --blue:#3b82f6; --purple:#a855f7;
    --t1:#fff; --t2:rgba(255,255,255,.72); --t3:rgba(255,255,255,.40); --brd:rgba(255,255,255,.08);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;}
  body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 10% 10%,rgba(34,177,76,.08) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 95% 90%,rgba(34,177,76,.05) 0%,transparent 60%);pointer-events:none;}
  .mono{font-family:'Space Mono',monospace;}

  .app{display:flex;min-height:100vh;position:relative;z-index:1;}

  /* SIDEBAR */
  .sidebar{width:262px;flex-shrink:0;background:var(--bg1);border-right:1px solid var(--brd);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
  .brand{display:flex;align-items:center;gap:12px;padding:20px 20px 18px;border-bottom:1px solid var(--brd);}
  .brand-icon{width:46px;height:46px;background:var(--acc);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;font-family:'Space Mono',monospace;}
  .brand .hi{font-size:16px;font-weight:700;}
  .brand .role{font-size:12px;color:var(--acc);display:flex;align-items:center;gap:6px;margin-top:2px;}
  .brand .role::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--acc);}
  .nav{padding:10px 12px;flex:1;overflow-y:auto;}
  .nav::-webkit-scrollbar{width:6px;} .nav::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px;}
  .nav-label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;padding:14px 12px 7px;}
  .nav-item{display:flex;align-items:center;gap:13px;padding:10px 14px;border-radius:10px;color:var(--t2);font-size:14px;font-weight:500;cursor:pointer;transition:.15s;margin-bottom:1px;user-select:none;}
  .nav-item:hover{background:var(--bg2);color:var(--t1);}
  .nav-item.active{background:rgba(34,177,76,.14);color:var(--acc);font-weight:600;}
  .nav-item .ico{font-size:16px;width:20px;text-align:center;}
  .nav-item .badge{margin-left:auto;background:rgba(255,255,255,.08);color:var(--t2);font-size:11px;font-weight:600;padding:1px 8px;border-radius:100px;}
  .nav-item.active .badge{background:rgba(34,177,76,.2);color:var(--acc);}
  .sidebar-foot{padding:14px 18px;border-top:1px solid var(--brd);}

  /* MAIN */
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;gap:16px;padding:18px 30px;border-bottom:1px solid var(--brd);background:rgba(5,15,8,.7);backdrop-filter:blur(8px);position:sticky;top:0;z-index:5;}
  .topbar h1{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;letter-spacing:-.5px;}
  .topbar .sub{font-size:13px;color:var(--t3);margin-top:2px;}
  .topbar-actions{margin-left:auto;display:flex;gap:10px;align-items:center;}
  .content{padding:26px 30px 48px;flex:1;}
  .menu-btn{display:none;background:var(--bg2);border:1px solid var(--brd);color:var(--t1);width:40px;height:40px;border-radius:10px;font-size:18px;cursor:pointer;}

  /* BUTTONS */
  .btn{display:inline-flex;align-items:center;gap:8px;background:var(--acc);color:#fff;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;padding:10px 17px;border-radius:10px;border:none;cursor:pointer;transition:.15s;white-space:nowrap;}
  .btn:hover{background:var(--acc2);transform:translateY(-1px);}
  .btn.ghost{background:var(--bg2);border:1px solid var(--brd);color:var(--t2);}
  .btn.ghost:hover{background:var(--bg3);color:var(--t1);}
  .btn.sm{padding:7px 12px;font-size:13px;}
  .btn.danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}
  .btn.danger:hover{background:rgba(239,68,68,.25);}

  /* KPIs */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:26px;}
  @media(max-width:900px){.kpis{grid-template-columns:1fr 1fr;}}
  .kpi{background:var(--bg1);border:1px solid var(--brd);border-radius:16px;padding:18px;}
  .kpi-ico{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:12px;}
  .kpi-val{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;line-height:1;}
  .kpi-lbl{font-size:13px;color:var(--t3);margin-top:6px;}

  /* CARD */
  .card{background:var(--bg1);border:1px solid var(--brd);border-radius:16px;padding:20px;margin-bottom:18px;}
  .card-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .card-head h3{font-size:16px;font-weight:600;}
  .card-head .btn{margin-left:auto;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  @media(max-width:840px){.grid2{grid-template-columns:1fr;}}

  /* TABLE */
  .tbl{width:100%;border-collapse:collapse;}
  .tbl th{text-align:left;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);font-weight:600;padding:0 14px 12px;}
  .tbl td{padding:13px 14px;border-top:1px solid var(--brd);font-size:14px;color:var(--t2);vertical-align:middle;}
  .tbl tr:hover td{background:rgba(255,255,255,.015);}
  .tbl .row-clk{cursor:pointer;}
  .tbl .strong{color:var(--t1);font-weight:600;}
  .tbl-wrap{overflow-x:auto;}

  /* STATUS */
  .st{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 11px;border-radius:100px;white-space:nowrap;}
  .st::before{content:'';width:7px;height:7px;border-radius:50%;background:currentColor;}
  .st-blue{background:rgba(59,130,246,.14);color:#60a5fa;}
  .st-org{background:rgba(245,158,11,.14);color:#fbbf24;}
  .st-green{background:rgba(34,177,76,.16);color:#34d36b;}
  .st-red{background:rgba(239,68,68,.14);color:#f87171;}
  .st-grey{background:rgba(255,255,255,.07);color:var(--t2);}
  .st-purple{background:rgba(168,85,247,.14);color:#c084fc;}
  .tag{font-size:12px;font-weight:600;padding:3px 9px;border-radius:7px;background:rgba(255,255,255,.06);color:var(--t2);}
  .tag.hot{background:rgba(239,68,68,.14);color:#f87171;}

  /* FILTERS */
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .chip{background:var(--bg1);border:1px solid var(--brd);color:var(--t2);font-size:13px;font-weight:500;padding:8px 15px;border-radius:100px;cursor:pointer;transition:.15s;}
  .chip:hover{border-color:rgba(34,177,76,.3);}
  .chip.active{background:rgba(34,177,76,.14);border-color:rgba(34,177,76,.4);color:var(--acc);}

  /* EMPTY */
  .empty{text-align:center;padding:54px 20px;color:var(--t3);}
  .empty .e-ico{font-size:42px;margin-bottom:12px;opacity:.6;}
  .empty p{font-size:14px;margin-bottom:16px;}

  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:50;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;}
  .overlay.open{display:flex;}
  .modal{background:var(--bg1);border:1px solid var(--brd);border-radius:20px;width:100%;max-width:560px;padding:26px;animation:pop .2s ease;}
  @keyframes pop{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  .modal-head{display:flex;align-items:center;margin-bottom:20px;}
  .modal-head h3{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;}
  .modal-close{margin-left:auto;background:var(--bg2);border:1px solid var(--brd);color:var(--t2);width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:16px;}
  .modal-close:hover{color:var(--t1);}
  .field{margin-bottom:15px;}
  .field label{display:block;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:7px;}
  .field input,.field select,.field textarea{width:100%;background:var(--bg);border:1px solid var(--brd);border-radius:10px;padding:11px 13px;color:var(--t1);font-family:'DM Sans',sans-serif;font-size:14px;transition:.15s;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:rgba(34,177,76,.5);}
  .field textarea{resize:vertical;min-height:80px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
  @media(max-width:520px){.field-row{grid-template-columns:1fr;}}
  .modal-foot{display:flex;gap:10px;margin-top:22px;}
  .modal-foot .btn{flex:1;justify-content:center;}

  /* DETAIL */
  .detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
  @media(max-width:520px){.detail-grid{grid-template-columns:1fr;}}
  .dt-lbl{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:5px;}
  .dt-val{font-size:15px;color:var(--t1);}
  .detail-desc{background:var(--bg);border:1px solid var(--brd);border-radius:12px;padding:15px;margin-top:16px;font-size:14px;color:var(--t2);line-height:1.6;}

  /* PLANNING/LIST ROWS */
  .pl-row{display:flex;align-items:center;gap:15px;background:var(--bg1);border:1px solid var(--brd);border-radius:12px;padding:13px 16px;margin-bottom:9px;cursor:pointer;transition:.15s;}
  .pl-row:hover{border-color:rgba(34,177,76,.3);transform:translateX(2px);}
  .pl-time{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;min-width:50px;}
  .pl-info{flex:1;min-width:0;}
  .pl-title{font-size:15px;font-weight:600;margin-bottom:3px;}
  .pl-meta{font-size:13px;color:var(--t3);}
  .planning-date{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:1px;color:var(--acc);text-transform:uppercase;margin:22px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--brd);}

  .avatar{width:30px;height:30px;border-radius:50%;background:rgba(34,177,76,.2);border:1px solid rgba(34,177,76,.3);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--acc);flex-shrink:0;}
  .ppl{display:flex;align-items:center;gap:9px;}

  /* CHARTS */
  .bar-row{display:flex;align-items:center;gap:12px;margin-bottom:13px;}
  .bar-lbl{font-size:13px;color:var(--t2);width:140px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bar-track{flex:1;height:12px;background:var(--bg);border-radius:100px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--acc2),var(--acc));transition:width .5s;}
  .bar-val{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;width:64px;text-align:right;flex-shrink:0;}

  /* MAP */
  .map-canvas{position:relative;height:440px;border-radius:16px;overflow:hidden;border:1px solid var(--brd);background:linear-gradient(135deg,#06140c,#0b2415);background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px;}
  .marker{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
  .marker .pin{width:34px;height:34px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.4);}
  .marker .pin span{transform:rotate(45deg);font-size:15px;}
  .marker .lbl{font-size:11px;background:rgba(0,0,0,.6);padding:2px 7px;border-radius:6px;white-space:nowrap;color:#fff;}
  .marker.veh .pin{background:var(--org);} .marker.cli .pin{background:var(--acc);}

  /* TIMELINE */
  .tl-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--brd);}
  .tl-dot{width:34px;height:34px;border-radius:10px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .tl-body{flex:1;min-width:0;}
  .tl-act{font-size:14px;color:var(--t1);font-weight:500;}
  .tl-det{font-size:13px;color:var(--t3);margin-top:2px;}
  .tl-time{font-size:12px;color:var(--t3);white-space:nowrap;}

  /* LOGIN */
  .login{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px;}
  .login-box{width:100%;max-width:380px;text-align:center;}
  .login-logo{width:66px;height:66px;margin:0 auto 18px;background:var(--acc);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;font-family:'Space Mono',monospace;}
  .login-box h2{font-family:'Space Mono',monospace;font-size:20px;letter-spacing:1px;margin-bottom:6px;}
  .login-box p{color:var(--t3);font-size:13px;margin-bottom:24px;}
  .login-users{display:flex;flex-direction:column;gap:10px;}
  .login-user{display:flex;align-items:center;gap:12px;background:var(--bg1);border:1px solid var(--brd);border-radius:12px;padding:13px 16px;cursor:pointer;transition:.15s;text-align:left;}
  .login-user:hover{border-color:rgba(34,177,76,.4);}
  .login-user .nom{font-weight:600;font-size:15px;}
  .login-user .role2{font-size:12px;color:var(--t3);}
  .pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:260px;margin:0 auto;}
  .pin-key{background:var(--bg1);border:1px solid var(--brd);color:var(--t1);font-size:22px;font-family:'Space Mono',monospace;padding:16px 0;border-radius:14px;cursor:pointer;transition:.1s;}
  .pin-key:hover{background:var(--bg2);border-color:rgba(34,177,76,.4);}
  .pin-key:active{transform:scale(.95);}
  .pin-dots{display:flex;gap:14px;justify-content:center;margin:20px 0;}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--t3);transition:.15s;}
  .pin-dot.on{background:var(--acc);border-color:var(--acc);}
  .pin-err{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:none}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
  .link-btn{background:none;border:none;color:var(--t3);font-size:13px;cursor:pointer;margin-top:16px;text-decoration:underline;}
  .link-btn:hover{color:var(--acc);}

  /* NOTIF */
  .bell{position:relative;background:var(--bg2);border:1px solid var(--brd);color:var(--t2);width:42px;height:42px;border-radius:11px;font-size:18px;cursor:pointer;transition:.15s;}
  .bell:hover{color:var(--t1);border-color:rgba(34,177,76,.4);}
  .bell-count{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;font-size:11px;font-weight:700;min-width:19px;height:19px;border-radius:100px;display:flex;align-items:center;justify-content:center;padding:0 5px;}
  .notif-panel{position:absolute;top:54px;right:0;width:340px;max-width:90vw;background:var(--bg1);border:1px solid var(--brd);border-radius:14px;box-shadow:0 20px 50px rgba(0,0,0,.5);z-index:30;overflow:hidden;}
  .notif-head{padding:15px 18px;border-bottom:1px solid var(--brd);font-weight:600;font-size:14px;}
  .notif-list{max-height:380px;overflow-y:auto;}
  .notif-it{display:flex;gap:12px;padding:13px 18px;border-bottom:1px solid var(--brd);cursor:pointer;}
  .notif-it:hover{background:var(--bg2);}
  .notif-it .ni-ico{font-size:18px;}
  .notif-it .ni-txt{font-size:13px;color:var(--t2);line-height:1.4;}
  .notif-it .ni-txt b{color:var(--t1);}

  /* SCANNER */
  .scan-view{background:#000;border-radius:14px;overflow:hidden;aspect-ratio:4/3;position:relative;margin-bottom:16px;}
  .scan-view video{width:100%;height:100%;object-fit:cover;}
  .scan-frame{position:absolute;inset:18% 15%;border:3px solid var(--acc);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,.35);}
  .scan-result{background:var(--bg);border:1px solid rgba(34,177,76,.4);border-radius:12px;padding:16px;margin-bottom:16px;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--acc);color:#fff;font-weight:600;font-size:14px;padding:13px 22px;border-radius:12px;z-index:100;transition:transform .3s;box-shadow:0 10px 30px rgba(0,0,0,.4);}
  .toast.show{transform:translateX(-50%) translateY(0);}

  /* PERMISSIONS */
  .perm-row{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--brd);}
  .perm-row .pn{flex:1;font-size:14px;}
  .switch{position:relative;width:46px;height:26px;flex-shrink:0;cursor:pointer;}
  .switch input{display:none;}
  .switch .track{position:absolute;inset:0;background:var(--bg3);border-radius:100px;transition:.2s;}
  .switch .knob{position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.2s;}
  .switch input:checked + .track{background:var(--acc);}
  .switch input:checked + .track + .knob{transform:translateX(20px);}

  @media(max-width:780px){
    .sidebar{position:fixed;left:0;top:0;z-index:40;transform:translateX(-100%);transition:transform .25s;}
    .sidebar.open{transform:none;}
    .menu-btn{display:flex;align-items:center;justify-content:center;}
    .content,.topbar{padding-left:16px;padding-right:16px;}
    .kpis{grid-template-columns:1fr 1fr;}
    .bar-lbl{width:96px;}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="login" style="display:none"><div class="login-box" id="login-box"></div></div>

<!-- APP -->
<div class="app" id="app-root" style="display:none">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-icon" id="brand-ini">EA</div>
      <div>
        <div class="hi" id="brand-hi">Bonjour</div>
        <div class="role" id="brand-role">Administrateur</div>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-foot">
      <button class="btn ghost sm" style="width:100%;justify-content:center;margin-bottom:8px" onclick="go('parametres')">🔄 Synchroniser</button>
      <button class="btn danger sm" style="width:100%;justify-content:center" onclick="logout()">⏻ Déconnexion</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
      <div>
        <h1 id="page-title">Tableau de bord</h1>
        <div class="sub" id="page-sub"></div>
      </div>
      <div class="topbar-actions" id="topbar-actions"></div>
      <div style="position:relative">
        <button class="bell" onclick="toggleNotif(event)">🔔<span class="bell-count" id="bell-count" style="display:none">0</span></button>
        <div id="notif-panel"></div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   ELAN GESTION — Application unique (logistique + interventions)
   Données locales (localStorage). Auth PIN SHA-256.
   ═══════════════════════════════════════════════════════════ */
const STORE_KEY = 'elan_gestion_v2';

/* ── Helpers ── */
const $ = id => document.getElementById(id);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const esc = s => (s ?? '').toString().replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const eur = n => (Number(n)||0).toLocaleString('fr-FR') + ' €';
const initials = name => (name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
const todayISO = () => new Date().toISOString().slice(0,10);
function fmtDate(iso){ if(!iso) return '—'; return new Date(iso+'T00:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
function fmtShort(iso){ if(!iso) return '—'; return new Date(iso+'T00:00:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}); }
function fmtTs(ts){ return new Date(ts).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }

/* ── Constantes statuts ── */
const STATUT_INT = { planifiee:{l:'Planifiée',c:'st-blue'}, encours:{l:'En cours',c:'st-org'}, terminee:{l:'Terminée',c:'st-green'}, annulee:{l:'Annulée',c:'st-red'} };

function load(){
  try{ const raw = localStorage.getItem(STORE_KEY); if(raw){ return migrate(JSON.parse(raw)); } }catch(e){}
  return seed();
}
function migrate(d){
  const cols = ['users','techniciens','clients','interventions','boxes','enveloppes','produits','mouvements','vehicules','demandes','bons','journal'];
  cols.forEach(c => { d[c] = d[c] || []; });
  if(!d.users.length) d.users = [{id:uid(),nom:'ELAN Admin',role:'admin',pinHash:'',actif:true}];
  d.permissions = d.permissions || defaultPerms();
  return d;
}
function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(db)); refreshBadges(); updateBell(); }

/* ── Lookups ── */
const techName = id => (db.techniciens.find(t=>t.id===id)||{}).nom || 'Non assigné';
const clientName = id => (db.clients.find(c=>c.id===id)||{}).nom || '—';
const produit = id => db.produits.find(p=>p.id===id) || {};
const userName = id => (db.users.find(u=>u.id===id)||db.techniciens.find(t=>t.id===id)||{}).nom || '—';
const vehName = id => { const v=db.vehicules.find(x=>x.id===id); return v? v.immat : '—'; };

/* ── Journal ── */
function logEvent(action, detail, type='general'){
  db.journal.unshift({id:uid(),ts:Date.now(),userId:currentUser&&currentUser.id,userNom:currentUser?currentUser.nom:'Système',action,detail,type});
  if(db.journal.length>500) db.journal.length=500;
}

/* ── Toast / Modal ── */
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }
function openModal(html){ $('modal').innerHTML=html; $('overlay').classList.add('open'); }
function closeModal(){ $('overlay').classList.remove('open'); if(scanTimer){clearInterval(scanTimer);scanTimer=null;} if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;} }
$('overlay').addEventListener('click', e=>{ if(e.target===$('overlay')) closeModal(); });

function canSee(item){
  if(!currentUser) return false;
  if(currentUser.role==='admin') return true;
  if(item.admin) return false;
  const p = db.permissions[currentUser.role] || {};
  return p[item.k] !== false;
}
function renderNav(){
  $('nav').innerHTML = NAV.map(sec=>{
    const items = sec.items.filter(canSee);
    if(!items.length) return '';
    return `<div class="nav-label">${sec.g}</div>` + items.map(it=>
      `<div class="nav-item" data-view="${it.k}" onclick="go('${it.k}')"><span class="ico">${it.ic}</span> ${it.l}${it.b?` <span class="badge" data-badge="${it.b}">0</span>`:''}</div>`
    ).join('');
  }).join('');
  refreshBadges();
}
function refreshBadges(){
  const map={int:db.interventions,cli:db.clients,tec:db.techniciens,prd:db.produits,box:db.boxes,env:db.enveloppes,veh:db.vehicules,usr:db.users};
  document.querySelectorAll('[data-badge]').forEach(el=>{ const c=map[el.dataset.badge]; if(c) el.textContent=c.length; });
}

const views={};
let current='dashboard';
function go(view){
  if(!views[view]) view='dashboard';
  current=view;
  document.getElementById('sidebar').classList.remove('open');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active', n.dataset.view===view));
  $('topbar-actions').innerHTML='';
  views[view]();
  updateBell();
}
function setHeader(title,sub,actions=''){ $('page-title').textContent=title; $('page-sub').textContent=sub||''; $('topbar-actions').innerHTML=actions; }
function emptyState(ico,txt,btn,fn){ return `<div class="empty"><div class="e-ico">${ico}</div><p>${txt}</p>${btn?`<button class="btn" onclick="${fn}">${btn}</button>`:''}</div>`; }
function tableCard(headers, rows){
  return `<div class="card"><div class="tbl-wrap"><table class="tbl"><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

/* ═══════════════ PLANNING ═══════════════ */
views.planning=function(){
  setHeader('Planning','Interventions classées par jour',`<button class="btn" onclick="formIntervention()">＋ Intervention</button>`);
  const ints=[...db.interventions].sort((a,b)=>(a.date+a.heure).localeCompare(b.date+b.heure));
  if(!ints.length){ $('content').innerHTML=emptyState('🗓️','Aucune intervention planifiée.','Créer','formIntervention()'); return; }
  const groups={}; ints.forEach(i=>(groups[i.date]=groups[i.date]||[]).push(i));
  $('content').innerHTML=Object.keys(groups).sort().map(date=>`
    <div class="planning-date">${fmtDate(date)} ${date===todayISO()?'· Aujourd\'hui':''}</div>
    ${groups[date].map(i=>`<div class="pl-row" onclick="detailIntervention('${i.id}')"><div class="pl-time">${i.heure}</div>
      <div class="pl-info"><div class="pl-title">${esc(i.titre)} <span class="${PRIO[i.prio].c}">${PRIO[i.prio].l}</span></div>
      <div class="pl-meta">${esc(clientName(i.clientId))} · 👷 ${esc(techName(i.techId))} · ⏱️ ${i.duree} min</div></div>
      ${badge(STATUT_INT,i.statut)}</div>`).join('')}`).join('');
};

/* ═══════════════ INTERVENTIONS ═══════════════ */
let intFilter='all';
views.interventions=function(){
  setHeader('Interventions',`${db.interventions.length} au total`,`<button class="btn" onclick="formIntervention()">＋ Intervention</button>`);
  const labels={all:'Toutes',planifiee:'Planifiées',encours:'En cours',terminee:'Terminées',annulee:'Annulées'};
  let list=[...db.interventions].sort((a,b)=>(b.date+b.heure).localeCompare(a.date+a.heure));
  if(intFilter!=='all') list=list.filter(i=>i.statut===intFilter);
  const rows=list.map(i=>`<tr class="row-clk" onclick="detailIntervention('${i.id}')">
    <td class="strong">${esc(i.titre)}</td><td>${esc(clientName(i.clientId))}</td><td>${fmtShort(i.date)} · ${i.heure}</td>
    <td><div class="ppl"><span class="avatar">${initials(techName(i.techId))}</span> ${esc(techName(i.techId))}</div></td>
    <td><span class="${PRIO[i.prio].c}">${PRIO[i.prio].l}</span></td><td>${badge(STATUT_INT,i.statut)}</td></tr>`).join('');
  $('content').innerHTML=`<div class="filters">${Object.keys(labels).map(k=>`<div class="chip ${intFilter===k?'active':''}" onclick="intFilter='${k}';views.interventions()">${labels[k]}</div>`).join('')}</div>
    ${list.length? tableCard(['Intervention','Client','Date','Technicien','Priorité','Statut'],rows) : `<div class="card">${emptyState('🧰','Aucune intervention.','Nouvelle','formIntervention()')}</div>`}`;
};
function formIntervention(id){
  const i=id?db.interventions.find(x=>x.id===id):{};
  const opt=(arr,sel)=>arr.map(o=>`<option value="${o.id}" ${o.id===sel?'selected':''}>${esc(o.nom)}</option>`).join('');
  openModal(`<div class="modal-head"><h3>${id?'Modifier':'Nouvelle'} intervention</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <form onsubmit="saveIntervention(event,'${id||''}')">
      <div class="field"><label>Titre *</label><input name="titre" required value="${esc(i.titre)}"></div>
      <div class="field-row"><div class="field"><label>Client *</label><select name="clientId" required><option value="">—</option>${opt(db.clients,i.clientId)}</select></div>
        <div class="field"><label>Technicien</label><select name="techId"><option value="">— Non assigné —</option>${opt(db.techniciens,i.techId)}</select></div></div>
      <div class="field-row"><div class="field"><label>Date *</label><input type="date" name="date" required value="${i.date||todayISO()}"></div>
        <div class="field"><label>Heure *</label><input type="time" name="heure" required value="${i.heure||'09:00'}"></div></div>
      <div class="field-row"><div class="field"><label>Durée (min)</label><input type="number" name="duree" value="${i.duree||60}"></div>
        <div class="field"><label>Priorité</label><select name="prio">${Object.entries(PRIO).map(([k,v])=>`<option value="${k}" ${i.prio===k?'selected':''}>${v.l}</option>`).join('')}</select></div></div>
      <div class="field"><label>Statut</label><select name="statut">${Object.entries(STATUT_INT).map(([k,v])=>`<option value="${k}" ${i.statut===k?'selected':''}>${v.l}</option>`).join('')}</select></div>
      <div class="field"><label>Adresse</label><input name="adresse" value="${esc(i.adresse)}"></div>
      <div class="field"><label>Description</label><textarea name="desc">${esc(i.desc)}</textarea></div>
      <div class="modal-foot"><button type="button" class="btn ghost" onclick="closeModal()">Annuler</button><button type="submit" class="btn">${id?'Enregistrer':'Créer'}</button></div></form>`);
}
function saveIntervention(e,id){ e.preventDefault(); const data=Object.fromEntries(new FormData(e.target)); data.duree=parseInt(data.duree)||60;
  if(id){ const ix=db.interventions.findIndex(x=>x.id===id); db.interventions[ix]={...db.interventions[ix],...data}; logEvent('Modif intervention',data.titre,'crud'); toast('Mise à jour'); }
  else{ db.interventions.push({id:uid(),compteRendu:'',...data}); logEvent('Nouvelle intervention',data.titre,'crud'); toast('Créée'); }
  save(); closeModal(); go(current);
}
function detailIntervention(id){ const i=db.interventions.find(x=>x.id===id); if(!i)return;
  openModal(`<div class="modal-head"><h3>${esc(i.titre)}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="display:flex;gap:8px;margin-bottom:18px">${badge(STATUT_INT,i.statut)} <span class="${PRIO[i.prio].c}">${PRIO[i.prio].l}</span></div>
    <div class="detail-grid">
      <div><div class="dt-lbl">Client</div><div class="dt-val">${esc(clientName(i.clientId))}</div></div>
      <div><div class="dt-lbl">Technicien</div><div class="dt-val">${esc(techName(i.techId))}</div></div>
      <div><div class="dt-lbl">Date</div><div class="dt-val">${fmtShort(i.date)} à ${i.heure}</div></div>
      <div><div class="dt-lbl">Durée</div><div class="dt-val">${i.duree} min</div></div>

views.stock=function(){

  setHeader('Stock',`Valorisation : ${eur(valo)}`,`<button class="btn ghost" onclick="openScanner()">📷 Scanner</button> <button class="btn" onclick="formMouvement()">🔁 Mouvement</button>`);
  const rows=db.produits.map(p=>{ const low=p.qte<=p.seuil;
    return `<tr><td class="strong mono">${esc(p.ref)}</td><td class="strong">${esc(p.nom)}</td><td>${esc(p.categorie)||'—'}</td>
    <td><span class="mono" style="font-weight:700;font-size:16px;color:${low?'#fbbf24':'var(--t1)'}">${p.qte}</span> <span style="color:var(--t3);font-size:12px">/ ${p.seuil}</span> ${low?'<span class="tag hot">Bas</span>':''}</td>
    <td>${eur(p.qte*p.prix)}</td>
    <td style="text-align:right;white-space:nowrap"><button class="btn ghost sm" onclick="quickMove('${p.id}','sortie')">−</button> <button class="btn ghost sm" onclick="quickMove('${p.id}','entree')">＋</button></td></tr>`;}).join('');
  $('content').innerHTML=`${bas.length?`<div class="card" style="border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.05)"><div style="color:#fbbf24;font-weight:600">⚠️ ${bas.length} produit(s) sous le seuil de réapprovisionnement</div></div>`:''}
    ${tableCard(['Réf','Désignation','Catégorie','Quantité','Valeur',''],rows)}`;
};
function quickMove(pid,type){ const p=produit(pid); p.qte=Math.max(0,p.qte+(type==='entree'?1:-1));
  db.mouvements.unshift({id:uid(),ts:Date.now(),produitId:pid,type,qte:1,motif:'Ajustement rapide',vehiculeId:''});
  logEvent(type==='entree'?'Entrée stock':'Sortie stock',`${p.ref} ×1`,'stock'); save(); views.stock(); }

    <form onsubmit="saveDemande(event)">
      <div class="field"><label>Produit *</label><select name="produitId" required><option value="">—</option>${db.produits.map(p=>`<option value="${p.id}">${esc(p.ref)} — ${esc(p.nom)}</option>`).join('')}</select></div>
      <div class="field"><label>Quantité *</label><input type="number" name="qte" min="1" value="1" required></div>
      <div class="field"><label>Motif</label><input name="motif" placeholder="Stock bas, chantier..."></div>
      <div class="modal-foot"><button type="button" class="btn ghost" onclick="closeModal()">Annuler</button><button type="submit" class="btn">Envoyer</button></div></form>`);
}
function saveDemande(e){ e.preventDefault(); const d=Object.fromEntries(new FormData(e.target)); d.qte=parseInt(d.qte)||1;
  const num='DR-'+String(db.demandes.length+1).padStart(3,'0');
  db.demandes.push({id:uid(),num,date:todayISO(),userId:currentUser.id,produitId:d.produitId,qte:d.qte,statut:'attente',motif:d.motif});
  logEvent('Demande créée',`${num} — ${produit(d.produitId).ref} ×${d.qte}`,'demande'); save(); closeModal(); toast('Demande envoyée'); go(current);
}

/* ═══════════════ VALIDATIONS DR ═══════════════ */
views.validations=function(){
  setHeader('Validations DR','Validation des demandes de réapprovisionnement');
  const att=db.demandes.filter(d=>d.statut==='attente');
  const autres=db.demandes.filter(d=>d.statut!=='attente');
  $('content').innerHTML=`<div class="card"><div class="card-head"><h3>⏳ À traiter (${att.length})</h3></div>
    ${att.length? att.map(d=>`<div class="pl-row"><div class="pl-info"><div class="pl-title">${esc(produit(d.produitId).nom||'—')} ×${d.qte}</div><div class="pl-meta">${esc(d.num)} · ${esc(userName(d.userId))} · ${esc(d.motif)||'—'}</div></div>
      <button class="btn danger sm" onclick="validerDemande('${d.id}','refusee')">Refuser</button> <button class="btn sm" onclick="validerDemande('${d.id}','validee')">Valider</button></div>`).join('') : emptyState('✅','Aucune demande en attente.','','')}
  </div>${autres.length?`<div class="card"><div class="card-head"><h3>Historique</h3></div>
    ${autres.map(d=>`<div class="pl-row"><div class="pl-info"><div class="pl-title">${esc(produit(d.produitId).nom||'—')} ×${d.qte}</div><div class="pl-meta">${esc(d.num)} · ${esc(userName(d.userId))}</div></div>${badge(DR,d.statut)}</div>`).join('')}</div>`:''}`;
};
function validerDemande(id,statut){ const d=db.demandes.find(x=>x.id===id); d.statut=statut;
  logEvent(statut==='validee'?'Demande validée':'Demande refusée',`${d.num} — ${produit(d.produitId).ref}`,'demande');
  if(statut==='validee'){ // créer un bon de commande en brouillon
    const p=produit(d.produitId);
    db.bons.push({id:uid(),num:'BC-'+new Date().getFullYear()+'-'+String(db.bons.length+1).padStart(3,'0'),date:todayISO(),fournisseur:'',produitId:d.produitId,qte:d.qte,prix:p.prix,statut:'brouillon'});
    toast('Validée — bon de commande créé');
  } else toast('Demande refusée');
  save(); views.validations();
}

/* ═══════════════ BONS DE COMMANDE ═══════════════ */
const BC={brouillon:{l:'Brouillon',c:'st-grey'},envoyee:{l:'Envoyée',c:'st-blue'},recue:{l:'Reçue',c:'st-green'}};
views.bons=function(){
  setHeader('Bons de commande','Commandes fournisseurs',`<button class="btn" onclick="formBon()">＋ Bon</button>`);
  const rows=[...db.bons].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(b=>{ const p=produit(b.produitId);
    return `<tr><td class="strong mono">${esc(b.num)}</td><td>${esc(b.fournisseur)||'—'}</td><td class="strong">${esc(p.nom||'—')}</td><td>×${b.qte}</td><td>${eur(b.qte*b.prix)}</td><td>${fmtShort(b.date)}</td><td>${badge(BC,b.statut)}</td>
    <td style="text-align:right;white-space:nowrap">${b.statut==='brouillon'?`<button class="btn sm" onclick="bonStatut('${b.id}','envoyee')">Envoyer</button> `:''}${b.statut==='envoyee'?`<button class="btn sm" onclick="bonRecu('${b.id}')">Réceptionner</button> `:''}<button class="btn ghost sm" onclick="formBon('${b.id}')">✎</button> <button class="btn danger sm" onclick="delItem('bons','${b.id}')">🗑</button></td></tr>`;}).join('');
  $('content').innerHTML=db.bons.length? tableCard(['N°','Fournisseur','Produit','Qté','Total','Date','Statut',''],rows):`<div class="card">${emptyState('✉️','Aucun bon de commande.','Nouveau','formBon()')}</div>`;
};
function formBon(id){ const b=id?db.bons.find(x=>x.id===id):{};
  openModal(`<div class="modal-head"><h3>${id?'Modifier':'Nouveau'} bon de commande</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <form onsubmit="saveBon(event,'${id||''}')">
      <div class="field-row"><div class="field"><label>N° *</label><input name="num" required value="${esc(b.num)||('BC-'+new Date().getFullYear()+'-'+String(db.bons.length+1).padStart(3,'0'))}"></div>
        <div class="field"><label>Date</label><input type="date" name="date" value="${b.date||todayISO()}"></div></div>
      <div class="field"><label>Fournisseur</label><input name="fournisseur" value="${esc(b.fournisseur)}"></div>
      <div class="field"><label>Produit *</label><select name="produitId" required><option value="">—</option>${db.produits.map(p=>`<option value="${p.id}" ${p.id===b.produitId?'selected':''}>${esc(p.ref)} — ${esc(p.nom)}</option>`).join('')}</select></div>
      <div class="field-row"><div class="field"><label>Quantité *</label><input type="number" name="qte" min="1" value="${b.qte||1}" required></div>
        <div class="field"><label>Prix unitaire (€)</label><input type="number" step="0.01" name="prix" value="${b.prix??0}"></div></div>
      <div class="field"><label>Statut</label><select name="statut">${Object.entries(BC).map(([k,v])=>`<option value="${k}" ${b.statut===k?'selected':''}>${v.l}</option>`).join('')}</select></div>
      <div class="modal-foot"><button type="button" class="btn ghost" onclick="closeModal()">Annuler</button><button type="submit" class="btn">${id?'Enregistrer':'Créer'}</button></div></form>`);
}
function saveBon(e,id){ e.preventDefault(); const d=Object.fromEntries(new FormData(e.target)); d.qte=parseInt(d.qte)||1; d.prix=parseFloat(d.prix)||0;
  if(id){ const ix=db.bons.findIndex(x=>x.id===id); db.bons[ix]={...db.bons[ix],...d}; toast('Mis à jour'); }
  else{ db.bons.push({id:uid(),...d}); logEvent('Bon de commande créé',d.num,'commande'); toast('Créé'); }
  save(); closeModal(); views.bons();
}
function bonStatut(id,s){ const b=db.bons.find(x=>x.id===id); b.statut=s; logEvent('Bon '+BC[s].l.toLowerCase(),b.num,'commande'); save(); toast('Bon '+BC[s].l.toLowerCase()); views.bons(); }
function bonRecu(id){ const b=db.bons.find(x=>x.id===id); b.statut='recue'; const p=produit(b.produitId);
  if(p.id){ p.qte+=b.qte; db.mouvements.unshift({id:uid(),ts:Date.now(),produitId:p.id,type:'entree',qte:b.qte,motif:'Réception '+b.num,vehiculeId:''}); }
  logEvent('Commande réceptionnée',`${b.num} — ${p.ref} +${b.qte}`,'commande'); save(); toast('Réceptionné, stock mis à jour'); views.bons();
}

/* ═══════════════ DASHBOARD CONSO ═══════════════ */
views.conso=function(){
  setHeader('Dashboard conso','Analyse de la consommation de stock');
  const sorties=db.mouvements.filter(m=>m.type==='sortie');
  const byProd={}; sorties.forEach(m=>{ byProd[m.produitId]=(byProd[m.produitId]||0)+m.qte; });
  const top=Object.entries(byProd).map(([pid,q])=>({nom:produit(pid).nom||'—',q})).sort((a,b)=>b.q-a.q).slice(0,8);
  const maxQ=Math.max(1,...top.map(t=>t.q));
  const totalSorties=sorties.reduce((s,m)=>s+m.qte,0), totalEntrees=db.mouvements.filter(m=>m.type==='entree').reduce((s,m)=>s+m.qte,0);
  const valoConso=sorties.reduce((s,m)=>s+m.qte*(produit(m.produitId).prix||0),0);
  $('content').innerHTML=`<div class="kpis">
    <div class="kpi"><div class="kpi-ico" style="background:rgba(239,68,68,.14)">📤</div><div class="kpi-val">${totalSorties}</div><div class="kpi-lbl">Unités consommées</div></div>
    <div class="kpi"><div class="kpi-ico" style="background:rgba(34,177,76,.16)">📥</div><div class="kpi-val">${totalEntrees}</div><div class="kpi-lbl">Unités entrées</div></div>
    <div class="kpi"><div class="kpi-ico" style="background:rgba(245,158,11,.14)">💶</div><div class="kpi-val">${eur(valoConso)}</div><div class="kpi-lbl">Valeur consommée</div></div>
    <div class="kpi"><div class="kpi-ico" style="background:rgba(59,130,246,.14)">🔁</div><div class="kpi-val">${db.mouvements.length}</div><div class="kpi-lbl">Mouvements</div></div></div>
    <div class="card"><div class="card-head"><h3>📊 Top consommation par produit</h3></div>
    ${top.length? top.map(t=>`<div class="bar-row"><div class="bar-lbl">${esc(t.nom)}</div><div class="bar-track"><div class="bar-fill" style="width:${t.q/maxQ*100}%"></div></div><div class="bar-val">${t.q}</div></div>`).join('') : emptyState('📈','Aucune sortie de stock enregistrée.','','')}</div>`;
};

views.utilisateurs=function(){
  if(currentUser.role!=='admin'){ setHeader('Accès restreint','Réservé aux administrateurs'); $('content').innerHTML=emptyState('🔒','Réservé aux administrateurs.','',''); return; }
  setHeader('Utilisateurs',`${db.users.length} / 120 compte(s)`, db.users.length<120?`<button class="btn" onclick="formUser()">＋ Utilisateur</button>`:'');
  const rows=db.users.map(u=>`<tr><td><div class="ppl"><span class="avatar">${initials(u.nom)}</span> <span class="strong">${esc(u.nom)}</span>${u.id===currentUser.id?' <span style="color:var(--t3);font-size:12px">(vous)</span>':''}</div></td>
    <td>${u.role==='admin'?'Administrateur':'Technicien'}</td><td>${u.actif?'<span class="st st-green">Actif</span>':'<span class="st st-red">Désactivé</span>'}</td>
    <td style="text-align:right;white-space:nowrap"><button class="btn ghost sm" onclick="resetPin('${u.id}')">🔑 PIN</button> <button class="btn ghost sm" onclick="formUser('${u.id}')">✎</button> ${u.id===currentUser.id?'':`<button class="btn danger sm" onclick="delUser('${u.id}')">🗑</button>`}</td></tr>`).join('');
  $('content').innerHTML=tableCard(['Utilisateur','Rôle','Statut',''],rows);
};
function formUser(id){ const u=id?db.users.find(x=>x.id===id):{};
  openModal(`<div class="modal-head"><h3>${id?'Modifier':'Nouvel'} utilisateur</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <form onsubmit="saveUser(event,'${id||''}')">
      <div class="field"><label>Nom complet *</label><input name="nom" required value="${esc(u.nom)}"></div>
      <div class="field"><label>Rôle</label><select name="role"><option value="technicien" ${u.role==='technicien'?'selected':''}>Technicien</option><option value="admin" ${u.role==='admin'?'selected':''}>Administrateur</option></select></div>
      ${id?`<div class="field"><label>Statut</label><select name="actif"><option value="true" ${u.actif?'selected':''}>Actif</option><option value="false" ${!u.actif?'selected':''}>Désactivé</option></select></div>`
          :`<div class="field"><label>Code PIN (4 à 8 chiffres) *</label><input name="pin" required pattern="\\d{4,8}" inputmode="numeric" placeholder="Ex : 1234"></div>`}
      <div class="modal-foot"><button type="button" class="btn ghost" onclick="closeModal()">Annuler</button><button type="submit" class="btn">${id?'Enregistrer':'Créer'}</button></div></form>`);
}
async function saveUser(e,id){ e.preventDefault(); const d=Object.fromEntries(new FormData(e.target));
  if(id){ const ix=db.users.findIndex(x=>x.id===id); db.users[ix]={...db.users[ix],nom:d.nom,role:d.role,actif:d.actif==='true'}; if(currentUser.id===id){currentUser=db.users[ix];renderNav();} toast('Mis à jour'); }
  else{ if(db.users.length>=120){toast('Limite de 120 atteinte');return;} db.users.push({id:uid(),nom:d.nom,role:d.role,actif:true,pinHash:await sha256(d.pin)}); logEvent('Utilisateur créé',d.nom,'auth'); toast('Créé'); }
  save(); closeModal(); views.utilisateurs();
}
async function resetPin(id){ const pin=prompt('Nouveau code PIN (4 à 8 chiffres) :'); if(!pin)return; if(!/^\d{4,8}$/.test(pin)){toast('PIN invalide');return;}
  const u=db.users.find(x=>x.id===id); u.pinHash=await sha256(pin); save(); toast('PIN réinitialisé'); }
function delUser(id){ if(id===currentUser.id){toast('Impossible de supprimer votre compte');return;} if(!confirm('Supprimer cet utilisateur ?'))return;
  db.users=db.users.filter(x=>x.id!==id); save(); toast('Supprimé'); views.utilisateurs(); }

      <label class="switch"><input type="checkbox" ${perms[m.k]!==false?'checked':''} onchange="togglePerm('${m.k}',this.checked)"><span class="track"></span><span class="knob"></span></label></div>`).join('')}</div>`;
};
function togglePerm(k,val){ db.permissions.technicien[k]=val; logEvent('Permission modifiée',`${k} : ${val?'autorisé':'refusé'}`,'auth'); save(); toast('Permission mise à jour'); }

/* ═══════════════ PARAMÈTRES / SYNC ═══════════════ */
views.parametres=function(){
  setHeader('Synchronisation & paramètres','Sauvegarde des données');
  $('content').innerHTML=`<div class="card"><div class="card-head"><h3>☁️ Sauvegarde & synchronisation</h3></div>
    <p style="color:var(--t2);font-size:14px;line-height:1.6;margin-bottom:16px">Exportez vos données pour les sauvegarder ou les transférer sur un autre appareil. Tout est stocké localement (fonctionne hors connexion).</p>
    <div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn" onclick="exportData()">⬇️ Exporter (.json)</button>
    <button class="btn ghost" onclick="document.getElementById('imp').click()">⬆️ Importer</button>
    <input type="file" id="imp" accept="application/json" style="display:none" onchange="importData(event)"></div></div>
    <div class="card"><div class="card-head"><h3>🔐 Sécurité</h3></div>
    <p style="color:var(--t2);font-size:14px;line-height:1.6">Accès par code PIN haché en <b style="color:var(--t1)">SHA-256</b>. Codes par défaut : <b style="color:var(--t1)">1234</b> (à modifier).</p></div>
    <div class="card" style="border-color:rgba(239,68,68,.3)"><div class="card-head"><h3>⚠️ Zone de danger</h3></div>
    <p style="color:var(--t2);font-size:14px;margin-bottom:14px">Réinitialise toutes les données et restaure la démonstration.</p>
    <button class="btn danger" onclick="resetData()">🗑 Réinitialiser</button></div>`;
};
function exportData(){ const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='elan-gestion-'+todayISO()+'.json'; a.click(); URL.revokeObjectURL(a.href); toast('Exporté'); }
function importData(e){ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{ try{ db=migrate(JSON.parse(r.result)); save(); renderNav(); toast('Importé'); go('dashboard'); }catch(err){ toast('Fichier invalide'); } }; r.readAsText(f); }
function resetData(){ if(!confirm('Réinitialiser TOUTES les données ?'))return; localStorage.removeItem(STORE_KEY); localStorage.removeItem('elan_session'); location.reload(); }

/* ═══════════════ GÉNÉRIQUES ═══════════════ */
function saveSimple(e,coll,id,numFields){ e.preventDefault(); const d=Object.fromEntries(new FormData(e.target)); (numFields||[]).forEach(f=>{ if(d[f]!==undefined) d[f]=parseFloat(d[f])||0; });
  if(id){ const ix=db[coll].findIndex(x=>x.id===id); db[coll][ix]={...db[coll][ix],...d}; toast('Mis à jour'); }
  else{ if(coll==='clients'){ d.x=10+Math.random()*80; d.y=10+Math.random()*80; } db[coll].push({id:uid(),...d}); logEvent('Création',`${coll} : ${d.nom||d.ref||''}`,'crud'); toast('Créé'); }
  save(); closeModal(); go(current);
}
function delItem(coll,id){ if(!confirm('Supprimer cet élément ?'))return; db[coll]=db[coll].filter(x=>x.id!==id); logEvent('Suppression',coll,'crud'); save(); closeModal(); toast('Supprimé'); go(current); }

/* ═══════════════ SCANNER ═══════════════ */
let scanStream=null, scanTimer=null;
function openScanner(){ const hasBD='BarcodeDetector' in window;
  const refs=[...db.produits,...db.boxes];
  openModal(`<div class="modal-head"><h3>📷 Scanner</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    ${hasBD?`<div class="scan-view"><video id="scan-video" playsinline muted></video><div class="scan-frame"></div></div><p style="color:var(--t3);font-size:13px;text-align:center;margin-bottom:14px">Placez le code dans le cadre…</p>`:''}
    <div class="field"><label>${hasBD?'Ou saisissez la référence':'Référence'}</label><input id="scan-ref" list="rl" placeholder="Ex : PLB-001" oninput="scanLookup(this.value)" autofocus>
    <datalist id="rl">${refs.map(r=>`<option value="${esc(r.ref)}">${esc(r.nom)}</option>`).join('')}</datalist></div>
    <div id="scan-match"></div>`);
  if(hasBD) startCamera();
}
async function startCamera(){ try{ scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}); const v=$('scan-video'); if(!v)return; v.srcObject=scanStream; await v.play();
  const det=new BarcodeDetector(); scanTimer=setInterval(async()=>{ try{ const c=await det.detect(v); if(c.length){ const val=c[0].rawValue; const i=$('scan-ref'); if(i)i.value=val; scanLookup(val); } }catch(e){} },600);
  }catch(e){} }
function scanLookup(ref){ const r=(ref||'').toLowerCase(); const item=db.produits.find(p=>(p.ref||'').toLowerCase()===r)||db.boxes.find(b=>(b.ref||'').toLowerCase()===r);
  const coll=db.produits.includes(item)?'produits':'boxes'; const el=$('scan-match'); if(!el)return;
  if(!item){ el.innerHTML=ref?`<p style="color:var(--t3);font-size:13px">Aucun article pour « ${esc(ref)} »</p>`:''; return; }
  el.innerHTML=`<div class="scan-result"><div style="font-weight:600;margin-bottom:4px">${esc(item.nom)}</div>
    <div style="color:var(--t3);font-size:13px;margin-bottom:14px">${esc(item.ref)} · Stock actuel</div>
    <div style="display:flex;gap:12px;align-items:center;justify-content:center"><button class="btn ghost" onclick="scanAdjust('${coll}','${item.id}',-1)">−</button>
    <span id="scan-qte" class="mono" style="font-size:26px;font-weight:700;min-width:50px;text-align:center">${item.qte}</span>
    <button class="btn ghost" onclick="scanAdjust('${coll}','${item.id}',1)">＋</button></div></div>`;
}
function scanAdjust(coll,id,dl){ const it=db[coll].find(x=>x.id===id); it.qte=Math.max(0,it.qte+dl);
  if(coll==='produits') db.mouvements.unshift({id:uid(),ts:Date.now(),produitId:id,type:dl>0?'entree':'sortie',qte:1,motif:'Scan',vehiculeId:''});
  save(); const q=$('scan-qte'); if(q)q.textContent=it.qte; toast('Stock mis à jour'); }

/* ═══════════════ NOTIFICATIONS ═══════════════ */
function computeNotifs(){ const out=[]; const today=todayISO();
  db.produits.filter(p=>p.qte<=p.seuil).forEach(p=>out.push({ic:'📦',txt:`Stock bas : <b>${esc(p.nom)}</b> (${p.qte}/${p.seuil})`,v:'stock'}));
  if(currentUser&&currentUser.role==='admin'){
    db.demandes.filter(d=>d.statut==='attente').forEach(d=>out.push({ic:'✈️',txt:`Demande à valider : <b>${esc(d.num)}</b>`,v:'validations'}));
    db.enveloppes.filter(e=>e.statut==='attente').forEach(e=>out.push({ic:'📮',txt:`Enveloppe en attente : <b>${esc(e.num)}</b>`,v:'enveloppes'}));
  }
  db.interventions.filter(i=>i.date===today&&i.statut!=='terminee'&&i.statut!=='annulee').forEach(i=>out.push({ic:'🧰',txt:`Aujourd'hui : <b>${esc(i.titre)}</b> à ${i.heure}`,v:'planning'}));
  return out;
}
function updateBell(){ if(!currentUser)return; const n=computeNotifs().length, c=$('bell-count'); c.style.display=n?'flex':'none'; c.textContent=n; }
let notifOpen=false;
function toggleNotif(e){ e.stopPropagation(); notifOpen?closeNotif():openNotif(); }
function openNotif(){ const list=computeNotifs(); notifOpen=true;
  $('notif-panel').innerHTML=`<div class="notif-panel" onclick="event.stopPropagation()"><div class="notif-head">🔔 Notifications (${list.length})</div>
    <div class="notif-list">${list.length? list.map(n=>`<div class="notif-it" onclick="go('${n.v}');closeNotif()"><span class="ni-ico">${n.ic}</span><span class="ni-txt">${n.txt}</span></div>`).join('') : '<div class="empty" style="padding:34px"><div class="e-ico">✅</div><p>Aucune alerte</p></div>'}</div></div>`;
}
function closeNotif(){ notifOpen=false; $('notif-panel').innerHTML=''; }
document.addEventListener('click',()=>{ if(notifOpen) closeNotif(); });

/* ═══════════════ AUTH ═══════════════ */
let loginSel=null, pinBuf='';
async function sha256(str){ try{ if(window.crypto&&crypto.subtle){ const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str)); return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join(''); } }catch(e){}
  let h=0; for(let i=0;i<str.length;i++) h=(Math.imul(31,h)+str.charCodeAt(i))|0; return 'fb'+(h>>>0).toString(16); }
async function boot(){ let ch=false; for(const u of db.users){ if(!u.pinHash){ u.pinHash=await sha256('1234'); ch=true; } } if(ch) save();
  const sid=localStorage.getItem('elan_session'); const u=db.users.find(x=>x.id===sid&&x.actif); if(u) enterApp(u); else renderLogin(); }
function enterApp(u){ currentUser=u; $('login').style.display='none'; $('app-root').style.display='flex';
  $('brand-ini').textContent=initials(u.nom); $('brand-hi').textContent='Bonjour '+u.nom.split(' ')[0]+','; $('brand-role').textContent=u.role==='admin'?'Administrateur':'Technicien';
  renderNav(); logEvent('Connexion','Ouverture de session','auth'); save(); go('dashboard'); }
function renderLogin(){ $('app-root').style.display='none'; $('login').style.display='flex'; loginSel=null; pinBuf='';
  const a=db.users.filter(u=>u.actif);
  $('login-box').innerHTML=`<div class="login-logo">EA</div><h2>ELAN GESTION</h2><p>Sélectionnez votre compte</p><div class="login-users">
    ${a.map(u=>`<div class="login-user" onclick="selectUser('${u.id}')"><span class="avatar">${initials(u.nom)}</span><div><div class="nom">${esc(u.nom)}</div><div class="role2">${u.role==='admin'?'Administrateur':'Technicien'}</div></div></div>`).join('')}</div>`;
}
function selectUser(id){ loginSel=db.users.find(u=>u.id===id); pinBuf=''; renderPinpad(); }
function renderPinpad(){ $('login-box').innerHTML=`<div class="login-logo">🔐</div><h2>${esc(loginSel.nom)}</h2><p>Code PIN</p><div class="pin-dots" id="pin-dots"></div>
  <div class="pinpad">${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" onclick="pinPress('${n}')">${n}</button>`).join('')}<button class="pin-key" onclick="pinDel()">⌫</button><button class="pin-key" onclick="pinPress('0')">0</button><button class="pin-key" onclick="pinSubmit()" style="color:var(--acc)">✓</button></div>
  <button class="link-btn" onclick="renderLogin()">← Changer de compte</button>`; updateDots(); }
function updateDots(){ const el=$('pin-dots'); if(!el)return; el.innerHTML=Array.from({length:Math.max(4,pinBuf.length)}).map((_,i)=>`<div class="pin-dot ${i<pinBuf.length?'on':''}"></div>`).join(''); }
function pinPress(d){ if(pinBuf.length<8){ pinBuf+=d; updateDots(); } }
function pinDel(){ pinBuf=pinBuf.slice(0,-1); updateDots(); }
async function pinSubmit(){ if(pinBuf.length<4){toast('4 chiffres minimum');return;} const h=await sha256(pinBuf);
  if(h===loginSel.pinHash){ localStorage.setItem('elan_session',loginSel.id); enterApp(loginSel); }
  else{ const b=$('login-box'); b.classList.add('pin-err'); setTimeout(()=>b.classList.remove('pin-err'),400); pinBuf=''; updateDots(); toast('Code incorrect'); } }
function logout(){ logEvent('Déconnexion','','auth'); save(); localStorage.removeItem('elan_session'); currentUser=null; closeNotif(); renderLogin(); }

document.addEventListener('keydown',e=>{ if(e.key==='Escape'){closeModal();return;}
  if($('login').style.display!=='none'&&loginSel){ if(/^\d$/.test(e.key))pinPress(e.key); else if(e.key==='Backspace')pinDel(); else if(e.key==='Enter')pinSubmit(); } });

/* ═══════════════ INIT ═══════════════ */
boot();
</script>
</body>
</html>
