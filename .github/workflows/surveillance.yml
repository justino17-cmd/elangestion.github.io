name: Surveillance TeamOP

on:
  schedule:
    - cron: '7 * * * *'   # toutes les heures, à h+07
  workflow_dispatch: {}    # lancement manuel possible (onglet Actions)

permissions:
  issues: write
  contents: read

jobs:
  verifier:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Vérifier le site et le serveur
        run: node .github/scripts/surveillance.js
      - name: Signaler le problème (issue + e-mail)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            try { await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: 'surveillance', color: 'd73a4a', description: 'Alerte de la surveillance horaire' }); } catch (e) {}
            const when = new Date().toLocaleString('fr-FR', { timeZone: 'Europe/Paris' });
            const runUrl = context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId;
            const body = '🚨 La vérification horaire de **teamop.fr** a détecté un problème le ' + when + '.\n\n'
              + '➡️ Détail : ' + runUrl + '\n\n'
              + 'Pour corriger : ouvre une session Claude Code sur ce dépôt et demande « corrige le problème détecté par la surveillance ».';
            const { data: issues } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'surveillance' });
            if (issues.length) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issues[0].number, body });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title: '🚨 Surveillance TeamOP : problème détecté', body, labels: ['surveillance'] });
            }
