<html lang="fr">

    --fond: #050a14;
    --navy: #0d1624;
    --navy-2: #111d30;
    --carte: rgba(17, 29, 48, 0.7);
    --bordure: rgba(75, 121, 189, 0.25);
    --bordure-vive: rgba(96, 165, 250, 0.5);
    --texte: #eef1f7;
    --texte-2: #9fb0ca;
    --texte-3: #64748e;
    --bleu: #3b82f6;
    --bleu-clair: #60a5fa;
    --bleu-fond: rgba(59, 130, 246, 0.12);
    --violet: #8b5cf6;
    --violet-clair: #a78bfa;
    --violet-fond: rgba(139, 92, 246, 0.12);
    --vert: #34d399;
    --vert-fond: rgba(52, 211, 153, 0.1);
    --or: #f5c842;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  #nbUsers::-webkit-outer-spin-button, #nbUsers::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  #nbUsers { -moz-appearance: textfield; appearance: textfield; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--fond);
    background-image:
      radial-gradient(ellipse 800px 400px at 20% -10%, rgba(59,130,246,.08), transparent),
      radial-gradient(ellipse 600px 400px at 90% 20%, rgba(139,92,246,.06), transparent);
    color: var(--texte);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ===== BARRE HAUTE ===== */
  .barre {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--bordure);
    backdrop-filter: blur(8px);
  }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 17px; letter-spacing: -0.01em; }
  .logo-carre {
    width: 34px; height: 34px;
    border-radius: 9px;
    background: linear-gradient(135deg, #1e3a5f, #0d1624);
    border: 1px solid var(--bordure-vive);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800;
  }
  .btn-retour {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 13.5px; font-weight: 600;
    color: var(--texte-2);
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 9px;
    border: 1px solid var(--bordure);
    transition: all .15s;
    cursor: pointer;
    background: none;
    font-family: inherit;
  }
  .btn-retour:hover { color: var(--texte); border-color: var(--bordure-vive); }
  .btn-retour svg { width: 15px; height: 15px; }

  /* ===== CONTENEUR ===== */
  .conteneur {
    max-width: 1020px;
    margin: 0 auto;
    padding: 44px 24px 80px;
  }
  .fil-etapes {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 36px;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--texte-3);
    flex-wrap: wrap;
  }
  .etape { display: flex; align-items: center; gap: 8px; }
  .etape-num {
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    border: 1px solid var(--bordure);
  }
  .etape.faite .etape-num { background: var(--vert-fond); border-color: var(--vert); color: var(--vert); }
  .etape.active { color: var(--texte); }
  .etape.active .etape-num { background: var(--bleu); border-color: var(--bleu); color: #fff; }
  .fil-trait { width: 36px; height: 1px; background: var(--bordure); }

  .titre-page {
    text-align: center;
    margin-bottom: 8px;
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .sous-titre {
    text-align: center;
    color: var(--texte-2);
    margin-bottom: 40px;
    font-size: 15px;
  }

  /* ===== GRILLE PRINCIPALE ===== */
  .grille {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 360px;
    gap: 24px;
    align-items: start;
  }

  /* ===== COLONNE DROITS ===== */
  .carte {
    background: var(--carte);
    border: 1px solid var(--bordure);
    border-radius: var(--radius);
    backdrop-filter: blur(6px);
  }
  .carte-droits { padding: 28px; }
  .entete-formule {
    display: flex;
    align-items: center;
    gap: 14px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--bordure);
    margin-bottom: 22px;
  }
  .icone-formule {
    width: 52px; height: 52px;
    border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .icone-formule svg { width: 26px; height: 26px; }
  .nom-formule { font-size: 21px; font-weight: 800; letter-spacing: -0.01em; }
  .desc-formule { font-size: 13.5px; color: var(--texte-2); margin-top: 2px; }
  .badge-formule {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .04em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 12px;
    margin-left: 10px;
    vertical-align: middle;
  }

  /* ===== BLOC UTILISATEURS (le point clé) ===== */
  .bloc-utilisateurs {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 20px;
    border-radius: 12px;
    margin-bottom: 24px;
    border: 1px solid;
  }
  .avatars { display: flex; }
  .avatar-rond {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 2px solid var(--navy);
    display: flex; align-items: center; justify-content: center;
    margin-left: -8px;
    font-size: 12px;
  }
  .avatar-rond:first-child { margin-left: 0; }
  .avatar-rond svg { width: 15px; height: 15px; }
  .bloc-utilisateurs .texte-u { flex: 1; min-width: 0; }
  .bloc-utilisateurs .gros { font-size: 16px; font-weight: 800; }
  .bloc-utilisateurs .petit { font-size: 12.5px; color: var(--texte-2); margin-top: 1px; }

  .section-droits {
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--texte-3);
    margin: 20px 0 12px;
  }
  .droit {
    display: flex;
    align-items: flex-start;
    gap: 11px;
    padding: 9px 0;
    font-size: 14px;
  }
  .droit .coche {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--vert-fond);
    color: var(--vert);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .droit .coche svg { width: 12px; height: 12px; }
  .droit.exclu { color: var(--texte-3); }
  .droit.exclu .coche { background: rgba(100,116,142,.12); color: var(--texte-3); }
  .droit strong { font-weight: 700; color: var(--texte); }
  .droit.exclu strong { color: var(--texte-3); }
  .droit .detail { color: var(--texte-2); }

  /* ===== COLONNE PAIEMENT ===== */
  .carte-paiement { padding: 26px; position: sticky; top: 24px; }
  .ligne-prix {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 8px 0;
    font-size: 14px;
    color: var(--texte-2);
  }
  .ligne-prix.total {
    border-top: 1px solid var(--bordure);
    margin-top: 10px;
    padding-top: 16px;
    color: var(--texte);
    font-weight: 700;
    font-size: 15px;

  .prix-grand { font-size: 30px; font-weight: 800; letter-spacing: -0.02em; }
  .prix-grand small { font-size: 14px; font-weight: 600; color: var(--texte-2); }
  .choix-cycle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin: 16px 0 20px;
  }
  .cycle {
    padding: 11px 12px;
    border-radius: 10px;
    border: 1px solid var(--bordure);
    cursor: pointer;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--texte-2);
    transition: all .15s;
    background: none;
    font-family: inherit;
    position: relative;

  .cycle:hover { border-color: var(--bordure-vive); }
  .cycle.actif { border-color: var(--bleu); background: var(--bleu-fond); color: var(--texte); }
  .cycle .eco {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--vert);
    margin-top: 2px;

    width: 100%;
    padding: 15px;
    border-radius: 11px;
    border: none;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    color: #fff;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    margin-top: 4px;

  .btn-payer:hover { filter: brightness(1.12); transform: translateY(-1px); }
  .btn-payer:active { transform: scale(.98); }
  .btn-payer svg { width: 17px; height: 17px; }
  .note-paiement {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    font-size: 12px;
    color: var(--texte-3);
    margin-top: 14px;

  .garanties {
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px solid var(--bordure);

  .garantie {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 12.5px;
    color: var(--texte-2);
    padding: 4px 0;

    margin-top: 22px;
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;

    font-size: 12.5px;

    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--bordure);
    color: var(--texte-2);
    cursor: pointer;
    background: none;
    font-family: inherit;
    transition: all .15s;

  .puce-formule:hover { border-color: var(--bordure-vive); color: var(--texte); }
  .puce-formule.active { background: var(--bleu-fond); border-color: var(--bleu); color: var(--texte); }

  @media (max-width: 860px) {
    .grille { grid-template-columns: 1fr; }
    .carte-paiement { position: static; }
    .titre-page { font-size: 24px; }
  }
</style>
</head>

      { ok: false, titre: 'Espace entreprise (SIRET) et canaux d\'équipe', detail: 'disponibles avec Messages Pro' }
    ]
  },
  msgpro: {
    groupe: 'msg',
    nom: 'Messages Pro',
    desc: 'La messagerie de votre entreprise, propre et séparée du perso',
    prixMensuel: 15,
    utilisateurs: 1,
    couleur: '#38bdf8',
    fond: 'rgba(56,189,248,.14)',
    badge: { texte: '⭐ Équipes', fond: 'rgba(56,189,248,.2)', couleur: '#7cd4fb' },
    boutonTexte: 'Continuer vers le paiement',
    boutonFond: 'linear-gradient(135deg, #2563eb, #38bdf8)',
    droits: [
      { ok: true,  titre: 'Tout Perso inclus', detail: 'messages, appels vidéo, fichiers...' },
      { ok: true,  titre: 'Espace entreprise (SIRET)', detail: 'vos équipes, vos règles' },
      { ok: true,  titre: 'Canaux d\'équipe', detail: '# équipe, # dépôt… + canal général' },
      { ok: true,  titre: 'Épingles, favoris, archivage', detail: 'et recherche' },
      { ok: true,  titre: 'Mentions @, réponses', detail: 'messages vocaux' },
      { ok: true,  titre: 'Notifications push', detail: 'gestion des membres' },
      { ok: false, titre: 'Réunions visio', detail: 'disponibles avec Messages Business Premium' }
    ]
  },
  msgpremium: {
    groupe: 'msg',
    nom: 'Messages Business Premium',
    desc: 'La totale : visio illimitée et priorité au support',
    prixMensuel: 25,
    utilisateurs: 3,
    couleur: '#a78bfa',
    fond: 'rgba(139,92,246,.15)',
    badge: { texte: '👑 Premium', fond: 'rgba(139,92,246,.2)', couleur: '#a78bfa' },
    boutonTexte: 'Continuer vers le paiement',
    boutonFond: 'linear-gradient(135deg, #7c3aed, #8b5cf6)',
    droits: [
      { ok: true,  titre: 'Tout Messages Pro inclus', detail: 'espace entreprise, canaux, épingles...' },
      { ok: true,  titre: 'Réunions visio illimitées', detail: 'HD, partage d\'écran, sans limite' },
      { ok: true,  titre: 'Réunions planifiées', detail: 'invitations · appels de groupe' },
      { ok: true,  titre: 'Couleurs de conversation', detail: 'et personnalisation avancée' },
      { ok: true,  titre: 'Support prioritaire', detail: '' },
      { ok: true,  titre: 'Inclus automatiquement', detail: 'avec le Business Premium de la suite' }
    ]
  }
};

const REMISE_ANNUELLE = 2; // 2 mois offerts sur l'année

/* ---------- ÉTAT ---------- */
const params = new URLSearchParams(window.location.search);
let formuleActive = params.get('formule') || 'business';
if (!FORMULES[formuleActive]) formuleActive = 'business';
let cycleAnnuel = false;
/* Préremplissage : recap-abonnement.html?formule=business&utilisateurs=7 */
let nbUsersVoulu = Math.min(250, parseInt(params.get('utilisateurs'), 10) || 0);   // 0 = automatique (places incluses de la formule)

/* ---------- RENDU : SÉLECTEUR ---------- */
function rendreSelecteur() {
  const c = document.getElementById('selecteurFormules');
  const groupe = FORMULES[formuleActive].groupe;
  c.innerHTML = Object.entries(FORMULES).filter(([cle, f]) => f.groupe === groupe).map(([cle, f]) =>
    `<button class="puce-formule ${cle === formuleActive ? 'active' : ''}" data-formule="${cle}">${f.nom}</button>`
  ).join('');
  c.querySelectorAll('.puce-formule').forEach(b => {
    b.addEventListener('click', () => {
      formuleActive = b.dataset.formule; nbUsersVoulu = 0;
      history.replaceState(null, '', '?formule=' + formuleActive);
      rendreTout();
    });
  });
}

/* ---------- RENDU : DROITS ---------- */
function rendreDroits() {
  const f = FORMULES[formuleActive];
  const c = document.getElementById('carteDroits');

  const avatars = Array.from({ length: Math.min(f.utilisateurs, 5) }, () =>
    `<span class="avatar-rond" style="background:${f.fond}; color:${f.couleur};">
       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
     </span>`
  ).join('');

  c.innerHTML = `
    <div class="entete-formule">
      <div class="icone-formule" style="background:${f.fond}; color:${f.couleur};">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg>
      </div>
      <div>
        <span class="nom-formule">${f.nom}</span>
        ${f.badge ? `<span class="badge-formule" style="background:${f.badge.fond}; color:${f.badge.couleur};">${f.badge.texte}</span>` : ''}
        <div class="desc-formule">${f.desc}</div>
      </div>
    </div>

    <div class="bloc-utilisateurs" style="background:${f.fond}; border-color:${f.couleur}40;">
      <div class="avatars">${avatars}</div>
      <div class="texte-u">
        <div class="gros">${f.utilisateurs} utilisateur${f.utilisateurs > 1 ? 's' : ''} inclus</div>
        <div class="petit">Avec cette offre, vous avez le droit de créer ${f.utilisateurs > 1 ? 'jusqu\'à ' + f.utilisateurs + ' comptes utilisateurs' : '1 compte utilisateur'} avec le même abonnement — chacun avec son propre accès et ses permissions.</div>
      </div>
    </div>

    <div class="section-droits">Ce que cette formule vous donne le droit de faire</div>
    ${f.droits.filter(d => d.ok).map(d => `
      <div class="droit">
        <span class="coche"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
        <span><strong>${d.titre}</strong>${d.detail ? ` <span class="detail">— ${d.detail}</span>` : ''}</span>
      </div>`).join('')}

    ${f.droits.some(d => !d.ok) ? `
      <div class="section-droits">Non inclus dans cette formule</div>
      ${f.droits.filter(d => !d.ok).map(d => `
        <div class="droit exclu">
          <span class="coche"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></span>
          <span><strong>${d.titre}</strong>${d.detail ? ` <span class="detail">— ${d.detail}</span>` : ''}</span>
        </div>`).join('')}` : ''}
  `;
}

/* ---------- RENDU : PAIEMENT ---------- */
function rendrePaiement() {
  const f = FORMULES[formuleActive];
  const c = document.getElementById('cartePaiement');
  const gratuit = f.prixMensuel === 0;
  if (nbUsersVoulu < 1) nbUsersVoulu = f.utilisateurs;   // par défaut : les places incluses
  const nbAbos = gratuit ? 1 : Math.max(1, Math.ceil(nbUsersVoulu / f.utilisateurs));
  const nbPlaces = f.utilisateurs * nbAbos;
  // L'option annuelle n'apparaît que si son lien Stripe est configuré
  const annuelDispo = !gratuit && CONFIG_STRIPE[formuleActive] && CONFIG_STRIPE[formuleActive].annuel && !CONFIG_STRIPE[formuleActive].annuel.includes('A_REMPLACER');
  if (!annuelDispo) cycleAnnuel = false;

  const prixAffiche = cycleAnnuel && !gratuit
    ? f.prixMensuel * (12 - REMISE_ANNUELLE)
    : f.prixMensuel;
  const suffixe = gratuit ? 'pour toujours' : (cycleAnnuel ? '/ an' : '/ mois');
  const parUtilisateur = gratuit ? null
    : (cycleAnnuel ? prixAffiche / 12 / f.utilisateurs : prixAffiche / f.utilisateurs);

  const totalAffiche = prixAffiche * nbAbos;
  c.innerHTML = `
    <div style="text-align:center; margin-bottom: 6px;">
      <span class="prix-grand">${gratuit ? '0 €' : totalAffiche + ' €'} <small>${suffixe}</small></span>
    </div>
    <div style="text-align:center; font-size:12.5px; color:var(--texte-2); margin-bottom: 6px;">
      Formule ${f.nom} · ${f.utilisateurs} utilisateur${f.utilisateurs > 1 ? 's' : ''} inclus
      ${parUtilisateur ? `<br>soit ${parUtilisateur.toFixed(2).replace('.', ',').replace(',00','')} € / mois par utilisateur` : ''}
    </div>

    ${!gratuit ? `
    <div style="margin:10px 0 12px;padding:12px 14px;border-radius:12px;background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.2);">
      <div style="font-size:12px;font-weight:800;letter-spacing:.04em;color:#9db4d8;margin-bottom:9px;">COMBIEN D'UTILISATEURS ?</div>
      <div style="display:flex;align-items:center;gap:12px;">
        <button id="aboMoins" type="button" style="width:38px;height:38px;border-radius:10px;border:1px solid rgba(124,198,255,.35);background:transparent;color:#cfe7ff;font-size:20px;font-weight:800;cursor:pointer;flex-shrink:0;">\u2212</button>
        <div style="flex:1;text-align:center;">
          <div style="display:flex;align-items:baseline;justify-content:center;gap:7px;font-size:22px;font-weight:800;"><input id="nbUsers" type="number" min="1" max="250" value="${nbUsersVoulu}" title="Tapez votre nombre d'utilisateurs" style="width:${String(nbUsersVoulu).length+0.8}ch;text-align:center;font-size:22px;font-weight:800;background:transparent;border:none;outline:none;color:inherit;font-family:inherit;padding:0;border-bottom:1px dashed rgba(124,198,255,.35);"><span>utilisateur${nbUsersVoulu>1?'s':''}</span></div>
          <div style="font-size:11.5px;color:#7d92b8;margin-top:4px;">${nbAbos} abonnement${nbAbos>1?'s':''} ${f.nom} \u00d7 ${f.utilisateurs} place${f.utilisateurs>1?'s':''}${nbPlaces>nbUsersVoulu?' \u00b7 '+nbPlaces+' places au total':''}</div>
        </div>
        <button id="aboPlus" type="button" style="width:38px;height:38px;border-radius:10px;border:1px solid rgba(124,198,255,.35);background:transparent;color:#cfe7ff;font-size:20px;font-weight:800;cursor:pointer;flex-shrink:0;">+</button>
      </div>
      ${nbAbos>1 && !((STRIPE_PRICES[formuleActive]||{})[cycleAnnuel?'annuel':'mensuel'])?`<div style="margin-top:9px;font-size:11.5px;color:#9db4d8;text-align:center;">⚠️ Sur la page de paiement, indiquez la quantité : <b style="color:#cfe7ff;">${nbAbos}</b></div>`:''}
    </div>` : ''}
    ${!gratuit && annuelDispo ? `
      <div class="choix-cycle">
        <button class="cycle ${!cycleAnnuel ? 'actif' : ''}" data-cycle="mensuel">
          Mensuel
          <span class="eco" style="visibility:hidden;">.</span>
        </button>
        <button class="cycle ${cycleAnnuel ? 'actif' : ''}" data-cycle="annuel">
          Annuel
          <span class="eco">${REMISE_ANNUELLE} mois offerts</span>
        </button>
      </div>` : ''}
    ${!gratuit ? `
      <div class="ligne-prix">
        <span>Abonnement ${f.nom}${nbAbos>1?' \u00d7 '+nbAbos:''}</span>
        <span>${(cycleAnnuel ? f.prixMensuel * 12 : f.prixMensuel) * nbAbos} €</span>
      </div>
      ${cycleAnnuel ? `
        <div class="ligne-prix" style="color:var(--vert);">
          <span>Remise annuelle (${REMISE_ANNUELLE} mois offerts)</span>
          <span>− ${f.prixMensuel * REMISE_ANNUELLE * nbAbos} €</span>
        </div>` : ''}
      <div class="ligne-prix total">
        <span>Total ${cycleAnnuel ? 'annuel' : 'mensuel'}</span>
        <span>${totalAffiche} € TTC</span>
      </div>
    ` : ''}

    <button class="btn-payer" id="btnPayer" style="background:${f.boutonFond};">
      ${gratuit
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>'}
      ${f.boutonTexte}
    </button>

    <div class="note-paiement">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      ${gratuit ? 'Aucune carte bancaire demandée' : 'Paiement sécurisé par Stripe'}
    </div>
    ${gratuit ? '' : `<div style="margin-top:8px;text-align:center;font-size:12.5px;color:#9db4d8;">🎁 Un code promo ? Vous pourrez le saisir sur la page de paiement.</div>`}

    ${gratuit ? '' : `
    <div style="margin-top:12px;padding:12px 14px;border-radius:10px;background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.22);font-size:12.5px;line-height:1.55;color:#9db4d8;">
      Pas encore de compte TEAM OP ?
      <a href="espace.html?retour=${encodeURIComponent('recap-abonnement.html?formule=' + formuleActive)}" style="color:#7cc6ff;font-weight:700;">Créez votre compte d'abord</a>
      — vous reviendrez automatiquement ici pour payer.
    </div>`}

    <div class="garanties">
      <div class="garantie">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Sans engagement — résiliable à tout moment
      </div>
      <div class="garantie">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Changement de formule à tout moment
      </div>
      <div class="garantie">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Vos données restent à vous, exportables
      </div>
    </div>
  `;

  const bm=document.getElementById('aboMoins'), bp=document.getElementById('aboPlus'), ni=document.getElementById('nbUsers');
  const abosActuels = () => Math.max(1, Math.ceil(nbUsersVoulu / f.utilisateurs));
  if(bm) bm.addEventListener('click', ()=>{ if(abosActuels()>1){ nbUsersVoulu=(abosActuels()-1)*f.utilisateurs; rendrePaiement(); } });
  if(bp) bp.addEventListener('click', ()=>{ if(abosActuels()<50){ nbUsersVoulu=(abosActuels()+1)*f.utilisateurs; rendrePaiement(); } });
  if(ni){ ni.addEventListener('change', ()=>{ nbUsersVoulu=Math.min(250,Math.max(1,parseInt(ni.value,10)||1)); rendrePaiement(); });
    ni.addEventListener('input', ()=>{ ni.style.width=(Math.max(1,String(ni.value||'').length)+0.8)+'ch'; });
    ni.addEventListener('keyup', e=>{ if(e.key==='Enter') ni.blur(); }); }
  c.querySelectorAll('.cycle').forEach(b => {
    b.addEventListener('click', () => {
      cycleAnnuel = b.dataset.cycle === 'annuel';
      rendrePaiement();
    });
  });

  document.getElementById('btnPayer').addEventListener('click', async () => {
    if (formuleActive === 'gratuit' || formuleActive === 'msggratuit') {
      window.location.href = CONFIG_STRIPE.inscriptionGratuite;
      return;
    }
    const btn = document.getElementById('btnPayer');
    // 1) Paiement automatique via le serveur TeamOP : quantité déjà réglée + champ code promo
    const priceId = (STRIPE_PRICES[formuleActive] || {})[cycleAnnuel ? 'annuel' : 'mensuel'];
    if (priceId) {
      const txt = btn.innerHTML;
      btn.disabled = true; btn.innerHTML = 'Préparation du paiement…';
      try {
        const ctl = new AbortController(); const to = setTimeout(() => ctl.abort(), 7000);
        const r = await fetch('https://api.teamop.fr/api/stripe/checkout', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ price: priceId, quantity: nbAbos }), signal: ctl.signal });
        clearTimeout(to);
        if (r.ok) { const j = await r.json(); if (j && j.url) { window.location.href = j.url; return; } }
      } catch (e) {}
      btn.disabled = false; btn.innerHTML = txt;
    }
    // 2) Repli : lien de paiement classique (quantité à régler sur la page Stripe)
    const lien = CONFIG_STRIPE[formuleActive][cycleAnnuel ? 'annuel' : 'mensuel'];
    if (!lien || lien.includes('A_REMPLACER')) {
      alert('Le paiement annuel arrive très bientôt.\nEn attendant, choisissez le paiement mensuel — sans engagement.');
      return;
    }
    window.location.href = lien;
  });
}

/* ---------- RENDU GLOBAL ---------- */
function rendreTout() {
  rendreSelecteur();
  rendreDroits();
  rendrePaiement();
  document.title = 'Récapitulatif ' + FORMULES[formuleActive].nom + ' — TEAM OP';
}

rendreTout();
</script>
</body>
</html>
